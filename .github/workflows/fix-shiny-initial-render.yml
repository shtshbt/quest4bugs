name: Fix initial shiny render

on:
  push:
    branches:
      - feature/morning-shiny-bonus
    paths:
      - scripts/fix_shiny_initial_render.py
      - .github/workflows/fix-shiny-initial-render.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/morning-shiny-bonus
          fetch-depth: 0
      - run: python3 scripts/fix_shiny_initial_render.py
      - run: node --check shared/shiny_bonus.js
      - name: Commit fix
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add shared/shiny_bonus.js
          git commit -m 'fix: apply shiny decoration on initial render'
          git push origin HEAD:feature/morning-shiny-bonus
