name: Bump release 0.4.40

on:
  push:
    branches:
      - feature/morning-shiny-bonus
    paths:
      - .github/workflows/bump-release-040.yml

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/morning-shiny-bonus
          fetch-depth: 0
      - name: Update release metadata and remove one-off workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          old = '<meta name="q4b-release" content="0.4.39">'
          new = '<meta name="q4b-release" content="0.4.40">'
          if old not in s and new not in s:
              raise SystemExit('release metadata not found')
          p.write_text(s.replace(old, new, 1), encoding='utf-8')
          PY
          rm .github/workflows/bump-release-040.yml
      - name: Commit release bump
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/bump-release-040.yml
          git commit -m 'chore: bump release to 0.4.40'
          git push origin HEAD:feature/morning-shiny-bonus
