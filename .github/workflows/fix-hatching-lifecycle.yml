name: Fix hatching lifecycle

on:
  push:
    branches:
      - feature/morning-shiny-bonus
    paths:
      - scripts/fix_hatching_lifecycle.py
      - .github/workflows/fix-hatching-lifecycle.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/morning-shiny-bonus
          fetch-depth: 0

      - name: Apply lifecycle patch
        run: python3 scripts/fix_hatching_lifecycle.py

      - name: Check JavaScript syntax
        run: |
          node --check shared/reward.js
          node --check shared/breeding.js

      - name: Verify lifecycle behavior
        run: |
          node <<'NODE'
          const assert = require('assert');
          global.window = global;
          global.Q4B_BUGS = [
            {id:'complete_bug', order:'Coleoptera', rarity:'N', metamorphosis:'complete', sizeMm:[10,20], jaName:'完全変態虫'},
            {id:'incomplete_bug', order:'Orthoptera', rarity:'N', metamorphosis:'incomplete', sizeMm:[10,20], jaName:'不完全変態虫'}
          ];
          require('./shared/reward.js');
          const R = global.Q4BReward;
          const c = global.Q4B_BUGS[0], i = global.Q4B_BUGS[1];
          const egg = (progress,target=100,shownStage)=>({progress,target,shownStage});
          assert.equal(R.naturalStage(egg(0),c),'egg');
          assert.equal(R.naturalStage(egg(25),c),'larva');
          assert.equal(R.naturalStage(egg(50),c),'pupa');
          assert.equal(R.naturalStage(egg(100),c),'pupa');
          assert.equal(R.naturalStage(egg(0),i),'egg');
          assert.equal(R.naturalStage(egg(35),i),'nymph');
          assert.equal(R.naturalStage(egg(100),i),'nymph');
          assert.equal(R.canHatchNow(egg(100,100,'pupa'),c),true);
          assert.equal(R.canHatchNow(egg(100,100,'larva'),c),false);
          assert.equal(R.canHatchNow(egg(100,100,'nymph'),i),true);

          let state={eggs:[{id:'complete_bug',sex:'m',progress:100,target:100,game:'keisan',origin:'lay',bornAt:'2026-07-01',shownStage:'pupa',shiny:false}],pendingEggs:[],stats:{totalAbandoned:0}};
          R.setEggStore({get:()=>state,save:s=>{state=s;return true;}});
          const coll={catches:{}};
          const oldRandom=Math.random;
          Math.random=()=>0;
          R.hatchEgg(coll,'complete_bug').then(result=>{
            Math.random=oldRandom;
            assert(result);
            assert.equal(result.shiny,true);
            assert.equal(result.egg.shiny,true);
            assert.equal(coll.catches.complete_bug.shiny,1);
            assert.equal(state.eggs.length,0);
            console.log('lifecycle behavior verified');
          }).catch(e=>{Math.random=oldRandom;throw e;});
          NODE

      - name: Commit generated fix
        run: |
          if git diff --quiet; then
            echo 'No generated changes'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add shared/reward.js shared/breeding.js index.html battle.html kanji/index.html keisan/index.html eitango/index.html
          git commit -m 'fix: decide shiny at hatching and remove duplicate adult stage'
          git push origin HEAD:feature/morning-shiny-bonus
