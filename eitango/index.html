<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>quest4bugs むしとり英単語</title>
<style>
:root{
  --paper:#f1ead2; --card:#fbf7e8; --ink:#2b2417; --sub:#6f6450;
  --leaf:#4a7c2f; --moss:#2f5d2f; --amber:#dd9a14; --amber2:#b97c08;
  --bad:#c4502e; --good:#3e8e4f;
  --rar0:#7d9b6a; --rar1:#3f7fb5; --rar2:#9a59c0; --rar3:#d8a012;
  --r:18px; --shadow:0 3px 0 rgba(43,36,23,.14);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic",system-ui,sans-serif;
  background:var(--paper); color:var(--ink); font-size:16px;
  -webkit-user-select:none; user-select:none; overscroll-behavior:none;
  transition:background .6s,color .6s;
}
body.night{
  --paper:#0f1828; --card:#1a2740; --ink:#e8ecdf; --sub:#9aa68f;
  --leaf:#5d9c42; --moss:#3f7030;
}
#app{max-width:680px;margin:0 auto;min-height:100%;padding:12px 14px 96px;position:relative}
button{font-family:inherit;border:none;cursor:pointer;color:inherit;background:none;font-size:inherit}

.topbar{display:flex;align-items:center;gap:8px;padding:6px 2px 10px;flex-wrap:wrap}
.topbar .ttl{font-weight:800;font-size:19px;letter-spacing:.04em}
.topbar .sp{flex:1}
.chip{background:var(--card);border-radius:999px;padding:6px 12px;font-size:14px;font-weight:700;box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:5px}
.chip small{font-weight:600;color:var(--sub)}
.btn{display:block;width:100%;background:var(--leaf);color:#fff;border-radius:var(--r);
  padding:16px;font-size:18px;font-weight:800;box-shadow:0 4px 0 var(--moss);margin-top:12px;text-align:center}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--moss)}
.btn.sub{background:var(--card);color:var(--ink);box-shadow:0 4px 0 rgba(43,36,23,.18)}
.btn.amber{background:var(--amber);box-shadow:0 4px 0 var(--amber2)}
.btn.danger{background:var(--bad);box-shadow:0 4px 0 #8e3517}
.btn.ghost{background:none;box-shadow:none;color:var(--sub);font-size:15px;padding:10px}
.btn:disabled{opacity:.45;pointer-events:none}
.card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-top:12px}
.h2{font-size:14px;font-weight:800;color:var(--sub);letter-spacing:.12em;margin:20px 2px 2px}
.row{display:flex;gap:10px;align-items:center}
.center{text-align:center}
.small{font-size:13px;color:var(--sub);line-height:1.55}
.tag{display:inline-block;font-size:12px;font-weight:800;border-radius:8px;padding:2px 8px;color:#fff;background:var(--sub)}

#nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  box-shadow:0 -2px 10px rgba(0,0,0,.12);display:flex;z-index:50;
  padding-bottom:env(safe-area-inset-bottom)}
#nav button{flex:1;padding:10px 0 8px;font-size:11px;font-weight:700;color:var(--sub)}
#nav button .ic{display:block;font-size:22px;margin-bottom:2px}
#nav button.on{color:var(--leaf)}

.field{border-radius:22px;padding:18px;margin-top:14px;color:#fff;position:relative;
  overflow:hidden;box-shadow:0 5px 0 rgba(0,0,0,.22);width:100%;text-align:left;display:block}
.field:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.22)}
.field .fe{font-size:42px;position:absolute;right:14px;top:50%;transform:translateY(-50%);filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))}
.field .fn{font-size:21px;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.35)}
.field .fs{font-size:13px;font-weight:700;opacity:.92;margin-top:3px;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.field .fp{margin-top:10px;background:rgba(0,0,0,.25);border-radius:999px;height:10px;overflow:hidden;max-width:72%}
.field .fp i{display:block;height:100%;background:#ffd86b;border-radius:999px}
.field .fz{font-size:12px;font-weight:700;margin-top:6px;opacity:.95;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.field.lock{filter:grayscale(.75) brightness(.82)}
.f-garden{background:linear-gradient(135deg,#7cb342,#4a7c2f)}
.f-pond{background:linear-gradient(135deg,#4fc3f7,#1565c0)}
.f-woods{background:linear-gradient(135deg,#8d6e63,#4e342e)}
.f-mt{background:linear-gradient(135deg,#90a4ae,#37474f)}
.f-cave{background:linear-gradient(135deg,#6d5e72,#2c2433)}
.f-jungle{background:linear-gradient(135deg,#26a69a,#1b5e20)}
.f-amazon{background:linear-gradient(135deg,#ffb300,#bf360c)}
.nightbadge{display:inline-block;background:#1a2740;color:#ffd86b;border:1px solid rgba(255,216,107,.4);
  border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700;margin-top:12px}

.qbar{height:12px;background:var(--card);border-radius:999px;overflow:hidden;margin:6px 0 14px;box-shadow:var(--shadow)}
.qbar i{display:block;height:100%;background:linear-gradient(90deg,var(--leaf),#9ccc65);border-radius:999px;transition:width .3s}
.qword{background:var(--card);border-radius:22px;padding:24px 18px;text-align:center;box-shadow:var(--shadow)}
.qword .w{font-size:33px;font-weight:800;letter-spacing:.02em;line-height:1.3}
.qword .w.jp{font-size:25px}
.qword .ex{font-size:16px;color:var(--sub);margin-top:10px;line-height:1.5}
.qword .ex b{color:var(--amber2);border-bottom:3px solid var(--amber)}
.qword .pos{margin-top:8px}
.spk{font-size:24px;background:var(--paper);width:50px;height:50px;border-radius:50%;
  box-shadow:var(--shadow);display:inline-flex;align-items:center;justify-content:center;margin-top:10px}
body.night .spk{background:#0f1828}
.opt{display:block;width:100%;background:var(--card);border-radius:16px;padding:15px 16px;
  font-size:18px;font-weight:700;text-align:left;margin-top:10px;box-shadow:var(--shadow);
  border:3px solid transparent;line-height:1.4}
.opt:active{transform:scale(.985)}
.opt.ok{border-color:var(--good);background:#e3f2dd;color:#1d4a26}
.opt.ng{border-color:var(--bad);background:#f6e0d8;color:#7c2c14;animation:shake .35s}
body.night .opt.ok{background:#23402a;color:#bfe8c4}
body.night .opt.ng{background:#46251c;color:#f3c0ad}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.kcard{background:var(--card);border-radius:22px;padding:18px 8px 14px;text-align:center;
  box-shadow:0 4px 0 rgba(43,36,23,.16);border:4px solid transparent}
.kcard .ke{font-size:56px;line-height:1.15;display:block}
.kcard .kj{font-size:16px;font-weight:800;margin-top:6px;display:block}
.kcard:active{transform:scale(.96)}
.kcard.ok{border-color:var(--good);background:#e3f2dd}
body.night .kcard.ok{background:#23402a}
.kcard.ng{border-color:var(--bad);animation:shake .35s}
.bigspk{width:100%;background:var(--card);border-radius:22px;padding:20px;text-align:center;
  box-shadow:var(--shadow);font-size:19px;font-weight:800}
.bigspk .se{font-size:44px;display:block;margin-bottom:4px}

.fb{position:fixed;left:0;right:0;bottom:0;z-index:60;padding:16px 16px calc(16px + env(safe-area-inset-bottom));
  border-radius:24px 24px 0 0;transform:translateY(110%);transition:transform .25s;max-width:680px;margin:0 auto}
.fb.show{transform:none}
.fb.good{background:#3e8e4f;color:#fff}
.fb.bad{background:#c4502e;color:#fff}
.fb .ft{font-size:20px;font-weight:800}
.fb .fd{font-size:16px;margin-top:4px;line-height:1.5}
.fb button{margin-top:12px;background:rgba(255,255,255,.25);width:100%;border-radius:14px;
  padding:13px;font-size:17px;font-weight:800;color:#fff}

#modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
  background:rgba(15,20,12,.78);padding:18px}
#modal.show{display:flex}
.mcard{background:var(--card);border-radius:26px;padding:22px 18px;width:100%;max-width:430px;
  text-align:center;max-height:92vh;overflow-y:auto}
.bush{font-size:84px;animation:rustle .5s infinite;display:block;padding:30px 0}
@keyframes rustle{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.spec{border-radius:22px;border:5px solid var(--rc,#7d9b6a);padding:20px 12px 16px;margin-top:14px;position:relative;background:var(--paper)}
body.night .spec{background:#0f1828}
.spec .me{font-size:82px;display:block;animation:pop .45s}
@keyframes pop{0%{transform:scale(.2)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.spec .mn{font-size:20px;font-weight:800;margin-top:6px}
.spec .men{font-size:13px;color:var(--sub);font-weight:700}
.spec .msz{font-size:25px;font-weight:800;margin-top:8px;color:var(--amber2)}
.spec .badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  border-radius:999px;padding:4px 14px;font-size:14px;font-weight:800;color:#fff;background:var(--rc,#7d9b6a);white-space:nowrap}
.spec.shiny{background:linear-gradient(135deg,#fff8dc,#ffe9a8)}
body.night .spec.shiny{background:linear-gradient(135deg,#3a3320,#5a4a18)}
.spec.legend{border-image:linear-gradient(45deg,#e53935,#fb8c00,#fdd835,#43a047,#1e88e5,#8e24aa) 1;border-style:solid}
.newtag{display:inline-block;background:var(--bad);color:#fff;border-radius:8px;padding:3px 10px;font-size:14px;font-weight:800;margin:10px 3px 0}
.rectag{display:inline-block;background:var(--amber);color:#fff;border-radius:8px;padding:3px 10px;font-size:14px;font-weight:800;margin:10px 3px 0}
.shinytag{display:inline-block;background:#9a59c0;color:#fff;border-radius:8px;padding:3px 10px;font-size:14px;font-weight:800;margin:10px 3px 0}

.ztabs{display:flex;gap:8px;margin-top:12px;overflow-x:auto;padding-bottom:4px}
.ztabs button{background:var(--card);border-radius:999px;padding:8px 14px;font-weight:800;font-size:14px;
  box-shadow:var(--shadow);white-space:nowrap}
.ztabs button.on{background:var(--leaf);color:#fff}
.zgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.zc{background:var(--card);border-radius:16px;padding:12px 4px 10px;text-align:center;
  border:3px solid var(--rc,transparent);box-shadow:var(--shadow)}
.zc .ze{font-size:38px;display:block}
.zc .zn{font-size:11px;font-weight:800;margin-top:5px;display:block;line-height:1.3}
.zc .zs{font-size:11px;color:var(--amber2);font-weight:800}
.zc.un{border-color:transparent;opacity:.6}
.zc.un .ze{filter:brightness(0) opacity(.35)}
body.night .zc.un .ze{filter:brightness(0) invert(.85) opacity(.3)}
.zc.shiny{background:linear-gradient(135deg,#fff8dc,#ffe9a8)}
body.night .zc.shiny{background:linear-gradient(135deg,#3a3320,#5a4a18)}

.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
.stat .sv{font-size:25px;font-weight:800}
.stat .sl{font-size:12px;color:var(--sub);font-weight:700;margin-top:2px}
.bars{display:flex;align-items:flex-end;gap:6px;height:110px;margin-top:12px}
.bars .b{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;height:100%}
.bars .b .bw{width:100%;display:flex;flex-direction:column;justify-content:flex-end;flex:1}
.bars .b i{display:block;width:100%;border-radius:6px 6px 0 0;min-height:2px}
.bars .b i.t{background:#d8d0b8}
body.night .bars .b i.t{background:#324a6e}
.bars .b i.c{background:var(--leaf);border-radius:0 0 0 0}
.bars .b span{font-size:10px;color:var(--sub);font-weight:700}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.cal div{aspect-ratio:1;border-radius:7px;background:rgba(0,0,0,.05);font-size:10px;display:flex;
  align-items:center;justify-content:center;color:var(--sub);font-weight:700}
body.night .cal div{background:rgba(255,255,255,.06)}
.cal div.d1{background:#c5e1a5;color:#33691e}.cal div.d2{background:#8bc34a;color:#fff}.cal div.d3{background:#4a7c2f;color:#fff}
.boxrow{display:flex;gap:6px;margin-top:12px}
.boxrow .bx{flex:1;background:rgba(0,0,0,.05);border-radius:10px;padding:8px 2px;text-align:center}
body.night .boxrow .bx{background:rgba(255,255,255,.06)}
.boxrow .bx b{display:block;font-size:16px}
.boxrow .bx span{font-size:10px;color:var(--sub);font-weight:700}

.profs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.prof{background:var(--card);border-radius:22px;padding:22px 10px;text-align:center;box-shadow:0 4px 0 rgba(43,36,23,.16)}
.prof .pe{font-size:50px;display:block}
.prof .pn{font-size:18px;font-weight:800;margin-top:8px;display:block}
.prof .pd{font-size:12px;color:var(--sub);font-weight:700;margin-top:2px;display:block}
.prof:active{transform:scale(.97)}
.icpick{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.icpick button{font-size:36px;background:var(--card);border-radius:16px;padding:8px 12px;border:3px solid transparent;box-shadow:var(--shadow)}
.icpick button.on{border-color:var(--leaf);background:#e3f2dd}
body.night .icpick button.on{background:#23402a}
input[type=text],input[type=password],textarea,select{width:100%;font-family:inherit;font-size:16px;padding:12px;border-radius:14px;
  border:2px solid #d9d0b8;background:var(--card);color:var(--ink);margin-top:8px}
textarea{min-height:100px;font-size:13px}
body.night input,body.night textarea,body.night select{border-color:#324a6e}
input[type=range]{width:100%;margin-top:10px}

.firefly{position:fixed;width:5px;height:5px;border-radius:50%;background:#ffe98a;
  box-shadow:0 0 8px 3px rgba(255,233,138,.55);pointer-events:none;z-index:5;animation:ff 8s infinite ease-in-out}
@keyframes ff{0%,100%{opacity:0}20%{opacity:1}50%{opacity:.25}70%{opacity:.9}
  25%{transform:translate(18px,-30px)}60%{transform:translate(-14px,-60px)}95%{transform:translate(6px,-90px)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.warn{background:#fff3cd;color:#7a5c00;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700;margin-top:10px;line-height:1.5}
body.night .warn{background:#4a3d12;color:#ffe49a}
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--ink);color:var(--paper);
  border-radius:999px;padding:10px 18px;font-size:14px;font-weight:700;z-index:200;transition:transform .3s;max-width:90%}
#toast.show{transform:translateX(-50%) translateY(0)}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
.dot.ok{background:var(--good)}.dot.ng{background:var(--bad)}.dot.off{background:var(--sub)}
details{margin-top:10px}
summary{font-weight:800;font-size:14px;color:var(--sub);cursor:pointer;padding:4px 0}
</style>
</head>

/* ---------------- Engine: date / theme / shuffle / esc ---------------- */
const Engine = {
  ymd(d = new Date()) { return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate(); },
  todayKey() { return this.ymd(); },
  addDays(ymdNum, n) {
    const s = String(ymdNum);
    const d = new Date(+s.slice(0, 4), +s.slice(4, 6) - 1, +s.slice(6, 8));
    d.setDate(d.getDate() + n);
    return this.ymd(d);
  },
  isNight() { const h = new Date().getHours(); return h >= 18 || h < 5; },
  applyTheme() {
    if (this.isNight()) {
      document.body.classList.add('night');
      if (!document.querySelector('.firefly')) {
        for (let i = 0; i < 6; i++) {
          const f = document.createElement('div');
          f.className = 'firefly';
          f.style.left = (5 + Math.random() * 90) + '%';
          f.style.top = (20 + Math.random() * 70) + '%';
          f.style.animationDelay = (Math.random() * 8) + 's';
          document.body.appendChild(f);
        }
      }
    }
  },
  touchStreak(p) {
    const t = this.todayKey();
    if (p.streak.last === t) return;
    const y = this.addDays(t, -1);
    p.streak.n = (p.streak.last === y) ? p.streak.n + 1 : 1;
    p.streak.best = Math.max(p.streak.best, p.streak.n);
    p.streak.last = t;
  },
  shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]]; } return b; },
  esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
};

/* ---------------- Speech (reads rate from CFG, set after load) -------- */
const CFG = { rate: 0.9, showMeaning: true };
const Speech = {
  voice: null,
  init() {
    if (!('speechSynthesis' in window)) return;
    const pick = () => {
      const vs = speechSynthesis.getVoices();
      this.voice = vs.find(v => v.lang === 'en-US') || vs.find(v => v.lang && v.lang.startsWith('en')) || null;
    };
    pick();
    speechSynthesis.onvoiceschanged = pick;
  },
  say(t, rate) {
    if (!('speechSynthesis' in window)) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(t);
      if (this.voice) u.voice = this.voice;
      u.lang = 'en-US';
      u.rate = rate || CFG.rate || 0.9;
      speechSynthesis.speak(u);
    } catch (e) {}
  }
};

/* ========================================================================
   SPECIES adapter: bugs.js -> engine-compatible [id, jaName, sciName,
   field, tier, nightFlag, sizeMin, sizeMax, emoji, note]
   Deterministic field/tier/size/night/emoji from the bug's id & rarity.
   ======================================================================== */
function hashStr(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return (h>>>0); }

/* rarity 'N'|'R'|'SR'|'SSR'|'SS' -> tier 0..3 */
function rarityToTier(r){
  if(r==='N')return 0;
  if(r==='R')return 1;
  if(r==='SR'||r==='SSR')return 2;
  return 3; /* SS = でんせつ */
}

/* emoji from renderer/family */
const RENDERER_EMOJI={
  kabuto:'🪲', kuwagata:'🪲', chou:'🦋', semi:'🪰', tombo:'🪰',
  batta:'🦗', kamakiri:'🦗', tentou:'🐞', ari:'🐜', hachi:'🐝',
  hotaru:'🪲', mizu:'🪲', kemushi:'🐛', dango:'🪲', other:'🪲'
};
function emojiFor(b){
  const tags=b.tags||[];
  if(tags.indexOf('butterfly')>=0||tags.indexOf('moth')>=0)return '🦋';
  if(tags.indexOf('ant')>=0)return '🐜';
  if(tags.indexOf('bee')>=0)return '🐝';
  if(tags.indexOf('ladybird')>=0)return '🐞';
  if(tags.indexOf('dragonfly')>=0)return '🪰';
  if(tags.indexOf('cicada')>=0)return '🪰';
  if(tags.indexOf('orthoptery')>=0||tags.indexOf('orthoptera')>=0||tags.indexOf('mantis')>=0)return '🦗';
  if(b.groupJa&&b.groupJa.indexOf('ガ')>=0)return '🦋';
  return RENDERER_EMOJI[b.renderer]||'🪲';
}

/* deterministic size range (mm) from family / rarity / id hash */
function sizeRange(b){
  const h=hashStr(b.id);
  const fam=b.family||'', tier=rarityToTier(b.rarity);
  let base, span;
  if(fam==='Lucanidae'){ base=40; span=70; }            /* stag beetles */
  else if(fam==='Scarabaeidae'){ base=25; span=70; }    /* kabuto/chafer */
  else if(fam==='Cerambycidae'){ base=20; span=40; }    /* longhorn */
  else if(fam==='Papilionidae'){ base=70; span=60; }    /* swallowtail */
  else if(fam==='Nymphalidae'){ base=45; span=40; }
  else if(fam==='Pieridae'){ base=35; span=25; }
  else if(fam==='Lycaenidae'){ base=18; span=18; }      /* small blues */
  else if(fam==='Cicadidae'){ base=40; span=35; }
  else if(b.order==='Odonata'){ base=35; span=45; }
  else if(b.order==='Orthoptera'){ base=25; span=55; }
  else if(b.order==='Mantodea'){ base=55; span=45; }
  else if(b.order==='Hymenoptera'){ base=8; span=18; }
  else if(b.order==='Hemiptera'){ base=12; span=40; }
  else if(fam==='Coccinellidae'){ base=5; span=6; }
  else if(fam==='Formicidae'){ base=4; span=8; }
  else { base=15; span=30; }
  /* big-rarity nudge */
  const rarMul=[0.85,1.0,1.15,1.3][tier];
  span=span*rarMul;
  const minJit=(h%17)/17*0.25;           /* 0..0.25 of span */
  const min=Math.round(base+span*minJit);
  const max=Math.round(min+span*(0.55+((h>>5)%13)/13*0.4));
  return [min, Math.max(max,min+3)];
}

/* deterministic field assignment: spread eitango species (108) across f1-f7.
   Rarity tier maps to field band; hash spreads within band.
   tier0 N  -> f1/f2/f3 (ratio 2:1:1)
   tier1 R  -> f2/f3/f4/f5/f6 (ratio 1:2:2:2:1)
   tier2 SR/SSR -> f5/f6/f7 (ratio 1:2:2)  */
function fieldFor(b){
  const tier=rarityToTier(b.rarity);
  const h=hashStr(b.id);
  if(tier===0){
    const pick=h%4;
    if(pick<=1)return 1;
    if(pick===2)return 2;
    return 3;
  }
  if(tier===1){
    const pick=h%8;
    if(pick===0)return 2;
    if(pick<=2)return 3;
    if(pick<=4)return 4;
    if(pick<=6)return 5;
    return 6;
  }
  /* tier2 SR/SSR */
  const pick=h%5;
  if(pick===0)return 5;
  if(pick<=2)return 6;
  return 7;
}

/* night flag 0/2 = either, 1 = night */
function nightFor(b){
  const tags=b.tags||[];
  if(tags.indexOf('firefly')>=0)return 1;
  if(tags.indexOf('cicada')>=0&&b.id==='higurashi')return 1;
  if(b.id==='suzumushi'||b.id==='enma_koorogi')return 1;
  if((b.note||'').indexOf('夜')>=0)return 1;
  return 2; /* default: either */
}

let SPECIES=[], NUSHI=[], ALLSP=[];
const SPECIES_SRC={}; /* id -> bugs.js object (for SVG renderer) */
function buildSpecies(){
  /* restrict to eitango-assigned species (Q4BReward.gameFor === 'eitango') */
  const allBugs=window.Q4B_BUGS||[];
  const bugs=window.Q4BReward
    ? allBugs.filter(b=>Q4BReward.gameFor(b)==='eitango')
    : allBugs;
  SPECIES=[]; NUSHI=[];
  /* pick field nushi: highest-rarity exotic per field. */
  for(const b of bugs){
    SPECIES_SRC[b.id]=b;
    const field=fieldFor(b);
    const tier=rarityToTier(b.rarity);
    const [mn,mx]=sizeRange(b);
    const row=[b.id, b.jaName, b.scientificName||'', field, tier, nightFor(b),
              mn, mx, emojiFor(b), b.note||''];
    SPECIES.push(row);
  }
  /* nushi: one fixed legendary per open field, drawn from SS/SSR pool, fixed max size */
  const byField={};
  SPECIES.forEach(s=>{ (byField[s[3]]=byField[s[3]]||[]).push(s); });
  for(const f of FIELDS){
    if(!f.open)continue;
    const pool=byField[f.id]||[];
    if(!pool.length)continue;
    /* prefer tier3 (SS), else highest tier; deterministic pick by max id-hash */
    let best=null, bestKey=-1;
    const maxTier=Math.max(...pool.map(s=>s[4]));
    pool.filter(s=>s[4]===maxTier).forEach(s=>{
      const k=hashStr('nushi'+s[0]);
      if(k>bestKey){ bestKey=k; best=s; }
    });
    if(!best)continue;
    const fixed=best[7]; /* fixed at the species max size */
    NUSHI.push(['nushi_'+best[0], 'ぬし'+best[1], best[2], f.id, 3, 2, fixed, fixed, best[8],
                'このフィールドの ぬし．でんせつの 1ぴき']);
    /* nushi shares renderer from its source species */
    const baseId=best[0]; /* e.g. 'hercules_beetle' */
    if(SPECIES_SRC[baseId]) SPECIES_SRC['nushi_'+baseId]=SPECIES_SRC[baseId];
  }
  ALLSP=[...SPECIES,...NUSHI];
}
/* Return SVG for a species row sp, fallback to emoji if renderer unavailable */
function spSVG(sp,size,shiny){
  const id=sp[0].replace(/^nushi_/,'');
  const src=SPECIES_SRC[id]||SPECIES_SRC[sp[0]];
  if(src&&window.Q4BRender){
    return '<span style="display:inline-block;width:'+(size||80)+'px;height:'+(size||80)+'px">'+Q4BRender.species(src,shiny)+'</span>';
  }
  return '<span style="font-size:'+(size||80)+'px;line-height:1">'+sp[8]+'</span>';
}
const specById = id => ALLSP.find(x=>x[0]===id);

    }
    for (const w of CUSTOM) {
      if (w.level === f) arr.push({ key: 'c|' + w.en, en: w.en, ja: w.ja, ex: w.ex || '', pos: w.pos || '', emoji: w.emoji || '✏️', cat: 'ついか', level: f, custom: true });
    }
    const m = new Map();
    arr.forEach(w => m.set(w.key, w));
    return [...m.values()];
  }
};

/* ---------------- SRS (Leitner) ---------------- */
const SRS = {
  IV: [0, 1, 3, 7, 14, 30],
  NEW_PER_DAY: 25,
  grade(p, key, ok) {
    const s = p.srs[key] || [0, 0, 0, 0];
    let [box, due, seen, wrong] = s;
    seen++;
    if (ok) box = Math.min(5, box + 1); else { box = 1; wrong++; }
    due = Engine.addDays(Engine.todayKey(), this.IV[box]);
    p.srs[key] = [box, due, seen, wrong];
  },
  dueList(p, words) {
    const t = Engine.todayKey();
    return words.filter(w => { const s = p.srs[w.key]; return s && s[0] > 0 && s[1] <= t; });
  },
  newList(p, words) { return words.filter(w => !p.srs[w.key]); },
  countBox(p, words) {
    const c = [0, 0, 0, 0, 0, 0];
    words.forEach(w => { const s = p.srs[w.key]; c[s ? s[0] : 0]++; });
    return c;
  },
  mastered(p, words) { return words.filter(w => { const s = p.srs[w.key]; return s && s[0] >= 3; }).length; },
  newBudget(p) {
    const t = Engine.todayKey();
    if (p.newday.date !== t) p.newday = { date: t, count: 0 };
    return Math.max(0, this.NEW_PER_DAY - p.newday.count);
  },
  useNew(p, n) { const t = Engine.todayKey(); if (p.newday.date !== t) p.newday = { date: t, count: 0 }; p.newday.count += n; }
};

/* ---------------- Reward (collection) ---------------- */
const Reward = {
  NEED: 8,
  RARNAME: ['ノーマル', 'レア', 'スーパーレア', 'でんせつ'],
  onAnswer(p, ok, field, itemId) {
    const t = Engine.todayKey();
    const c = p.cal[t] || (p.cal[t] = { q: 0, c: 0 });
    c.q++;
    Engine.touchStreak(p);
    if (!ok) return null;
    c.c++; if(window.QuestSave){QuestSave.amberAdd(ePid(),1);}else{p.amber++;} p.amberTotal++;  // 🍯共有ウォレットへ
    // 新しさ係数: 同じ語の連打でゲージの進みを逓減（最低0.2、違う語は満額1）
    let fresh = 1;
    if (itemId != null) {
      if (!p.recent) p.recent = [];
      let reps = 0; for (let i = 0; i < p.recent.length; i++) if (p.recent[i] === itemId) reps++;
      p.recent.push(itemId); if (p.recent.length > 12) p.recent = p.recent.slice(-12);
      fresh = reps === 0 ? 1 : Math.max(0.2, Math.pow(0.5, reps));
    }
    /* 学習価値: 既マスター語(box>=3)の周回はゲージ伸びを鈍化（薄いフィールド乱獲の抑制） */
    let val = 1; if (itemId && p.srs[itemId] && p.srs[itemId][0] >= 3) val = 0.4;
    p.poolAcc = (p.poolAcc || 0) + fresh * val;
    if (p.poolAcc >= 1) { p.pool++; p.poolAcc -= 1; }   // ゲージは整数を維持
    if (p.pool >= this.NEED) { p.pool -= this.NEED; return this.roll(field, p); }
    return null;
  },
  roll(field, p) {
    const night = Engine.isNight();
    const pool = SPECIES.filter(s => s[3] === field);
    if (!pool.length) return null;
    const streakBonus = 1 + Math.min(p.streak.n, 30) * 0.02;
    // tier 3 (でんせつ=最上位) は約0.15-0.2%の超希少。streak/night増幅はSR(tier2)までで、でんせつは据え置く。
    const tierW = night ? [62, 29, 8.85 * streakBonus, 0.2] : [70, 24, 5.85 * streakBonus, 0.15];
    const byTier = [0, 1, 2, 3].map(t => pool.filter(s => s[4] === t));
    const tw = byTier.map((a, t) => a.length ? tierW[t] : 0);
    let tot = tw.reduce((a, b) => a + b, 0);
    let r = Math.random() * tot, tier = byTier.findIndex(a => a.length);
    for (let t = 0; t < 4; t++) { if (tw[t] && r < tw[t]) { tier = t; break; } r -= tw[t]; }
    const cand = byTier[tier];
    const ws = cand.map(s => { const n = s[5]; return n === 2 ? 1 : (night ? (n === 1 ? 2.5 : 0.45) : (n === 1 ? 0.45 : 1)); });
    let tot2 = ws.reduce((a, b) => a + b, 0);
    let r2 = Math.random() * tot2, sp = cand[cand.length - 1];
    for (let i = 0; i < cand.length; i++) { if (r2 < ws[i]) { sp = cand[i]; break; } r2 -= ws[i]; }
    const shiny = Math.random() < 0.03;  /* 色違い率は全ゲーム共通(3%) */
    const size = this.rollSize(sp);
    return this.record(p, sp, size, shiny);
  },
  rollSize(sp) {
    const min = sp[6], max = sp[7];
    const v = min + (max - min) * Math.pow(Math.random(), 1.7);
    return Math.round(v * 10) / 10;
  },
  record(p, sp, size, shiny) {
    const id = sp[0];
    const prev = p.catches[id];
    const isNew = !prev;
    const isRecord = !isNew && size > prev.max;
    p.catches[id] = {
      n: (prev ? prev.n : 0) + 1,
      max: Math.max(size, prev ? prev.max : 0),
      shiny: (prev && prev.shiny) || shiny ? 1 : 0
    };
    return { sp, size, shiny, isNew, isRecord };
  },
  catchNushi(p, field) {
    const n = NUSHI.find(x => x[3] === field);
    if (!n) return null;
    p.nushi[field] = true;
    return this.record(p, n, n[6], false);
  },
  extraCatch(p, field) {
    const t = String(Engine.todayKey());
    if (p.extra.date !== t) p.extra = { date: t, used: 0 };
    if (p.extra.used >= 3 || p.amber < 30) return null;
    p.amber -= 30; p.extra.used++;
    return this.roll(field, p);
  },
  rank(total) {
    const R = [[0, 'かけだし虫とり'], [100, 'みならい虫とり'], [300, 'いちにんまえの虫とり'], [800, 'ベテラン虫とり'], [2000, '虫とりのたつじん'], [5000, 'でんせつの虫はかせ']];
    let r = R[0][1];
    for (const [v, n] of R) { if (total >= v) r = n; }
    return r;
  },
  zukanFor(field) { return ALLSP.filter(s => s[3] === field); }
};

   QuestSave integration layer
   - Profiles come from the SHARED registry (QuestSave.profiles()).
   - Per-profile eitango progress is stored at ns='eitango', key=profileId.

function blankState(){
  return {
    amber:0, amberTotal:0, pool:0, field:1,
    extra:{date:'',used:0},
    catches:{}, nushi:{},
    streak:{n:0,best:0,last:0},
    cal:{}, srs:{}, kids:{}, newday:{date:0,count:0},
    updated:0,
    reviewGauge:0,
    progressSummary:''
  };
}
function normState(s){
  s=s||{};
  const b=blankState();
  for(const k in b){ if(typeof s[k]==='undefined') s[k]=b[k]; }
  s.extra=s.extra||{date:'',used:0};
  s.streak=s.streak||{n:0,best:0,last:0};
  s.newday=s.newday||{date:0,count:0};
  s.catches=s.catches||{}; s.nushi=s.nushi||{};
  s.cal=s.cal||{}; s.srs=s.srs||{}; s.kids=s.kids||{};
  if(typeof s.reviewGauge==='undefined') s.reviewGauge=0;
  if(typeof s.progressSummary==='undefined') s.progressSummary='';
  return s;
}

function eitangoAmberCatch(){
  if(!P) return;
  if(eAmber() < 30){ UI.toast('🍯こはくが たりないよ（30こ いるよ）'); return; }
  /* Q4BReward.spendForCatch が共有ウォレットから30消費（catches は同一参照で更新）*/
  var tmp={catches:P.catches};
  var got=window.Q4BReward ? Q4BReward.spendForCatch(tmp,'eitango') : null;
  if(!got){ UI.toast('🍯 むしが みつからなかった…'); return; }
  touchP();
  /* got.sp はオブジェクト形式。ALLSP から対応配列行を探して UI.specCard に渡す */
  var spRow=ALLSP.find(function(s){return s[0]===got.sp.id;});
  if(!spRow){
    /* フォールバック: 簡易表示 */
    UI.toast('🍯 ' + (got.sp.jaName||got.sp.id) + ' を つかまえた！');
    render(); return;
  }
  var spRes={sp:spRow, size:got.size, shiny:got.shiny, isNew:got.isNew, isRecord:got.isRecord};
  $('#modal').innerHTML='<div class="mcard"><div class="center"><div style="font-size:16px;font-weight:bold;margin-bottom:8px">🍯 こはく30こで つかまえた！</div>'
    +UI.specCard(spRes)
    +'<button class="btn sub" style="margin-top:12px" onclick="closeModal();render()">ずかんで みる</button></div></div>';
  $('#modal').classList.add('show');
}

/* ---------------- PROGRESS (できたこと) ---------------- */
function calcProgressSummary(){
  /* しゅうとく率50%以上の最上位フィールドを見つける */
  let topLabel='';
  const openFields=FIELDS.filter(f=>f.open);
  for(let i=openFields.length-1;i>=0;i--){
    const f=openFields[i];
    const words=WordDB.byField(f.id);
    if(!words.length) continue;
    let mastered=0;
    if(f.kids){
      mastered=words.filter(w=>{const k=P.kids[w.key];return k&&k[1]>=2;}).length;
    } else {
      mastered=SRS.mastered(P,words);
    }
    if(mastered/words.length>=0.5){ topLabel=f.sub; break; }
  }
  if(topLabel) return '英単語 '+topLabel+'相当';
  /* 全体のしゅうとく数で最低限のラベル */
  let total=0, totalMastered=0;
  for(const f of openFields){
    const words=WordDB.byField(f.id);
    totalMastered+=f.kids
      ? words.filter(w=>{const k=P.kids[w.key];return k&&k[1]>=2;}).length
      : SRS.mastered(P,words);
    total+=words.length;
  }
  if(totalMastered>=10) return '英単語 '+totalMastered+'語 しゅうとく';
  return '';
}

/* ---------------- じしょ（級ごと・習得状況つきで意味を引ける） ---------------- */
let dictTab=null, dictQ='';
function scrDict(){
  const tabs=FIELDS.filter(f=>f.open);
  if(!dictTab||!tabs.find(f=>f.id===dictTab)) dictTab=tabs[0].id;
  const f=FIELDS.find(x=>x.id===dictTab);
  let words=WordDB.byField(dictTab);
  const q=(dictQ||'').trim().toLowerCase();
  if(q) words=words.filter(w=>w.en.toLowerCase().includes(q)||(w.ja||'').includes(dictQ));
  function badge(w){
    if(f.kids){ const k=P.kids[w.key]; const lv=k?k[1]:0; return lv>=2?'✅':lv>=1?'🔸':'·'; }
    const s=P.srs[w.key]; const b=s?s[0]:0; return b>=3?'✅':b>=1?'🔸':'·';
  }
  const m = f.kids ? words.filter(w=>{const k=P.kids[w.key];return k&&k[1]>=2;}).length : SRS.mastered(P,words);
  const rows=words.map(w=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 6px;border-bottom:1px solid rgba(0,0,0,.06)">
    <span style="width:20px;text-align:center;font-size:15px">${badge(w)}</span>
    <span style="flex:1;min-width:0"><b style="font-size:16px">${w.en}</b> <span class="small">${w.pos||''}</span><br><span class="small">${furi(w.ja)}</span></span>
    <button class="chip" style="cursor:pointer" onclick="Speech.say('${w.en.replace(/'/g,"\\'")}')">🔊</button>
  </div>`).join('') || '<div class="small center" style="padding:16px">みつからないよ</div>';
  return `<div class="topbar"><span class="ttl">📚 じしょ</span></div>
  <div class="ztabs">${tabs.map(t=>`<button class="${t.id===dictTab?'on':''}" onclick="dictTab=${t.id};render()">${t.emoji} ${t.name}</button>`).join('')}</div>
  <div class="card" style="padding:10px">
    <input type="text" placeholder="🔍 えいご/いみ で さがす" value="${(dictQ||'').replace(/"/g,'&quot;')}" oninput="dictQ=this.value;clearTimeout(window.__dt);window.__dt=setTimeout(render,250)" style="width:100%;font-size:15px;padding:8px;border:2px solid var(--leaf);border-radius:10px">
    <div class="small" style="margin-top:6px">${f.sub}　しゅうとく <b>${m}</b>/${words.length}　（✅しゅうとく・🔸がくしゅう中・·まだ）</div>
  </div>
  <div class="card" style="padding:0">${rows}</div>`;
}
function scrProgress(){
  const openFields=FIELDS.filter(f=>f.open);
  /* 各フィールドのしゅうとく率を計算 */
  const rows=openFields.map(f=>{
    const words=WordDB.byField(f.id);
    const total=words.length;
    let mastered=0, started=0, frac=0;
    if(f.kids){
      words.forEach(w=>{const k=P.kids[w.key]; if(!k||!(k[1]>0))return; started++; const lv=Math.min(2,k[1]); frac+=lv/2; if(k[1]>=2)mastered++;});
    } else {
      words.forEach(w=>{const s=P.srs[w.key]; if(!s||!(s[0]>0))return; started++; const st=Math.min(3,s[0]); frac+=st/3; if(s[0]>=3)mastered++;});
    }
    /* バーは「はじめた語の習得度」で1問ごとに動く（分母を全語にすると拡充で動かないため） */
    const pct=total?Math.round(100*mastered/total):0; /* 単純な習得率(全体数のうち) */
    return {f,mastered,started,total,pct};
  });

  /* 総括ラベル: しゅうとく率50%以上の最上位 */
  let topLabel='';
  for(let i=rows.length-1;i>=0;i--){
    if(rows[i].pct>=50){ topLabel=rows[i].f.sub; break; }
  }
  let summaryHtml='';
  if(topLabel){
    summaryHtml=`<div class="card center" style="background:#e3f2dd;border:2px solid var(--good);margin-bottom:4px">
      <div style="font-size:28px">🌟</div>
      <div style="font-weight:800;font-size:16px;margin-top:4px">${Engine.esc(topLabel)}まで がんばってるね！</div>
    </div>`;
  } else {
    const totalM=rows.reduce((a,r)=>a+r.mastered,0);
    summaryHtml=`<div class="card center" style="margin-bottom:4px">
      <div style="font-size:28px">🌱</div>
      <div style="font-weight:800;font-size:16px;margin-top:4px">いま ${totalM}語 しゅうとく中！</div>
    </div>`;
  }

  /* progressSummaryを更新・保存 */
  const newSummary=calcProgressSummary();
  if(P.progressSummary!==newSummary){ P.progressSummary=newSummary; touchP(); }

  /* バーのHTML */
  let barsHtml='';
  for(const {f,mastered,started,total,pct} of rows){
    const barPct=Math.min(100,pct);
    const barColor=pct>=80?'var(--good)':pct>=50?'var(--amber)':'var(--sub)';
    barsHtml+=`<div style="margin-top:14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:18px">${f.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px">${Engine.esc(f.name)}</div>
          <div style="font-size:11px;color:var(--sub)">${Engine.esc(f.sub)}</div>
        </div>
        <div style="text-align:right;font-size:13px;font-weight:800;white-space:nowrap">
          すすみ <span style="color:${barColor}">${pct}%</span>
          <div style="font-size:11px;color:var(--sub);font-weight:700">がくしゅうちゅう ${started}/${total}・マスター ${mastered}</div>
        </div>
      </div>
      <div style="height:10px;background:rgba(0,0,0,.08);border-radius:999px;overflow:hidden">
        <div style="height:100%;width:${barPct}%;background:${barColor};border-radius:999px;transition:width .4s"></div>
      </div>
    </div>`;
  }

  return `<div class="topbar"><span class="ttl">📈 できたこと</span></div>
  ${summaryHtml}
  <div class="card">
    <div class="h2" style="margin-top:0">きゅうレベルごとの しゅうとく率</div>
    ${barsHtml}
  </div>
  ${window.Q4BReward?`<div class="card"><div class="h2" style="margin-top:0">🏅 しょうごう</div>${Q4BReward.rankListHTML(Object.keys(P.catches).reduce((a,id)=>a+((P.catches[id]&&P.catches[id].n)||0),0))}</div>`:''}
  <button class="btn sub" style="margin-top:12px" onclick="startReview()">🔁 ふくしゅうチャレンジ</button>`;
}

/* ---------------- STATS ---------------- */
function scrStats(){
  const meta=profMeta(CURID);

  /* --- 全フィールド横断で学習済み・しゅうとく数を集計 --- */
  const openFields=FIELDS.filter(f=>f.open);
  let totalLearned=0, totalMastered=0, totalWords=0;
  const fieldStats=openFields.map(f=>{
    const words=WordDB.byField(f.id);
    let learned=0, mastered=0;
    if(f.kids){
      learned=words.filter(w=>{const k=P.kids[w.key];return k&&k[1]>=2;}).length;
      mastered=learned; /* kidsは2回正解をしゅうとく扱い */
    } else {
      learned=words.filter(w=>{const s=P.srs[w.key];return s&&s[2]>0;}).length; /* seen>0 */
      mastered=SRS.mastered(P,words);
    }
    totalLearned+=learned;
    totalMastered+=mastered;
    totalWords+=words.length;
    return {f, words, learned, mastered};
  });

  /* --- ずかん採集数 (全フィールド) --- */
  const caught=ALLSP.filter(s=>P.catches[s[0]]).length;
  let q=0,c=0; Object.values(P.cal).forEach(v=>{q+=v.q;c+=v.c;});

  /* --- 7日間バーグラフ --- */
  let bars='';
  for(let i=6;i>=0;i--){
    const k=Engine.addDays(Engine.todayKey(),-i);
    const v=P.cal[k]||{q:0,c:0};
    const max=Math.max(10,...[...Array(7)].map((_,j)=>{const kk=Engine.addDays(Engine.todayKey(),-j);return (P.cal[kk]||{q:0}).q;}));
    const hq=Math.round(v.q/max*100), hc=v.q?Math.round(v.c/v.q*hq):0;
    bars+=`<div class="b"><div class="bw"><i class="t" style="height:${hq-hc}%"></i><i class="c" style="height:${hc}%"></i></div><span>${String(k).slice(6)}日</span></div>`;
  }

  /* --- カレンダー --- */
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  let cal='<div class="cal">'+['日','月','火','水','木','金','土'].map(d=>`<div>${d}</div>`).join('');
  for(let i=0;i<first;i++) cal+='<div></div>';
  for(let d=1;d<=days;d++){
    const k=y*10000+(m+1)*100+d, v=P.cal[k];
    const cls=!v?'':v.q>=30?'d3':v.q>=15?'d2':'d1';
    cal+=`<div class="${cls}">${d}</div>`;
  }
  cal+='</div>';

  /* --- フィールド別一覧HTML --- */
  let fieldRows='';
  for(const {f,words,learned,mastered} of fieldStats){
    const pct=words.length?Math.round(learned/words.length*100):0;
    if(f.kids){
      fieldRows+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06)">
        <span style="font-size:20px">${f.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px">${Engine.esc(f.name)}</div>
          <div style="font-size:11px;color:var(--sub)">${f.sub}</div>
        </div>
        <div style="text-align:right;white-space:nowrap">
          <b>${learned}</b><span style="font-size:11px;color:var(--sub)">/${words.length}語</span>
          <span style="font-size:11px;color:var(--sub);margin-left:4px">おぼえた</span>
        </div>
      </div>`;
    } else {
      fieldRows+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06)">
        <span style="font-size:20px">${f.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px">${Engine.esc(f.name)}</div>
          <div style="font-size:11px;color:var(--sub)">${f.sub}</div>
        </div>
        <div style="text-align:right;white-space:nowrap">
          <b>${learned}</b><span style="font-size:11px;color:var(--sub)">/${words.length}語 学習済</span>
          <span style="font-size:12px;color:var(--good);margin-left:6px">✓${mastered}</span>
        </div>
      </div>`;
    }
  }
  /* 最後のborder-bottomを消す */
  fieldRows=fieldRows.replace(/border-bottom:[^"]+"\s*>(\s*<\/div>\s*$)/, 'border-bottom:none">$1');

  return `<div class="topbar"><span class="ttl">📊 ${Engine.esc(meta.name)}の きろく</span></div>
  <div class="statgrid">
    <div class="stat"><div class="sv">🔥 ${P.streak.n}日</div><div class="sl">れんぞく学習 (さいこう ${P.streak.best}日)</div></div>
    <div class="stat"><div class="sv">${q?Math.round(c/q*100):0}%</div><div class="sl">せいかいりつ (${c}/${q}問)</div></div>
    <div class="stat"><div class="sv">📖 ${caught}/${ALLSP.length}</div><div class="sl">ずかん かんせいど</div></div>
    <div class="stat"><div class="sv">🟡 ${P.amberTotal}</div><div class="sl">${Reward.rank(P.amberTotal)}</div></div>
  </div>
  <div class="h2">この7日間 (こい色=せいかい)</div>
  <div class="card"><div class="bars">${bars}</div></div>
  <div class="h2">ことばの がくしゅう きろく</div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div><b style="font-size:28px">${totalLearned}</b> <span class="small">/ ${totalWords}語 学習済み</span></div>
      <div style="margin-left:auto;text-align:right"><span style="color:var(--good);font-weight:800;font-size:16px">✓ ${totalMastered}</span><div class="small">しゅうとく</div></div>
    </div>
    ${fieldRows}
  </div>
  <div class="h2">こんげつの カレンダー</div>
  <div class="card">${cal}</div>`;
}

async function doConnect(){
  const owner=$('#ghOwner').value.trim(), repo=$('#ghRepo').value.trim(), tok=$('#ghTok').value.trim();
  if(!owner||!repo||!tok){ UI.toast('owner / repo / token を いれてね'); return; }
  UI.toast('接続中...');
  try{
    await QuestSave.connectGitHub({owner:owner,repo:repo,token:tok});
    await QuestSave.pullAll().catch(()=>{});
    PROFILES=await QuestSave.profiles();
    if(CURID){ P=normState(await QuestSave.load(NS,CURID)); }
    UI.toast('接続できた! 自動同期オン'); render();
  }catch(e){ UI.toast('接続失敗: '+(String(e.message).includes('401')?'みとめられない':'通信エラー')); }
}
async function doSyncNow(){
  UI.toast('同期中...');
  try{
    await QuestSave.pullAll();
    await QuestSave.pushAll();
    PROFILES=await QuestSave.profiles();
    if(CURID){ P=normState(await QuestSave.load(NS,CURID)); }
    UI.toast('同期かんりょう'); render();
  }catch(e){ UI.toast('同期失敗(あとで自動再試行)'); }
}
function doExport(){
  const blob=new Blob([QuestSave.exportAll()],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='quest4bugs-backup-'+Engine.todayKey()+'.json';
  a.click();
}
async function doImport(){
  const txt=$('#impTxt').value.trim();
  if(!txt){ UI.toast('JSONを 貼ってね'); return; }
  try{
    const n=await QuestSave.importAll(txt);
    PROFILES=await QuestSave.profiles();
    const cust=await QuestSave.load(NS,'_custom'); CUSTOM=Array.isArray(cust)?cust:CUSTOM;
    const cfg=await QuestSave.load(NS,'_settings'); if(cfg&&typeof cfg.rate==='number')CFG.rate=cfg.rate;
    if(cfg&&typeof cfg.showMeaning==='boolean')CFG.showMeaning=cfg.showMeaning;
    if(!CURID||!profMeta(CURID)) CURID=PROFILES.length?PROFILES[0].id:null;
    if(CURID){ QuestSave.setCurrentProfile(CURID); P=normState(await QuestSave.load(NS,CURID)); }
    UI.toast('読みこみ完了 ('+n+'件)'); render();
  }catch(e){ UI.toast('JSONが読めない'); }
}
function doCSV(){
  const text=$('#csvTxt').value, level=+$('#csvLevel').value;
  const seen=new Set(CUSTOM.map(w=>w.level+'|'+w.en));
  let n=0;
  text.split(/\r?\n/).forEach(line=>{
    line=line.trim(); if(!line)return;
    const parts=line.split(',');
    if(parts.length<2)return;
    const en=parts[0].trim(), ja=parts[1].trim(), ex=parts.slice(2).join(',').trim();
    if(!en||!ja)return;

}

/* ---------- question queue ---------- */
const SESSION_N=5;
function buildMain(){
  const N=SESSION_N;
  if(KIDS){
    const pool=GWORDS.map(w=>{
      const k=P.kids[w.key]||[0,0,0];
      const wt=!k[0]?3:(k[2]>=k[1]?2:1);
      return {w,wt};
    });
    const q=[];
    let bag=[...pool];
    for(let i=0;i<N&&bag.length;i++){
      let tot=bag.reduce((a,x)=>a+x.wt,0), r=Math.random()*tot, pick=bag[0], idx=0;
      for(let j=0;j<bag.length;j++){ if(r<bag[j].wt){pick=bag[j];idx=j;break;} r-=bag[j].wt; }
      bag.splice(idx,1);
      q.push({w:pick.w,type:'kids'});
    }
    return q;
  }
  /* 復習(due)優先 → 新規(1日予算内) → 不足分は既習で補充して つねに N問にそろえる */
  let due=Engine.shuffle(SRS.dueList(P,GWORDS)).slice(0,N);
  let q=due.map(w=>({w,type:srsType(w)}));
  if(q.length<N){
    const budget=Math.min(SRS.newBudget(P),N-q.length);
    const fresh=Engine.shuffle(SRS.newList(P,GWORDS)).slice(0,budget);
    SRS.useNew(P,fresh.length);
    q=q.concat(fresh.map(w=>({w,type:srsType(w)})));
  }
  if(q.length<N){
    const have=new Set(q.map(x=>x.w.key));
    /* 補充は「あと一歩(box2-3)」を優先。周回がマスターに変わるようにする（マスター済みは最後） */
    const fillPri=w=>{const b=(P.srs[w.key]||[0])[0]||0; return b>=4?-1:b;};
    const seen=Engine.shuffle(GWORDS.filter(w=>P.srs[w.key]&&!have.has(w.key))).sort((a,b)=>fillPri(b)-fillPri(a));
    for(let i=0;i<seen.length&&q.length<N;i++)q.push({w:seen[i],type:srsType(seen[i])});
  }
  if(q.length<N){
    const have2=new Set(q.map(x=>x.w.key));
    const any=Engine.shuffle(GWORDS.filter(w=>!have2.has(w.key)));
    for(let i=0;i<any.length&&q.length<N;i++)q.push({w:any[i],type:srsType(any[i])});
  }
  return q;
}
function srsType(w){
  const single = w.en && !/\s/.test(w.en);
  const seen = P.srs[w.key] && P.srs[w.key][0]>0;
  /* 明示選択モード（不可能な語は4択にフォールバック） */
  if(EFMT==='spell')  return (single&&seen)?'spell':'e2j';
  if(EFMT==='colloc') return (seen&&window.COLLOC&&window.COLLOC[w.en])?'colloc':'e2j';
  if(EFMT==='mc')     return Math.random()<0.5?'j2e':'e2j';
  const r=Math.random();
  if(r<0.15&&w.ex&&new RegExp(stem(w.en),'i').test(w.ex)) return 'cloze';
  /* 語法/コロケーション(短文穴埋め・英検形式)。既習＋データがある語のみ */
  if(r<0.30&&seen&&window.COLLOC&&window.COLLOC[w.en]) return 'colloc';
  /* スペル入力: 既習(box>0)の単語のみ。最初の文字＋文字数ヒントで足場をかける */
  if(r<0.45&&single&&seen) return 'spell';
  if(r<0.62) return 'j2e';
  return 'e2j';
}
function stem(en){ const f=en.split(' ')[0]; return f.slice(0,Math.max(3,f.length-2)).replace(/[^a-zA-Z]/g,''); }

function startMain(){ S={mode:'main',queue:buildMain(),i:0,correct:0,answered:0,caught:[],retried:{}}; if(!S.queue.length){UI.toast('ことばが ないよ');return;} nextQ(true); }

function opts4(item){
  const w=item.w;
  let pool=GWORDS.filter(x=>x.key!==w.key);
  if(!KIDS&&w.pos) { const same=pool.filter(x=>x.pos===w.pos); if(same.length>=3) pool=same; }
  if(KIDS&&w.cat){ const same=pool.filter(x=>x.cat===w.cat); if(same.length>=3) pool=same; }
  const ds=Engine.shuffle(pool).slice(0,3);
  return Engine.shuffle([w,...ds]);
}

/* pre-1: 4-choice / cloze */
function renderSRS(item){
  const w=item.w, t=item.type;

  let qhtml='';

  } else if(t==='j2e'){
    qhtml=`<div class="qword"><div class="w jp">${furi(w.ja)}</div>
      <div class="pos"><span class="tag">${w.pos||''}</span> <span class="small">英語では?</span></div></div>

    qhtml=`<div class="qword"><div class="ex" style="font-size:18px;color:var(--ink);line-height:1.7">${sent}</div>
      <div class="small" style="margin-top:8px">🧩 ぶんに あう ことばは？　ヒント: ${furi(w.ja)}</div></div>
      <div>${choices.map((c,i)=>`<button class="opt" id="op${i}" onclick="ansColloc(${i})">${c}</button>`).join('')}</div>`;
  } else if(t==='spell'){
    const masked=w.en.replace(/[a-zA-Z]/g,'_');
    qhtml=`<div class="qword"><div class="w jp">${furi(w.ja)}</div>
      <div class="pos"><span class="tag">${w.pos||''}</span> <span class="small">⌨️ えいごで かいてみよう</span></div></div>
      <div style="text-align:center;margin-top:10px">
        <input id="spIn" type="text" inputmode="latin" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="えいご スペル"
          style="font-size:24px;text-align:center;width:86%;padding:12px;border:2px solid var(--leaf);border-radius:14px;letter-spacing:2px"
          onkeydown="if(event.key==='Enter')ansSpell()">

function ansSpell(){
  if(S.__locked)return; const item=S.queue[S.i], w=item.w;
  const inp=$('#spIn'); if(!inp)return;
  const val=(inp.value||'').trim().toLowerCase().replace(/\s+/g,' ');
  if(!val)return;
  S.__locked=true; inp.disabled=true;
  const ok = val === w.en.trim().toLowerCase();
  afterAnswer(item,ok,
    ok?'せいかい! ⌨️✨':'おしい!',
    `<b>${w.en}</b> ${w.pos?'['+w.pos+']':''} ＝ ${furi(w.ja)}`);

  if(!ok){ const ci=S.colloc.indexOf(w.en); if(ci>=0)$('#op'+ci).classList.add('ok'); }
  const full=Engine.esc(window.COLLOC[w.en].sentence).replace('___','<b>'+w.en+'</b>');
  afterAnswer(item,ok, ok?'せいかい! 🧩':'おしい!', `<b>${w.en}</b> ＝ ${furi(w.ja)}<br><span class="small">${full}</span>`);

function ansSRS(i){
  const item=S.queue[S.i], w=item.w, ok=S.cards[i].key===w.key;
  document.querySelectorAll('.opt').forEach(b=>b.onclick=null);
  $('#op'+i).classList.add(ok?'ok':'ng');
  if(!ok){ const ci=S.cards.findIndex(c=>c.key===w.key); $('#op'+ci).classList.add('ok'); }
  const exB=w.ex?w.ex.replace(new RegExp('(\\b'+stem(w.en)+'[a-z]*)','i'),'<b>$1</b>'):'';
  /* 不正解＋英単語選択肢(j2e/cloze)のとき、選んだ語の意味も見せる（任意設定・上位レベルの学習補助） */
  let pickInfo='';
  if(!ok && item.type!=='e2j' && CFG.showMeaning){
    const picked=S.cards[i];
    if(picked && picked.key!==w.key && picked.en && picked.ja)
      pickInfo=`<div class="small" style="margin-top:6px;opacity:.85">えらんだ <b>${picked.en}</b> は『${furi(picked.ja)}』</div>`;
  }
  afterAnswer(item,ok,
    ok?'せいかい!':'おしい!',
    `<b>${w.en}</b> ${w.pos?'['+w.pos+']':''} ＝ ${furi(w.ja)}${exB?'<br>'+exB:''}${pickInfo}`);
  if(item.type!=='e2j') Speech.say(w.en);
}

/* ---------- scoring ---------- */
function afterAnswer(item,ok,title,detail){
  S.answered++;
  if(ok) S.correct++;
  if(!item.retry){
    if(item.type==='kids'){
      const k=P.kids[item.w.key]||[0,0,0];
      k[0]++; if(ok)k[1]++; else k[2]++;
      P.kids[item.w.key]=k;
    } else {
      SRS.grade(P,item.w.key,ok);
    }
  }
  let res=null;
  if(S&&S.mode==='review'){
    /* 復習モード: Q4BReward レアブーストで採集。二重採集なし */
    if(ok&&window.Q4BReward){
      const coll={gauge:P.reviewGauge||0, total:0, catches:P.catches,
        recent:(P.recent||(P.recent=[])), acc:P.reviewAcc||0};
      const raw=Q4BReward.onCorrect(coll,'eitango',8,Q4BReward.REVIEW_BOOST,item.w.key,(P.srs[item.w.key]&&P.srs[item.w.key][0]>=3?0.4:1));
      P.reviewGauge=coll.gauge;
      P.reviewAcc=coll.acc;  /* 新しさ係数の端数を保持 */
      P.amberTotal=(P.amberTotal||0)+1;
      if(raw){
        /* rawのsp はオブジェクト形式 → ALLSP配列行に変換 */
        var spRow=ALLSP.find(function(s){return s[0]===raw.sp.id;});
        if(spRow){
          res={sp:spRow,size:raw.size,shiny:raw.shiny,isNew:raw.isNew,isRecord:raw.isRecord};
        }
      }
    }
    const tc=P.cal[Engine.todayKey()]||(P.cal[Engine.todayKey()]={q:0,c:0});
    tc.q++; if(ok){tc.c++;} Engine.touchStreak(P);
  } else {
    res=Reward.onAnswer(P,ok,GFID,item.w.key);  // 同じ語の連打を検知（新しさ係数）
  }
  if(res){ S.caught.push(res); pendingCatch=res; }
  if(!ok&&!item.retry&&S.mode==='main'&&!S.retried[item.w.key]){
    S.retried[item.w.key]=1;
    S.queue.push({w:item.w,type:item.type,retry:true});
  }
  touchP();
  showFB(ok,title,detail);
}
function showFB(ok,title,detail){
  $('#fbwrap').innerHTML=`<div class="fb ${ok?'good':'bad'}" id="fb">
    <div class="ft">${title}</div><div class="fd">${detail}</div>
    <button onclick="closeFB()">つぎへ ▶</button></div>`;
  requestAnimationFrame(()=>$('#fb').classList.add('show'));
}
function closeFB(){
  $('#fbwrap').innerHTML='';
  S.i++;
  nextQ();
}

/* ---------- catch animation ---------- */
function showCatch(res,then){
  $('#modal').innerHTML=`<div class="mcard">
    <div style="font-weight:800;font-size:19px">🍃 なにか いるぞ…!</div>
    <span class="bush">🌿</span>
    <button class="btn amber" id="netBtn">あみを ふる! 🥅</button></div>`;
  $('#modal').classList.add('show');
  window.__cn=then||null;
  $('#netBtn').onclick=()=>{
    $('#modal').innerHTML=`<div class="mcard">
      <div style="font-weight:800;font-size:19px">つかまえた!</div>
      ${UI.specCard(res)}
      <button class="btn" onclick="closeCatch()">つづける ▶</button></div>`;
  };
}
function closeCatch(){
  const cb=window.__cn;
  closeModal();
  if(typeof cb==='function') cb();
}

/* ---------- end ---------- */
function endSession(){
  let bonus=0;
  if(S.mode==='main'){ bonus=5; if(window.QuestSave){QuestSave.amberAdd(ePid(),5);}else{P.amber+=5;} P.amberTotal+=5; }
  let nushiHtml='';
  if(S.mode==='nushi'){
    if(S.correct>=S.need){
      const res=Reward.catchNushi(P,GFID);
      nushiHtml=`<div style="font-weight:800;font-size:20px;margin-top:8px">👑 ヌシを つかまえた!!</div>${UI.specCard(res)}`;
    } else {
      nushiHtml=`<div class="card"><b>ヌシは にげていった…</b><p class="small">せいかい ${S.correct}/${S.queue.length}．${S.need}もん いじょうで ゲット．また ちょうせんしよう!</p></div>`;
    }
  }
  /* progressSummaryを更新 */
  const newSumm=calcProgressSummary();
  if(P.progressSummary!==newSumm) P.progressSummary=newSumm;
  touchP();
  const pct=S.answered?Math.round(S.correct/S.answered*100):0;
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  $('#app').innerHTML=`<div class="topbar"><span class="ttl">たんけん おわり!</span></div>
  <div class="card center">
    <div style="font-size:36px">${stars}</div>
    <div style="font-weight:800;font-size:22px;margin-top:4px">せいかい ${S.correct} / ${S.answered}</div>
    <div class="small" style="margin-top:6px">🟡 +${S.correct+bonus} (クリアボーナス+${bonus}) ／ 🔥れんぞく ${P.streak.n}日</div>
  </div>
  ${nushiHtml}
  ${S.caught.length?`<div class="h2">きょうの せいか</div><div class="zgrid">${S.caught.map(r=>`
    <div class="zc ${r.shiny?'shiny':''}" style="--rc:var(--rar${r.sp[4]})">
      <span class="ze">${spSVG(r.sp,36,r.shiny)}</span><span class="zn">${r.sp[1]}</span><span class="zs">${r.size}mm${r.isNew?' NEW':''}</span></div>`).join('')}</div>`:''}
  <button class="btn" onclick="renderStart()">もういちど あそぶ</button>
  <button class="btn sub" onclick="screen='zukan';S=null;render();">📖 ずかんを みる</button>
  <button class="btn ghost" onclick="exitToMap()">マップへ もどる</button>`;
  S=null;
}

/* ---------- launch ---------- */
boot();

</script>
