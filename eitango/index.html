<style>
:root{
  --paper:#f1ead2; --card:#fbf7e8; --ink:#2b2417; --sub:#6f6450;
  --leaf:#4a7c2f; --moss:#2f5d2f; --amber:#dd9a14; --amber2:#b97c08;

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic",system-ui,sans-serif;

  transition:background .6s,color .6s;
}
body.night{
  --paper:#0f1828; --card:#1a2740; --ink:#e8ecdf; --sub:#9aa68f;
  --leaf:#5d9c42; --moss:#3f7030;
}
#app{max-width:680px;margin:0 auto;min-height:100%;padding:12px 14px 96px;position:relative}
button{font-family:inherit;border:none;cursor:pointer;color:inherit;background:none;font-size:inherit}

.topbar{display:flex;align-items:center;gap:8px;padding:6px 2px 10px;flex-wrap:wrap}
.topbar .ttl{font-weight:800;font-size:19px;letter-spacing:.04em}
.topbar .sp{flex:1}
.chip{background:var(--card);border-radius:999px;padding:6px 12px;font-size:14px;font-weight:700;box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:5px}
.chip small{font-weight:600;color:var(--sub)}
.btn{display:block;width:100%;background:var(--leaf);color:#fff;border-radius:var(--r);
  padding:16px;font-size:18px;font-weight:800;box-shadow:0 4px 0 var(--moss);margin-top:12px;text-align:center}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--moss)}
.btn.sub{background:var(--card);color:var(--ink);box-shadow:0 4px 0 rgba(43,36,23,.18)}
.btn.amber{background:var(--amber);box-shadow:0 4px 0 var(--amber2)}
.btn.danger{background:var(--bad);box-shadow:0 4px 0 #8e3517}
.btn.ghost{background:none;box-shadow:none;color:var(--sub);font-size:15px;padding:10px}
.btn:disabled{opacity:.45;pointer-events:none}
.card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-top:12px}
.h2{font-size:14px;font-weight:800;color:var(--sub);letter-spacing:.12em;margin:20px 2px 2px}
.row{display:flex;gap:10px;align-items:center}
.center{text-align:center}
.small{font-size:13px;color:var(--sub);line-height:1.55}
.tag{display:inline-block;font-size:12px;font-weight:800;border-radius:8px;padding:2px 8px;color:#fff;background:var(--sub)}

#nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  box-shadow:0 -2px 10px rgba(0,0,0,.12);display:flex;z-index:50;
  padding-bottom:env(safe-area-inset-bottom)}
#nav button{flex:1;padding:10px 0 8px;font-size:11px;font-weight:700;color:var(--sub)}
#nav button .ic{display:block;font-size:22px;margin-bottom:2px}
#nav button.on{color:var(--leaf)}

.field{border-radius:22px;padding:18px;margin-top:14px;color:#fff;position:relative;
  overflow:hidden;box-shadow:0 5px 0 rgba(0,0,0,.22);width:100%;text-align:left;display:block}
.field:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.22)}
.field .fe{font-size:42px;position:absolute;right:14px;top:50%;transform:translateY(-50%);filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))}
.field .fn{font-size:21px;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.35)}
.field .fs{font-size:13px;font-weight:700;opacity:.92;margin-top:3px;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.field .fp{margin-top:10px;background:rgba(0,0,0,.25);border-radius:999px;height:10px;overflow:hidden;max-width:72%}
.field .fp i{display:block;height:100%;background:#ffd86b;border-radius:999px}
.field .fz{font-size:12px;font-weight:700;margin-top:6px;opacity:.95;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.field.lock{filter:grayscale(.75) brightness(.82)}
.f-garden{background:linear-gradient(135deg,#7cb342,#4a7c2f)}
.f-pond{background:linear-gradient(135deg,#4fc3f7,#1565c0)}
.f-woods{background:linear-gradient(135deg,#8d6e63,#4e342e)}
.f-mt{background:linear-gradient(135deg,#90a4ae,#37474f)}
.f-cave{background:linear-gradient(135deg,#6d5e72,#2c2433)}
.f-jungle{background:linear-gradient(135deg,#26a69a,#1b5e20)}

.nightbadge{display:inline-block;background:#1a2740;color:#ffd86b;border:1px solid rgba(255,216,107,.4);

.qbar{height:12px;background:var(--card);border-radius:999px;overflow:hidden;margin:6px 0 14px;box-shadow:var(--shadow)}
.qbar i{display:block;height:100%;background:linear-gradient(90deg,var(--leaf),#9ccc65);border-radius:999px;transition:width .3s}
.qword{background:var(--card);border-radius:22px;padding:24px 18px;text-align:center;box-shadow:var(--shadow)}

<script>
/* ===== inlined word data (was data/words_basic.js, data/words_p1.js) ===== */
const {BASICRAW,P1A,P1B,P1C,P1D,FIELD2RAW,FIELD3RAW,FIELD4RAW,FIELD5RAW,PRE1RAW,ICHIRAW}=window.Q4B_EI_RAW;  /* データは ../shared/eitango_data.js */



/* ========================================================================
   quest4bugs えいたんご — self-contained single file.
   Storage: window.QuestSave (../shared/storage.js)
   Insects: window.Q4B_BUGS (../shared/bugs.js) via buildSpecies() adapter.
   ======================================================================== */

const $=s=>document.querySelector(s);

/* ---------------- Engine: date / theme / shuffle / esc ---------------- */
const Engine = {
  ymd(d = new Date()) { return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate(); },
  todayKey() { return this.ymd(); },
  addDays(ymdNum, n) {
    const s = String(ymdNum);
    const d = new Date(+s.slice(0, 4), +s.slice(4, 6) - 1, +s.slice(6, 8));
    d.setDate(d.getDate() + n);
    return this.ymd(d);
  },
  isNight() { const h = new Date().getHours(); return h >= 18 || h < 5; },
  applyTheme() {
    if (this.isNight()) {
      document.body.classList.add('night');
      if (!document.querySelector('.firefly')) {
        for (let i = 0; i < 6; i++) {
          const f = document.createElement('div');
          f.className = 'firefly';
          f.style.left = (5 + Math.random() * 90) + '%';
          f.style.top = (20 + Math.random() * 70) + '%';
          f.style.animationDelay = (Math.random() * 8) + 's';
          document.body.appendChild(f);
        }
      }
    }
  },
  touchStreak(p) {
    const t = this.todayKey();
    if (p.streak.last === t) return;
    const y = this.addDays(t, -1);
    p.streak.n = (p.streak.last === y) ? p.streak.n + 1 : 1;
    p.streak.best = Math.max(p.streak.best, p.streak.n);
    p.streak.last = t;
  },
  shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]]; } return b; },
  esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
};

/* ---------------- Speech (reads rate from CFG, set after load) -------- */
const CFG = { rate: 0.9, showMeaning: true };
const Speech = {
  voice: null,
  init() {
    if (!('speechSynthesis' in window)) return;
    const pick = () => {
      const vs = speechSynthesis.getVoices();
      this.voice = vs.find(v => v.lang === 'en-US') || vs.find(v => v.lang && v.lang.startsWith('en')) || null;
    };
    pick();
    speechSynthesis.onvoiceschanged = pick;
  },
  say(t, rate) {
    if (!('speechSynthesis' in window)) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(t);
      if (this.voice) u.voice = this.voice;
      u.lang = 'en-US';
      u.rate = rate || CFG.rate || 0.9;
      speechSynthesis.speak(u);
    } catch (e) {}
  }
};

/* ---------------- Fields (level bands) ---------------- */
const FIELDS = [

/* ========================================================================
   SPECIES adapter: bugs.js -> engine-compatible [id, jaName, sciName,
   field, tier, nightFlag, sizeMin, sizeMax, emoji, note]
   Deterministic field/tier/size/night/emoji from the bug's id & rarity.
   ======================================================================== */
function hashStr(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return (h>>>0); }

/* rarity 'N'|'R'|'SR'|'SSR'|'SS' -> tier 0..4。reward.js (kanji/keisan) と同じ5段階体系。
   旧4段階 (SR/SSR 統合) は SR:SSR=4.7:1 の偏りを覆い隠していたため分離した。 */
function rarityToTier(r){
  if(r==='N')return 0;
  if(r==='R')return 1;
  if(r==='SR')return 2;
  if(r==='SSR')return 3;
  return 4; /* SS = でんせつ */
}

/* emoji from renderer/family */
const RENDERER_EMOJI={
  kabuto:'🪲', kuwagata:'🪲', chou:'🦋', semi:'🪰', tombo:'🪰',
  batta:'🦗', kamakiri:'🦗', tentou:'🐞', ari:'🐜', hachi:'🐝',
  hotaru:'🪲', mizu:'🪲', kemushi:'🐛', dango:'🪲', other:'🪲'
};
function emojiFor(b){
  const tags=b.tags||[];
  if(tags.indexOf('butterfly')>=0||tags.indexOf('moth')>=0)return '🦋';
  if(tags.indexOf('ant')>=0)return '🐜';
  if(tags.indexOf('bee')>=0)return '🐝';
  if(tags.indexOf('ladybird')>=0)return '🐞';
  if(tags.indexOf('dragonfly')>=0)return '🪰';
  if(tags.indexOf('cicada')>=0)return '🪰';
  if(tags.indexOf('orthoptery')>=0||tags.indexOf('orthoptera')>=0||tags.indexOf('mantis')>=0)return '🦗';
  if(b.groupJa&&b.groupJa.indexOf('ガ')>=0)return '🦋';
  return RENDERER_EMOJI[b.renderer]||'🪲';
}

/* deterministic size range (mm) from family / rarity / id hash */
/* 実寸 sizeMm:[min,max] があればそれを優先。無ければ旧アルゴリズム(legacy) */
function sizeRange(b){
  if(b&&b.sizeMm&&b.sizeMm.length===2&&b.sizeMm[1]>b.sizeMm[0]) return [b.sizeMm[0], b.sizeMm[1]];
  return legacySizeRange(b);
}
function legacySizeRange(b){
  const h=hashStr(b.id);
  const fam=b.family||'', tier=rarityToTier(b.rarity);
  let base, span;
  if(fam==='Lucanidae'){ base=40; span=70; }            /* stag beetles */
  else if(fam==='Scarabaeidae'){ base=25; span=70; }    /* kabuto/chafer */
  else if(fam==='Cerambycidae'){ base=20; span=40; }    /* longhorn */
  else if(fam==='Papilionidae'){ base=70; span=60; }    /* swallowtail */
  else if(fam==='Nymphalidae'){ base=45; span=40; }
  else if(fam==='Pieridae'){ base=35; span=25; }
  else if(fam==='Lycaenidae'){ base=18; span=18; }      /* small blues */
  else if(fam==='Cicadidae'){ base=40; span=35; }
  else if(b.order==='Odonata'){ base=35; span=45; }
  else if(b.order==='Orthoptera'){ base=25; span=55; }
  else if(b.order==='Mantodea'){ base=55; span=45; }
  else if(b.order==='Hymenoptera'){ base=8; span=18; }
  else if(b.order==='Hemiptera'){ base=12; span=40; }
  else if(fam==='Coccinellidae'){ base=5; span=6; }
  else if(fam==='Formicidae'){ base=4; span=8; }
  else { base=15; span=30; }
  /* big-rarity nudge (5段階: N/R/SR/SSR/SS) */
  const rarMul=[0.85,1.0,1.15,1.22,1.3][tier];
  span=span*rarMul;
  const minJit=(h%17)/17*0.25;           /* 0..0.25 of span */
  const min=Math.round(base+span*minJit);
  const max=Math.round(min+span*(0.55+((h>>5)%13)/13*0.4));
  return [min, Math.max(max,min+3)];
}

/* deterministic field assignment: spread eitango species across f1-f7.
   Rarity tier maps to field band; hash spreads within band.
   tier0 N      -> f1/f2/f3 (ratio 2:1:1)
   tier1 R      -> f2/f3/f4/f5/f6 (ratio 1:2:2:2:1)
   tier2 SR     -> f5/f6/f7 (ratio 1:2:2)
   tier3 SSR    -> f5/f6/f7 (SR と同 band; 母数差を field 分布で吸収しない)
   tier4 SS     -> f6/f7    (最希少フィールドに集約; ヌシ選定の母数を確保) */
function fieldFor(b){
  const tier=rarityToTier(b.rarity);
  const h=hashStr(b.id);
  if(tier===0){
    const pick=h%4;
    if(pick<=1)return 1;
    if(pick===2)return 2;
    return 3;
  }
  if(tier===1){
    const pick=h%8;
    if(pick===0)return 2;
    if(pick<=2)return 3;
    if(pick<=4)return 4;
    if(pick<=6)return 5;
    return 6;
  }
  if(tier===2 || tier===3){
    /* SR/SSR: 同じ band 配置（旧仕様維持で id 配置が変わらないようにする） */
    const pick=h%5;
    if(pick===0)return 5;
    if(pick<=2)return 6;
    return 7;
  }
  /* tier4 SS: f6/f7 に集約 */
  return (h%2===0)?6:7;
}

/* night flag 0/2 = either, 1 = night */
function nightFor(b){
  const tags=b.tags||[];
  if(tags.indexOf('firefly')>=0)return 1;
  if(tags.indexOf('cicada')>=0&&b.id==='higurashi')return 1;
  if(b.id==='suzumushi'||b.id==='enma_koorogi')return 1;
  if((b.note||'').indexOf('夜')>=0)return 1;
  return 2; /* default: either */
}

let SPECIES=[], NUSHI=[], ALLSP=[];
const SPECIES_SRC={}; /* id -> bugs.js object (for SVG renderer) */
function buildSpecies(){
  /* restrict to eitango-assigned species (Q4BReward.gameFor === 'eitango').
     ボス(bossOnly)・マスター虫(masterOnly) は通常採集対象外（モズ・サソリ等が Engine.roll で
     ランダム捕獲されると図鑑にも残らない異常状態になるため）。reward.js の POOLS 構築と同じ基準。
     SS(でんせつ) は SPECIES にはヌシ選定用に残すが、Engine.roll で tier4 除外する。 */
  const allBugs=window.Q4B_BUGS||[];
  const bugs=window.Q4BReward
    ? allBugs.filter(b=>Q4BReward.gameFor(b)==='eitango' && !b.bossOnly && !b.masterOnly)
    : allBugs.filter(b=>!b.bossOnly && !b.masterOnly);
  SPECIES=[]; NUSHI=[];
  /* pick field nushi: highest-rarity exotic per field. */
  for(const b of bugs){
    SPECIES_SRC[b.id]=b;
    const field=fieldFor(b);
    const tier=rarityToTier(b.rarity);
    const [mn,mx]=sizeRange(b);
    const row=[b.id, b.jaName, b.scientificName||'', field, tier, nightFor(b),
              mn, mx, emojiFor(b), b.note||''];
    SPECIES.push(row);
  }
  /* nushi: one fixed legendary per open field, drawn from SS/SSR pool, fixed max size */
  const byField={};
  SPECIES.forEach(s=>{ (byField[s[3]]=byField[s[3]]||[]).push(s); });
  for(const f of FIELDS){
    if(!f.open)continue;
    const pool=byField[f.id]||[];
    if(!pool.length)continue;
    /* prefer tier3 (SS), else highest tier; deterministic pick by max id-hash */
    let best=null, bestKey=-1;
    const maxTier=Math.max(...pool.map(s=>s[4]));
    pool.filter(s=>s[4]===maxTier).forEach(s=>{
      const k=hashStr('nushi'+s[0]);
      if(k>bestKey){ bestKey=k; best=s; }
    });
    if(!best)continue;
    const fixed=best[7]; /* fixed at the species max size */
    /* ヌシは常にでんせつ扱い: tier=4 (SS)。色 (--rar4) と表示が連動。 */
    NUSHI.push(['nushi_'+best[0], 'ぬし'+best[1], best[2], f.id, 4, 2, fixed, fixed, best[8],
                'このフィールドの ぬし．でんせつの 1ぴき']);
    /* nushi shares renderer from its source species */
    const baseId=best[0]; /* e.g. 'hercules_beetle' */
    if(SPECIES_SRC[baseId]) SPECIES_SRC['nushi_'+baseId]=SPECIES_SRC[baseId];
  }
  ALLSP=[...SPECIES,...NUSHI];
}
/* Return SVG for a species row sp, fallback to emoji if renderer unavailable */
function spSVG(sp,size,shiny){
  const id=sp[0].replace(/^nushi_/,'');
  const src=SPECIES_SRC[id]||SPECIES_SRC[sp[0]];
  if(src&&window.Q4BRender){
    return '<span style="display:inline-block;width:'+(size||80)+'px;height:'+(size||80)+'px">'+Q4BRender.species(src,shiny)+'</span>';
  }
  return '<span style="font-size:'+(size||80)+'px;line-height:1">'+sp[8]+'</span>';
}
const specById = id => ALLSP.find(x=>x[0]===id);
function zukanSearchText(sp){
  const src=SPECIES_SRC[sp[0]]||{};
  return [sp[0],sp[1],sp[2],src.orderJa,src.familyJa,src.groupJa].filter(Boolean).join(' ').toLowerCase();
}
function zukanClassKey(sp){
  const src=SPECIES_SRC[sp[0]]||{};
  return src.orderJa||src.groupJa||src.familyJa||'';
}
function zukanClassOptions(list){
  const seen={}, out=[];
  list.forEach(sp=>{ const k=zukanClassKey(sp); if(k&&!seen[k]){ seen[k]=1; out.push(k); } });
  return out.sort((a,b)=>a.localeCompare(b,'ja'));
}
function zukanMatch(sp){
  const q=(zQ||'').trim().toLowerCase();
  if(zR!=='' && String(sp[4])!==String(zR)) return false;
  if(zC!=='' && zukanClassKey(sp)!==zC) return false;
  if(zFav && (!P.favorites||!P.favorites[sp[0]])) return false;
  if(zShiny){ const c=P.catches&&P.catches[sp[0]]; if(!c||!c.shiny) return false; }
  if(q && zukanSearchText(sp).indexOf(q)<0) return false;
  return true;
}
function setZQ(v){ zQ=v||''; render(); setTimeout(()=>{const e=$('#zq'); if(e){e.focus(); e.setSelectionRange(e.value.length,e.value.length);}},0); }
function setZR(v){ zR=(zR===String(v))?'':String(v); render(); }
function setZC(v){ zC=v||''; render(); }
function setZFav(){ zFav=!zFav; render(); }
function setZShiny(){ zShiny=!zShiny; render(); }

/* ---------------- WordDB ---------------- */
let CUSTOM = []; /* loaded from QuestSave('eitango','_custom') */
const WordDB = {
  byField(f) {
    let arr = [];
    if (f === 1 && typeof BASICRAW !== 'undefined') {
      arr = BASICRAW.map(w => ({ key: 'b|' + w[0], en: w[0], ja: w[1], emoji: w[2], cat: w[3], level: 1 }));
    }
    if (f === 2 && typeof FIELD2RAW !== 'undefined') {
      arr = FIELD2RAW.map(w => ({ key: 'f2|' + w[0], en: w[0], ja: w[1], ex: w[2], pos: w[3], level: 2 }));
    }
    if (f === 3 && typeof FIELD3RAW !== 'undefined') {
      arr = FIELD3RAW.map(w => ({ key: 'f3|' + w[0], en: w[0], ja: w[1], ex: w[2], pos: w[3], level: 3 }));
    }
    if (f === 4 && typeof FIELD4RAW !== 'undefined') {
      arr = FIELD4RAW.map(w => ({ key: 'f4|' + w[0], en: w[0], ja: w[1], ex: w[2], pos: w[3], level: 4 }));
    }
    if (f === 5 && typeof FIELD5RAW !== 'undefined') {
      arr = FIELD5RAW.map(w => ({ key: 'f5|' + w[0], en: w[0], ja: w[1], ex: w[2], pos: w[3], level: 5 }));
    }
    if (f === 6 && typeof P1A !== 'undefined') {
      const base = [...P1A, ...P1B, ...P1C, ...P1D].map(w => ({ key: 'p|' + w[0], en: w[0], ja: w[1], ex: w[2], pos: w[3], level: 6 }));
      const baseEnSet = new Set(base.map(w => w.en.toLowerCase().trim()));
      const extra = typeof PRE1RAW !== 'undefined'
        ? PRE1RAW.filter(w => !baseEnSet.has(w[0].toLowerCase().trim()))
                 .map(w => ({ key: 'p|' + w[0], en: w[0], ja: w[1], ex: w[2], pos: w[3], level: 6 }))
        : [];
      arr = [...base, ...extra];
    }
    if (f === 7 && typeof ICHIRAW !== 'undefined') {
      arr = ICHIRAW.map(w => ({ key: 'f7|' + w[0], en: w[0], ja: w[1], ex: w[2], pos: w[3], level: 7 }));
    }
    for (const w of CUSTOM) {
      if (w.level === f) arr.push({ key: 'c|' + w.en, en: w.en, ja: w.ja, ex: w.ex || '', pos: w.pos || '', emoji: w.emoji || '✏️', cat: 'ついか', level: f, custom: true });
    }
    const m = new Map();
    arr.forEach(w => m.set(w.key, w));
    return [...m.values()];
  }
};

/* ---------------- SRS (Leitner) ---------------- */
const SRS = {
  IV: [0, 1, 3, 7, 14, 30],
  NEW_PER_DAY: 50,  /* 新出/日 緩和(2026-06-17): 25→50 ＝ 30問/日ループで飽きにくく */
  grade(p, key, ok) {
    const s = p.srs[key] || [0, 0, 0, 0];
    let [box, due, seen, wrong] = s;
    seen++;
    if (ok) box = Math.min(5, box + 1); else { box = 1; wrong++; }
    due = Engine.addDays(Engine.todayKey(), this.IV[box]);
    p.srs[key] = [box, due, seen, wrong];
  },
  dueList(p, words) {
    const t = Engine.todayKey();
    return words.filter(w => { const s = p.srs[w.key]; return s && s[0] > 0 && s[1] <= t; });
  },
  newList(p, words) { return words.filter(w => !p.srs[w.key]); },
  countBox(p, words) {
    const c = [0, 0, 0, 0, 0, 0];
    words.forEach(w => { const s = p.srs[w.key]; c[s ? s[0] : 0]++; });
    return c;
  },
  mastered(p, words) { return words.filter(w => { const s = p.srs[w.key]; return s && s[0] >= 3; }).length; },
  newBudget(p) {
    const t = Engine.todayKey();
    if (p.newday.date !== t) p.newday = { date: t, count: 0 };
    return Math.max(0, this.NEW_PER_DAY - p.newday.count);
  },
  useNew(p, n) { const t = Engine.todayKey(); if (p.newday.date !== t) p.newday = { date: t, count: 0 }; p.newday.count += n; }
};

/* ---------------- Reward (collection) ---------------- */
const Reward = {
  NEED: 8,
  RARNAME: ['ノーマル', 'レア', 'スーパーレア', 'でんせつ'],
  onAnswer(p, ok, field, itemId) {
    const t = Engine.todayKey();
    const c = p.cal[t] || (p.cal[t] = { q: 0, c: 0 });
    c.q++;
    Engine.touchStreak(p);
    if (!ok) return null;
    c.c++; if(window.QuestSave){QuestSave.amberAdd(ePid(),1);}else{p.amber++;} p.amberTotal++;  // 🔶共有ウォレットへ
    // 新しさ係数: 同じ語の連打でゲージの進みを逓減（最低0.2、違う語は満額1）
    let fresh = 1;
    if (itemId != null) {
      if (!p.recent) p.recent = [];
      let reps = 0; for (let i = 0; i < p.recent.length; i++) if (p.recent[i] === itemId) reps++;
      p.recent.push(itemId); if (p.recent.length > 12) p.recent = p.recent.slice(-12);
      fresh = reps === 0 ? 1 : Math.max(0.2, Math.pow(0.5, reps));
    }
    /* 学習価値: 既マスター語(box>=3)の周回はゲージ伸びを鈍化（薄いフィールド乱獲の抑制） */
    let val = 1; if (itemId && p.srs[itemId] && p.srs[itemId][0] >= 3) val = 0.4;
    p.poolAcc = (p.poolAcc || 0) + fresh * val;
    if (p.poolAcc >= 1) { p.pool++; p.poolAcc -= 1; }   // ゲージは整数を維持
    if (p.pool >= this.NEED) { p.pool -= this.NEED; return this.roll(field, p); }
    return null;
  },
  roll(field, p) {
    const night = Engine.isNight();
    /* 通常採集は tier 0-3 (N/R/SR/SSR) のみ。SS(=tier4, でんせつ) は kanji/keisan と仕様統一で除外
       ── マスター条件達成 / ヌシ討伐 / ボス撃破でのみ入手するルートに統一する。
       reward.js:30 のコメント「SSは習得達成(マスター)/ボス撃破でのみ授与」と整合。 */
    const pool = SPECIES.filter(s => s[3] === field && s[4] < 4);
    if (!pool.length) return null;
    const streakBonus = 1 + Math.min(p.streak.n, 30) * 0.02;
    /* reward.js TIER_WEIGHT=[72,23,5,0.8] に揃えた値。streak は SR/SSR (tier 2,3) に倍率。 */
    const tierW = night
      ? [62, 29, 7.85 * streakBonus, 1.00 * streakBonus]
      : [70, 24, 5.00 * streakBonus, 0.85 * streakBonus];
    const byTier = [0, 1, 2, 3].map(t => pool.filter(s => s[4] === t));
    const tw = byTier.map((a, t) => a.length ? tierW[t] : 0);
    let tot = tw.reduce((a, b) => a + b, 0);
    let r = Math.random() * tot, tier = byTier.findIndex(a => a.length);
    for (let t = 0; t < 4; t++) { if (tw[t] && r < tw[t]) { tier = t; break; } r -= tw[t]; }
    const cand = byTier[tier];
    const ws = cand.map(s => { const n = s[5]; return n === 2 ? 1 : (night ? (n === 1 ? 2.5 : 0.45) : (n === 1 ? 0.45 : 1)); });
    let tot2 = ws.reduce((a, b) => a + b, 0);
    let r2 = Math.random() * tot2, sp = cand[cand.length - 1];
    for (let i = 0; i < cand.length; i++) { if (r2 < ws[i]) { sp = cand[i]; break; } r2 -= ws[i]; }
    const shiny = Math.random() < 0.03;  /* 色違い率は全ゲーム共通(3%) */
    const size = this.rollSize(sp);
    return this.record(p, sp, size, shiny);
  },
  rollSize(sp) {
    const min = sp[6], max = sp[7];
    const v = min + (max - min) * Math.pow(Math.random(), 1.7);
    return Math.round(v * 10) / 10;
  },
  record(p, sp, size, shiny) {
    const id = sp[0];
    const prev = p.catches[id];
    const isNew = !prev;
    const isRecord = !isNew && size > prev.max;
    const prevMin = prev ? (prev.min != null ? prev.min : prev.max) : size;
    const prevNormal = prev ? (prev.normal != null ? prev.normal : 1) : 0;
    const prevRecords = prev ? (prev.records || []) : [];
    /* 個体性別: SPECIES_SRC から bugs.js 側の sexRatio を引く（未定義は50:50） */
    const src = SPECIES_SRC[id] || SPECIES_SRC[id.replace(/^nushi_/,'')] || null;
    const sr = (src && src.sexRatio) || null;
    const sex = (sr && (sr.m+sr.f)>0) ? (Math.random() < sr.m/(sr.m+sr.f) ? "m" : "f") : (Math.random()<0.5?"m":"f");
    /* ヌシは性別不明 (u) で記録 */
    const sexFinal = /^nushi_/.test(id) ? "u" : sex;
    function todayStr(){
      var d=new Date(), y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
      return y+"-"+(m<10?"0":"")+m+"-"+(day<10?"0":"")+day;
    }
    p.catches[id] = {
      n: (prev ? prev.n : 0) + 1,
      max: Math.max(size, prev ? prev.max : 0),
      min: Math.min(size, prevMin),
      shiny: ((prev && prev.shiny) || shiny) ? 1 : 0,
      normal: (prevNormal || (shiny ? 0 : 1)) ? 1 : 0,
      records: prevRecords
    };
    p.catches[id].records.push({d:todayStr(), s:size, sex:sexFinal, shiny:!!shiny});
    return { sp, size, shiny, sex:sexFinal, isNew, isRecord };
  },
  catchNushi(p, field) {
    const n = NUSHI.find(x => x[3] === field);
    if (!n) return null;
    p.nushi[field] = true;
    return this.record(p, n, n[6], false);
  },
  extraCatch(p, field) {
    const t = String(Engine.todayKey());
    if (p.extra.date !== t) p.extra = { date: t, used: 0 };
    if (p.extra.used >= 3 || p.amber < 30) return null;
    p.amber -= 30; p.extra.used++;
    return this.roll(field, p);
  },
  rank(total) {
    const R = [[0, 'かけだし虫とり'], [100, 'みならい虫とり'], [300, 'いちにんまえの虫とり'], [800, 'ベテラン虫とり'], [2000, '虫とりのたつじん'], [5000, 'でんせつの虫はかせ']];
    let r = R[0][1];
    for (const [v, n] of R) { if (total >= v) r = n; }
    return r;
  },
  zukanFor(field) { return ALLSP.filter(s => s[3] === field); }
};

/* ---------------- UI helpers ---------------- */

/* ========================================================================
   QuestSave integration layer
   - Profiles come from the SHARED registry (QuestSave.profiles()).
   - Per-profile eitango progress is stored at ns='eitango', key=profileId.
   - Settings at ('eitango','_settings'); custom words at ('eitango','_custom').
   ======================================================================== */
const NS='eitango';
let PROFILES=[];      /* shared registry list */
let CURID=null;       /* current profile id */
let P=null;           /* current eitango state object (mutable, autosaved) */
let saveTimer=null;

function blankState(){
  return {
    amber:0, amberTotal:0, pool:0, field:1,
    extra:{date:'',used:0},
    catches:{}, nushi:{},
    streak:{n:0,best:0,last:0},
    cal:{}, srs:{}, kids:{}, newday:{date:0,count:0},
    updated:0,
    reviewGauge:0,
    progressSummary:''
  };
}
function normState(s){
  s=s||{};
  const b=blankState();
  for(const k in b){ if(typeof s[k]==='undefined') s[k]=b[k]; }
  s.extra=s.extra||{date:'',used:0};
  s.streak=s.streak||{n:0,best:0,last:0};
  s.newday=s.newday||{date:0,count:0};
  s.catches=s.catches||{}; s.nushi=s.nushi||{};
  s.cal=s.cal||{}; s.srs=s.srs||{}; s.kids=s.kids||{};
  if(typeof s.reviewGauge==='undefined') s.reviewGauge=0;
  if(typeof s.progressSummary==='undefined') s.progressSummary='';
  return s;
}
/* persist current profile state (debounced cloud handled by QuestSave) */
function touchP(){
  if(!P||!CURID)return;
  P.updated=Date.now();
  QuestSave.save(NS, CURID, P);
}
function saveSettings(){ QuestSave.save(NS,'_settings',{rate:CFG.rate, showMeaning:CFG.showMeaning}); }
/* 図鑑詳細モーダルのお気に入りハート: トグル → 保存 → ボタン差し替え。 */
window.eitangoFavTap=function(id){
  if(!P||!P.catches||!window.Q4BReward) return;
  /* eitango は catches を直接 coll として扱う(他ゲームと構造が違う)が、お気に入りは
     P.favorites を独立に持つことで catches に手を入れず安全に追加する。 */
  if(!P.favorites) P.favorites={};
  /* 既存 catches[id] と favorites[id] を1つにまとめた擬似 coll で API を呼ぶ。 */
  var pseudoColl={catches:P.catches, favorites:P.favorites};
  Q4BReward.toggleFavorite(pseudoColl, id);
  touchP();
  var btn=document.querySelector('.q4b-fav-btn[data-bugid="'+id+'"]');
  if(btn){
    var nh=Q4BReward.favoriteButtonHTML(pseudoColl, id, "eitangoFavTap('"+id+"')");
    var tmp=document.createElement('div'); tmp.innerHTML=nh;
    btn.replaceWith(tmp.firstChild);
  }
};

/* 共有ウォレット: 琥珀はプロフィール単位で全ゲーム共通（現在pidを動的参照）＋旧P.amber移行 */
function ePid(){ return CURID||(window.QuestSave&&QuestSave.currentProfile()); }
function eAmber(){ return window.QuestSave?QuestSave.amberOf(ePid()):(P?P.amber||0:0); }
function setupWalletE(){
  if(window.Q4BReward&&window.QuestSave&&Q4BReward.setAmberStore){
    Q4BReward.setAmberStore({
      get:function(){return QuestSave.amberOf(ePid());},
      add:function(n){return QuestSave.amberAdd(ePid(),n);},
      spend:function(n){return QuestSave.amberSpend(ePid(),n);}
    });
  }
  /* 卵育成: fossilFragments を卵コストに再利用 + 卵 store を breeding namespace に */
  if(window.Q4BReward&&window.QuestSave&&Q4BReward.setFossilStore){
    Q4BReward.setFossilStore({
      get:function(){return QuestSave.fossilOf?QuestSave.fossilOf(ePid()):0;},
      spend:function(n){return QuestSave.spendFossil?QuestSave.spendFossil(ePid(),n):false;}
    });
  }
  if(window.Q4BReward&&window.QuestSave&&Q4BReward.setEggStore){
    Q4BReward.setEggStore({
      get:function(){return QuestSave.breedingOf?QuestSave.breedingOf(ePid()):{eggs:[],pendingEggs:[],stats:{totalAbandoned:0}};},
      save:function(s){return QuestSave.breedingSet?QuestSave.breedingSet(ePid(),s):false;}
    });
  }
  if(window.QuestSave&&P&&ePid()&&(P.amber||0)>0&&!P.amberMig){ QuestSave.amberAdd(ePid(),P.amber); P.amber=0; P.amberMig=1; touchP(); }
  if(P&&migrateCatchSizes(P)) touchP();
}
/* 卵生成 / 放棄 ハンドラ (Q4BZukan.detailHTML の opts.onLayEgg/onAbandonEgg から呼ばれる) */
function eitangoLayEgg(spId){

  var sp=window.Q4BReward&&Q4BReward.spById(spId); if(!sp) return;

function eitangoAbandonEgg(spId){

}
function eitangoHatchEgg(spId){
  if(!P) return;
  var coll={catches:P.catches||{},total:P.total||0};
  var r=Q4BReward.hatchEgg(coll, spId);

  P.catches=coll.catches; P.total=coll.total; touchP();
  var m=document.getElementById('modal'); if(m&&typeof closeModal==='function')closeModal();
  if(window.Q4BBreeding){
    Q4BBreeding.playHatchAnimation({egg:r.egg,sp:r.sp,size:r.size,onClose:function(){},onViewZukan:function(){}});
  }
}
/* 既存catchのサイズを 旧レンジ→新(実寸)レンジへ一度だけ移行 */
function migrateCatchSizes(p){
  if(!p||!p.catches||p._sizeMig===2) return false;
  let changed=false;
  for(const id in p.catches){ if(!Object.prototype.hasOwnProperty.call(p.catches,id))continue;
    const e=p.catches[id], b=SPECIES_SRC[id]; if(!e||!b||!b.sizeMm)continue;
    const oldR=legacySizeRange(b), newR=[b.sizeMm[0],b.sizeMm[1]];
    const oldSpan=Math.max(1,oldR[1]-oldR[0]), newSpan=newR[1]-newR[0];
    const remap=v=>{ let pct=(v-oldR[0])/oldSpan; if(pct<0)pct=0; if(pct>1)pct=1; return Math.round((newR[0]+pct*newSpan)*10)/10; };
    if(e.max!=null)e.max=remap(e.max);
    e.min=(e.min!=null)?remap(e.min):e.max;
    changed=true;
  }
  p._sizeMig=2;
  return changed;
}

/* ===== マスター虫（全習得限定）===== */
function masterMetE(sp){
  const f=sp.master.key, fdef=fieldById(f), words=WordDB.byField(f);
  if(!words.length) return false;
  if(fdef && fdef.kids) return words.every(w=>{const k=P.kids[w.key];return k&&k[1]>=2;});
  return words.every(w=>{const s=P.srs[w.key];return s&&s[0]>=3;});
}
function checkMastersE(){
  if(!window.Q4BReward||!Q4BReward.masterBugsFor||!P||!P.catches) return;
  const tmp={catches:P.catches}, awarded=[], queue=[];
  Q4BReward.masterBugsFor('eitango').forEach(sp=>{
    if(Q4BReward.masterObtained(tmp,sp.id)) return;
    if(masterMetE(sp)){
      if(window.Q4BBreeding && Q4BBreeding.openMasterSexPickerModal){ queue.push(sp); }
      else { if(Q4BReward.awardMaster(tmp,sp)) awarded.push(sp); }
    }
  });
  if(awarded.length){ touchP(); showMasterCelebrationE(awarded); }
  if(queue.length){ processEitangoMasterQueue(queue, tmp); }
}
function processEitangoMasterQueue(queue, tmp){
  if(!queue.length) return;
  const sp = queue.shift();
  Q4BBreeding.openMasterSexPickerModal({
    sp: sp, isLegacy: false, allowCancel: true,
    onPick: function(sex){
      Q4BReward.awardMaster(tmp, sp, sex);
      Q4BReward.awardMasterEgg(tmp, sp, sex==='m'?'f':'m');
      P.catches = tmp.catches;
      touchP();
      showMasterCelebrationE([sp]);
      processEitangoMasterQueue(queue, tmp);
    },
    onCancel: function(){
      Q4BReward.awardMaster(tmp, sp);
      P.catches = tmp.catches; touchP();
      processEitangoMasterQueue(queue, tmp);
    }
  });
}
function eitangoPickMasterSex(spId){
  if(!P||!P.catches) return;
  const coll = {catches:P.catches};
  const sp = Q4BReward.spById(spId); if(!sp) return;
  Q4BBreeding.openMasterSexPickerModal({
    sp: sp, isLegacy: true, allowCancel: true,
    onPick: function(sex){
      if(Q4BReward.setMasterSex(coll, sp, sex)){
        P.catches = coll.catches; touchP();
        if(typeof closeModal==='function') closeModal();
      }
    }
  });
}

  const rec=P.catches[sp.id], fd=fieldById(sp.master.key), label=fd?fd.name:'マスター';

    inner=`<div style="font-size:44px;line-height:64px">🎓</div>
      <div style="font-weight:bold;font-size:16px;color:#2b2417;margin-top:4px">まだ ひみつ</div>

      ${sp.familyJa?`<div style="font-size:12px;color:#6f6450">${Engine.esc(sp.familyJa)}</div>`:''}
      <div style="font-size:13px;margin:4px 0">${Q4BReward.TIERNAME[tier]}　${Engine.esc(label)} マスター</div>
      <div style="font-size:13px;color:#6f6450;margin:2px 0">つかまえた おおきさ <b>${caught}</b>　（この虫の範囲: ${sz[0]}〜${sz[1]}mm）</div>
      ${sp.note?`<div style="font-size:12px;color:#6f6450;margin-top:4px">${Engine.esc(sp.note)}</div>`:''}`;
  }
  $('#modal').innerHTML=`<div class="mcard">${zukanDetailHTML(inner+'<button class="btn sub" style="margin-top:12px" onclick="closeModal()">とじる</button>')}</div>`;

function scrHome(){
  const meta=profMeta(CURID);
  const night=Engine.isNight();

/* ---------------- PROGRESS (できたこと) ---------------- */
function calcProgressSummary(){
  /* しゅうとく率50%以上の最上位フィールドを見つける */
  let topLabel='';
  const openFields=FIELDS.filter(f=>f.open);
  for(let i=openFields.length-1;i>=0;i--){
    const f=openFields[i];
    const words=WordDB.byField(f.id);
    if(!words.length) continue;
    let mastered=0;
    if(f.kids){
      mastered=words.filter(w=>{const k=P.kids[w.key];return k&&k[1]>=2;}).length;
    } else {
      mastered=SRS.mastered(P,words);
    }
    if(mastered/words.length>=0.5){ topLabel=f.sub; break; }
  }
  if(topLabel) return '英単語 '+topLabel+'相当';
  /* 全体のしゅうとく数で最低限のラベル */
  let total=0, totalMastered=0;
  for(const f of openFields){
    const words=WordDB.byField(f.id);
    totalMastered+=f.kids
      ? words.filter(w=>{const k=P.kids[w.key];return k&&k[1]>=2;}).length
      : SRS.mastered(P,words);
    total+=words.length;
  }
  if(totalMastered>=10) return '英単語 '+totalMastered+'語 しゅうとく';
  return '';
}

/* ---------------- 習得4段バッジ（🥚→🐛→🟤→🦋） ---------------- */
/* SRS: box 0-5（0=未開始, 習得=box>=3）/ kids: k=[seen,correct,wrong]（習得=correct>=2）
   返り値 {stage:0-3, emoji, label, remain} remain=せいちゅう(習得)まであと何回（習得済みは0） */
function growthStage(w,isKids){
  /* stage: 0=🥚まだ 1=🐛がくしゅう中 2=🟤もうすぐ 3=🦋せいちゅう(習得) */
  let prog,maxStep;
  if(isKids){ const k=P.kids[w.key]; prog=k?k[1]:0; maxStep=2; } /* 正解回数/2でせいちゅう */
  else { const s=P.srs[w.key]; prog=s?s[0]:0; maxStep=3; }       /* box/3でせいちゅう */
  let stage;
  if(prog<=0) stage=0;
  else if(prog>=maxStep) stage=3;
  else if(prog>=maxStep-1) stage=2;
  else stage=1;
  const remain=Math.max(0,maxStep-prog);
  const EMO=['🥚','🐛','🟤','🦋'];
  const LBL=['まだ','がくしゅう中','もうすぐ せいちゅう','せいちゅう'];
  return {stage,emoji:EMO[stage],label:LBL[stage],remain};
}

function scrStats(){
  const meta=profMeta(CURID);

  /* --- 全フィールド横断で学習済み・しゅうとく数を集計 --- */
  const openFields=FIELDS.filter(f=>f.open);
  let totalLearned=0, totalMastered=0, totalWords=0;
  const fieldStats=openFields.map(f=>{
    const words=WordDB.byField(f.id);
    let learned=0, mastered=0;
    if(f.kids){
      learned=words.filter(w=>{const k=P.kids[w.key];return k&&k[1]>=2;}).length;
      mastered=learned; /* kidsは2回正解をしゅうとく扱い */
    } else {
      learned=words.filter(w=>{const s=P.srs[w.key];return s&&s[2]>0;}).length; /* seen>0 */
      mastered=SRS.mastered(P,words);
    }
    totalLearned+=learned;
    totalMastered+=mastered;
    totalWords+=words.length;
    return {f, words, learned, mastered};
  });

  /* --- ずかん採集数 (全フィールド) --- */
  const caught=ALLSP.filter(s=>P.catches[s[0]]).length;
  let q=0,c=0; Object.values(P.cal).forEach(v=>{q+=v.q;c+=v.c;});

  /* --- 7日間バーグラフ --- */
  let bars='';
  for(let i=6;i>=0;i--){
    const k=Engine.addDays(Engine.todayKey(),-i);
    const v=P.cal[k]||{q:0,c:0};
    const max=Math.max(10,...[...Array(7)].map((_,j)=>{const kk=Engine.addDays(Engine.todayKey(),-j);return (P.cal[kk]||{q:0}).q;}));
    const hq=Math.round(v.q/max*100), hc=v.q?Math.round(v.c/v.q*hq):0;
    bars+=`<div class="b"><div class="bw"><i class="t" style="height:${hq-hc}%"></i><i class="c" style="height:${hc}%"></i></div><span>${String(k).slice(6)}日</span></div>`;
  }

  /* --- カレンダー --- */
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  let cal='<div class="cal">'+['日','月','火','水','木','金','土'].map(d=>`<div>${d}</div>`).join('');
  for(let i=0;i<first;i++) cal+='<div></div>';
  for(let d=1;d<=days;d++){
    const k=y*10000+(m+1)*100+d, v=P.cal[k];
    const cls=!v?'':v.q>=30?'d3':v.q>=15?'d2':'d1';
    cal+=`<div class="${cls}">${d}</div>`;
  }
  cal+='</div>';

  /* --- フィールド別一覧HTML --- */
  let fieldRows='';
  for(const {f,words,learned,mastered} of fieldStats){
    const pct=words.length?Math.round(learned/words.length*100):0;
    if(f.kids){
      fieldRows+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06)">
        <span style="font-size:20px">${f.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px">${Engine.esc(f.name)}</div>
          <div style="font-size:11px;color:var(--sub)">${f.sub}</div>
        </div>
        <div style="text-align:right;white-space:nowrap">
          <b>${learned}</b><span style="font-size:11px;color:var(--sub)">/${words.length}語</span>
          <span style="font-size:11px;color:var(--sub);margin-left:4px">おぼえた</span>
        </div>
      </div>`;
    } else {
      fieldRows+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06)">
        <span style="font-size:20px">${f.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px">${Engine.esc(f.name)}</div>
          <div style="font-size:11px;color:var(--sub)">${f.sub}</div>
        </div>
        <div style="text-align:right;white-space:nowrap">
          <b>${learned}</b><span style="font-size:11px;color:var(--sub)">/${words.length}語 学習済</span>
          <span style="font-size:12px;color:var(--good);margin-left:6px">✓${mastered}</span>
        </div>
      </div>`;
    }
  }

/* ---------- 熟語 (jukugo) helpers ----------
   データソース: window.Q4B_IDIOM.byField(fid)
   SRS キー: idiom|<fid>|<en の半角空白を _ に置換>
   ※ reachEng の集計には含めない (battle.html 側で idiom| prefix を除外する想定) */
function idiomKey(fid, en){ return 'idiom|'+fid+'|'+(en||'').toLowerCase().replace(/\s+/g,'_'); }
function idiomList(fid){
  if(!window.Q4B_IDIOM||!window.Q4B_IDIOM.byField) return [];
  return window.Q4B_IDIOM.byField(fid)||[];
}
/* 熟語モード用 queue を構築。50% 意味選択 / 50% 穴埋め。
   既出 (srs に登録ありかつ due 到来) を優先、不足分は新規＋既習で埋める。 */
function buildJukugoQueue(fid, N){
  const all=idiomList(fid);
  if(!all.length) return [];
  const t=Engine.todayKey();
  /* 各熟語に key を付与 */
  const withKey=all.map(it=>{ const k=idiomKey(fid,it.en); return Object.assign({},it,{key:k,fid:fid}); });
  /* due / new / seen に分類 */
  const due=withKey.filter(it=>{ const s=P.srs[it.key]; return s&&s[0]>0&&s[1]<=t; });
  const newer=withKey.filter(it=>!P.srs[it.key]);
  const seen=withKey.filter(it=>{ const s=P.srs[it.key]; return s&&!(s[1]<=t); });
  let pool=[];
  pool=pool.concat(Engine.shuffle(due).slice(0, Math.max(1,N-2)));
  if(pool.length<N){
    const need=N-pool.length;
    pool=pool.concat(Engine.shuffle(newer).slice(0, Math.min(need, 2)));
  }
  if(pool.length<N){
    const have=new Set(pool.map(x=>x.key));
    const fill=Engine.shuffle(seen.filter(x=>!have.has(x.key)));
    for(let i=0;i<fill.length&&pool.length<N;i++) pool.push(fill[i]);
  }
  if(pool.length<N){
    const have2=new Set(pool.map(x=>x.key));
    const any=Engine.shuffle(withKey.filter(x=>!have2.has(x.key)));
    for(let i=0;i<any.length&&pool.length<N;i++) pool.push(any[i]);
  }
  return pool.slice(0,N).map(it=>({
    w:it,
    type: Math.random()<0.5 ? 'jukugo_mc' : 'jukugo_cloze',
    jukugo:true
  }));
}

/* ---------- question queue ---------- */
const SESSION_N=5;
function buildMain(){
  if(!KIDS && EFMT==='jukugo'){
    const q=buildJukugoQueue(GFID, SESSION_N);
    return q;
  }
  const N=SESSION_N;
  if(KIDS){
    const pool=GWORDS.map(w=>{
      const k=P.kids[w.key]||[0,0,0];
      const wt=!k[0]?3:(k[2]>=k[1]?2:1);
      return {w,wt};
    });
    const q=[];
    let bag=[...pool];
    for(let i=0;i<N&&bag.length;i++){
      let tot=bag.reduce((a,x)=>a+x.wt,0), r=Math.random()*tot, pick=bag[0], idx=0;
      for(let j=0;j<bag.length;j++){ if(r<bag[j].wt){pick=bag[j];idx=j;break;} r-=bag[j].wt; }
      bag.splice(idx,1);
      q.push({w:pick.w,type:'kids'});
    }
    return q;
  }
  /* 復習(due)＋新規(1日予算内) → 不足分は既習で補充して つねに N問にそろえる。
     ★復習で全枠を埋めず新語の枠を必ず確保（同じ復習語だけ無限ループする不具合の修正）。
     新語が残っていれば due は最大 N-2 までにして、2枠を新語に回す。 */
  var _newAvail=Math.min(SRS.newBudget(P), SRS.newList(P,GWORDS).length);
  var _dueCap=_newAvail>0 ? Math.max(1, N-2) : N;
  let due=Engine.shuffle(SRS.dueList(P,GWORDS)).slice(0,_dueCap);
  let q=due.map(w=>({w,type:srsType(w)}));
  if(q.length<N){
    const budget=Math.min(SRS.newBudget(P),N-q.length);
    const fresh=Engine.shuffle(SRS.newList(P,GWORDS)).slice(0,budget);
    SRS.useNew(P,fresh.length);
    q=q.concat(fresh.map(w=>({w,type:srsType(w)})));
  }
  if(q.length<N){
    const have=new Set(q.map(x=>x.w.key));
    /* 補充は「あと一歩(box2-3)」を優先。周回がマスターに変わるようにする（マスター済みは最後） */
    const fillPri=w=>{const b=(P.srs[w.key]||[0])[0]||0; return b>=4?-1:b;};
    const seen=Engine.shuffle(GWORDS.filter(w=>P.srs[w.key]&&!have.has(w.key))).sort((a,b)=>fillPri(b)-fillPri(a));
    for(let i=0;i<seen.length&&q.length<N;i++)q.push({w:seen[i],type:srsType(seen[i])});
  }
  if(q.length<N){
    const have2=new Set(q.map(x=>x.w.key));
    const any=Engine.shuffle(GWORDS.filter(w=>!have2.has(w.key)));
    for(let i=0;i<any.length&&q.length<N;i++)q.push({w:any[i],type:srsType(any[i])});
  }
  return q;
}
function srsType(w){
  const single = w.en && !/\s/.test(w.en);
  const seen = P.srs[w.key] && P.srs[w.key][0]>0;
  /* 明示選択モード（不可能な語は4択にフォールバック） */
  if(EFMT==='spell')  return 'spell';  /* 明示選択時は語句でもスペル入力(空白も入力可) */
  if(EFMT==='colloc') return (window.COLLOC&&window.COLLOC[w.en])?'colloc':'e2j';
  if(EFMT==='mc')     return Math.random()<0.5?'j2e':'e2j';
  const r=Math.random();
  if(r<0.15&&w.ex&&new RegExp(stem(w.en),'i').test(w.ex)) return 'cloze';
  /* 語法/コロケーション(短文穴埋め・英検形式)。既習＋データがある語のみ */
  if(r<0.30&&seen&&window.COLLOC&&window.COLLOC[w.en]) return 'colloc';
  /* スペル入力: 既習(box>0)の単語のみ。最初の文字＋文字数ヒントで足場をかける */
  if(r<0.45&&single&&seen) return 'spell';
  if(r<0.62) return 'j2e';
  return 'e2j';
}
function stem(en){ const f=en.split(' ')[0]; return f.slice(0,Math.max(3,f.length-2)).replace(/[^a-zA-Z]/g,''); }

function startMain(){ S={mode:'main',queue:buildMain(),i:0,correct:0,answered:0,caught:[],retried:{}}; if(!S.queue.length){UI.toast(EFMT==='jukugo'?'このフィールドの 熟語データが ないよ':'ことばが ないよ');return;} nextQ(true); }

/* ---------- ask ---------- */
function nextQ(first){
  if(pendingCatch){ const r=pendingCatch; pendingCatch=null; showCatch(r,()=>nextQ()); return; }
  if(!S||S.i>=S.queue.length){ endSession(); return; }
  const item=S.queue[S.i];
  if(item.type==='kids') renderKids(item);
  else if(item.type==='jukugo_mc'||item.type==='jukugo_cloze') renderJukugo(item);
  else renderSRS(item);
}
function header(){
  const pct=Math.round(S.i/S.queue.length*100);
  const gaugeChip=S.mode==='review'
    ? `<span class="chip">🌟${P.reviewGauge||0}/8</span>`
    : `<span class="chip">🐛${P.pool}/${Reward.NEED}</span>`;
  const modeLabel=S.mode==='nushi'?'👑ヌシ戦 ':S.mode==='review'?'🔁ふくしゅう ':'';
  return `<div class="topbar">
    <button class="chip" onclick="quit()">✕ やめる</button><span class="sp"></span>
    ${gaugeChip}<span class="chip">🔶${eAmber()}</span>
  </div>
  <div class="qbar"><i style="width:${pct}%"></i></div>
  <div class="small" style="padding:0 4px">${modeLabel}${S.i+1} / ${S.queue.length}もん ${S.mode==='nushi'?`(せいかい ${S.correct})`:''}</div>`;
}
function quit(){ if(confirm('とちゅうで やめる?')){ touchP(); if(S&&S.mode==='review') exitToMap(); else renderStart(); } }

function opts4(item){
  const w=item.w;
  let pool=GWORDS.filter(x=>x.key!==w.key);
  if(!KIDS&&w.pos) { const same=pool.filter(x=>x.pos===w.pos); if(same.length>=3) pool=same; }
  if(KIDS&&w.cat){ const same=pool.filter(x=>x.cat===w.cat); if(same.length>=3) pool=same; }
  const ds=Engine.shuffle(pool).slice(0,3);
  return Engine.shuffle([w,...ds]);
}

}
const PRAISE=['Great job!','Excellent!','Perfect!','You got it!','Awesome!','Nice!'];
function pickPraise(){ return PRAISE[Math.floor(Math.random()*PRAISE.length)]; }

/* pre-1: 4-choice / cloze */
function renderSRS(item){

      <div>${cards.map((c,i)=>`<button class="opt" id="op${i}" onclick="ansSRS(${i})">${furi(c.ja)}</button>`).join('')}</div>`;
    Speech.say(w.en);
  } else if(t==='j2e'){
    qhtml=`<div class="qword"><div class="w jp">${furi(w.ja)}</div>
      <div class="pos"><span class="tag">${w.pos||''}</span> <span class="small">英語では?</span></div></div>
      <div>${cards.map((c,i)=>`<button class="opt" id="op${i}" onclick="ansSRS(${i})">${c.en}</button>`).join('')}</div>`;
  } else if(t==='colloc'){
    const cd=window.COLLOC[w.en];
    const choices=Engine.shuffle([w.en, ...cd.distractors]);
    S.colloc=choices;
    const sent=Engine.esc(cd.sentence).replace('___','<b style="color:var(--leaf)">______</b>');
    qhtml=`<div class="qword"><div class="ex" style="font-size:18px;color:var(--ink);line-height:1.7">${sent}</div>
      <div class="small" style="margin-top:8px">🧩 ぶんに あう ことばは？　ヒント: ${furi(w.ja)}</div></div>
      <div>${choices.map((c,i)=>`<button class="opt" id="op${i}" onclick="ansColloc(${i})">${c}</button>`).join('')}</div>`;
  } else if(t==='spell'){
    const masked=w.en.replace(/[a-zA-Z]/g,'_');
    qhtml=`<div class="qword"><div class="w jp">${furi(w.ja)}</div>
      <div class="pos"><span class="tag">${w.pos||''}</span> <span class="small">⌨️ えいごで かいてみよう</span></div></div>
      <div style="text-align:center;margin-top:10px">
        <input id="spIn" type="text" inputmode="latin" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="えいご スペル"
          style="font-size:24px;text-align:center;width:86%;padding:12px;border:2px solid var(--leaf);border-radius:14px;letter-spacing:2px"
          onkeydown="if(event.key==='Enter')ansSpell()">
        <div class="small" style="margin-top:8px">さいしょの もじ: <b style="font-size:18px">${w.en[0]}</b>　${masked}（${w.en.replace(/\s/g,'').length}もじ）</div>
        <button class="btn" style="margin-top:10px" onclick="ansSpell()">こたえる</button>
      </div>`;
  } else {
    const blank=w.ex.replace(new RegExp('\\b'+stem(w.en)+'[a-z]*','i'),'＿＿＿');
    qhtml=`<div class="qword"><div class="ex" style="font-size:19px;color:var(--ink)">${blank}</div>
      <div class="small" style="margin-top:8px">ヒント: ${furi(w.ja)}</div></div>
      <div>${cards.map((c,i)=>`<button class="opt" id="op${i}" onclick="ansSRS(${i})">${c.en}</button>`).join('')}</div>`;
  }
  $('#app').innerHTML=header()+qhtml;
  if(t==='spell'){ const ip=$('#spIn'); if(ip)setTimeout(()=>ip.focus(),60); }
}
function ansSpell(){
  if(S.__locked)return; const item=S.queue[S.i], w=item.w;
  const inp=$('#spIn'); if(!inp)return;
  const val=(inp.value||'').trim().toLowerCase().replace(/\s+/g,' ');
  if(!val)return;
  S.__locked=true; inp.disabled=true;
  const ok = val === w.en.trim().toLowerCase();
  afterAnswer(item,ok,
    ok?'せいかい! ⌨️✨':'おしい!',
    `<b>${w.en}</b> ${w.pos?'['+w.pos+']':''} ＝ ${furi(w.ja)}`);
  Speech.say(w.en);
}
function ansColloc(i){
  if(S.__locked)return; S.__locked=true;
  const item=S.queue[S.i], w=item.w, picked=S.colloc[i], ok=picked===w.en;
  document.querySelectorAll('.opt').forEach(b=>b.onclick=null);
  $('#op'+i).classList.add(ok?'ok':'ng');
  if(!ok){ const ci=S.colloc.indexOf(w.en); if(ci>=0)$('#op'+ci).classList.add('ok'); }

}
function ansSRS(i){
  const item=S.queue[S.i], w=item.w, ok=S.cards[i].key===w.key;
  document.querySelectorAll('.opt').forEach(b=>b.onclick=null);
  $('#op'+i).classList.add(ok?'ok':'ng');
  if(!ok){ const ci=S.cards.findIndex(c=>c.key===w.key); $('#op'+ci).classList.add('ok'); }
  const exB=w.ex?w.ex.replace(new RegExp('(\\b'+stem(w.en)+'[a-z]*)','i'),'<b>$1</b>'):'';
  /* 不正解＋英単語選択肢(j2e/cloze)のとき、選んだ語の意味も見せる（任意設定・上位レベルの学習補助） */
  let pickInfo='';
  if(!ok && item.type!=='e2j' && CFG.showMeaning){
    const picked=S.cards[i];
    if(picked && picked.key!==w.key && picked.en && picked.ja)
      pickInfo=`<div class="small" style="margin-top:6px;opacity:.85">えらんだ <b>${picked.en}</b> は『${furi(picked.ja)}』</div>`;

/* ---------- 熟語モード: 出題と回答 ----------
   item.w = {key,en,ja,example,distractors_meaning,distractors_phrase,fid}
   type='jukugo_mc'    : 意味選択 (en を見せて ja を 4 択から選ばせる)
   type='jukugo_cloze' : 穴埋め (example の中の熟語を ___ に置換、選択肢から選ぶ) */
function renderJukugo(item){
  S.__locked=false;
  const w=item.w, t=item.type;
  let qhtml='';
  if(t==='jukugo_mc'){
    const dm=(w.distractors_meaning||[]).slice(0,3);
    const opts=Engine.shuffle([w.ja, ...dm]);
    S.jukugoChoices=opts;
    qhtml=`<div class="qword"><div class="w">${Engine.esc(w.en)}</div>
      <div class="pos"><span class="tag">熟語</span> <span class="small">いみは？</span></div>
      <button class="spk" onclick="Speech.say(${JSON.stringify(w.en)})">🔊</button></div>
      <div>${opts.map((c,i)=>`<button class="opt" id="op${i}" onclick="ansJukugo(${i})">${furi(c)}</button>`).join('')}</div>`;
    Speech.say(w.en);
  } else {
    /* cloze: example から熟語部分を ___ に置換。完全一致ヒットしなければ最初の語の語幹で検索 */
    const ex=w.example||'';
    let blanked=ex, hit=false;
    if(ex){
      const re=new RegExp(w.en.split(/\s+/).map(x=>x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('\\s+'),'i');
      if(re.test(ex)){ blanked=ex.replace(re,'＿＿＿'); hit=true; }
      else {
        const first=w.en.split(/\s+/)[0]||'';
        if(first.length>=3){
          const re2=new RegExp('\\b'+first.replace(/[^a-zA-Z]/g,'').slice(0,Math.max(3,first.length-2))+'[a-z]*','i');
          if(re2.test(ex)){ blanked=ex.replace(re2,'＿＿＿'); hit=true; }
        }
      }
    }
    /* example がない/穴埋めできない場合は単純に「___ the ...」のテンプレに退避 */
    if(!hit) blanked='＿＿＿ … ('+furi(w.ja)+')';
    const dp=(w.distractors_phrase||[]).slice(0,3);
    const opts=Engine.shuffle([w.en, ...dp]);
    S.jukugoChoices=opts;
    qhtml=`<div class="qword"><div class="ex" style="font-size:18px;color:var(--ink);line-height:1.7">${Engine.esc(blanked).replace('＿＿＿','<b style="color:var(--leaf)">＿＿＿</b>')}</div>
      <div class="small" style="margin-top:8px">🧩 ぶんに あう 熟語は？　ヒント: ${furi(w.ja)}</div></div>
      <div>${opts.map((c,i)=>`<button class="opt" id="op${i}" onclick="ansJukugo(${i})">${Engine.esc(c)}</button>`).join('')}</div>`;
  }
  $('#app').innerHTML=header()+qhtml;
}
function ansJukugo(i){
  if(S.__locked)return; S.__locked=true;
  const item=S.queue[S.i], w=item.w, t=item.type;
  const picked=S.jukugoChoices[i];
  const correct = (t==='jukugo_mc') ? w.ja : w.en;
  const ok = picked===correct;
  document.querySelectorAll('.opt').forEach(b=>b.onclick=null);
  $('#op'+i).classList.add(ok?'ok':'ng');
  if(!ok){ const ci=S.jukugoChoices.indexOf(correct); if(ci>=0)$('#op'+ci).classList.add('ok'); }
  const exShown = w.example ? ('<br><span class="small">'+Engine.esc(w.example).replace(new RegExp(w.en.split(/\s+/).map(x=>x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('\\s+'),'i'),'<b>'+Engine.esc(w.en)+'</b>')+'</span>') : '';
  afterAnswer(item, ok,
    ok ? (t==='jukugo_mc'?'せいかい! 🗣':'せいかい! 🧩') : 'おしい!',
    `<b>${Engine.esc(w.en)}</b> ＝ ${furi(w.ja)}${exShown}`);
  Speech.say(w.en);
}

/* ---------- scoring ---------- */
function afterAnswer(item,ok,title,detail){
  S.answered++;
  if(ok) S.correct++;
  if(ok&&window.QuestSave&&QuestSave.recordCorrect)QuestSave.recordCorrect(ePid(),'eitango',1);
  if(!item.retry){
    const wasKids=item.type==='kids';
    const prevStage=growthStage(item.w,wasKids).stage; /* 更新前の段階 */
    if(wasKids){
      const k=P.kids[item.w.key]||[0,0,0];
      k[0]++; if(ok)k[1]++; else k[2]++;
      P.kids[item.w.key]=k;
    } else {
      SRS.grade(P,item.w.key,ok);
    }
    /* 段階が前進したら演出（せいちょう実感） */
    if(ok){
      const g=growthStage(item.w,wasKids);
      if(g.stage>prevStage){
        const isJukugo=(item.type==='jukugo_mc'||item.type==='jukugo_cloze');
        if(isJukugo){
          if(g.stage>=3) UI.toast('🏆 熟語「'+item.w.en+'」を マスターした！');
          else UI.toast(g.emoji+' 熟語「'+item.w.en+'」が '+g.label+' に すすんだ！');
        } else if(g.stage>=3) UI.toast('🦋 「'+item.w.en+'」が せいちゅうに なった！');
        else UI.toast(g.emoji+' 「'+item.w.en+'」が '+g.label+' に すすんだ！');
      }
    }
  }
  let res=null;
  if(S&&S.mode==='review'){
    /* 復習モード: Q4BReward レアブーストで採集。二重採集なし */
    if(ok&&window.Q4BReward){
      const coll={gauge:P.reviewGauge||0, total:0, catches:P.catches,
        recent:(P.recent||(P.recent=[])), acc:P.reviewAcc||0};
      const raw=Q4BReward.onCorrect(coll,'eitango',8,Q4BReward.REVIEW_BOOST,item.w.key,(P.srs[item.w.key]&&P.srs[item.w.key][0]>=3?0.4:1));
      P.reviewGauge=coll.gauge;
      P.reviewAcc=coll.acc;  /* 新しさ係数の端数を保持 */
      P.amberTotal=(P.amberTotal||0)+1;
      if(raw){
        /* rawのsp はオブジェクト形式 → ALLSP配列行に変換 */
        var spRow=ALLSP.find(function(s){return s[0]===raw.sp.id;});
        if(spRow){
          res={sp:spRow,size:raw.size,shiny:raw.shiny,isNew:raw.isNew,isRecord:raw.isRecord};
        }
      }
    }
    const tc=P.cal[Engine.todayKey()]||(P.cal[Engine.todayKey()]={q:0,c:0});
    tc.q++; if(ok){tc.c++;} Engine.touchStreak(P);
  } else {
    res=Reward.onAnswer(P,ok,GFID,item.w.key);  // 同じ語の連打を検知（新しさ係数）
  }
  if(res){ S.caught.push(res); pendingCatch=res; }
  if(!ok&&!item.retry&&S.mode==='main'&&!S.retried[item.w.key]){
    S.retried[item.w.key]=1;
    S.queue.push({w:item.w,type:item.type,retry:true});
  }
  touchP();
  showFB(ok,title,detail);
}
function showFB(ok,title,detail){
  $('#fbwrap').innerHTML=`<div class="fb ${ok?'good':'bad'}" id="fb">
    <div class="ft">${title}</div><div class="fd">${detail}</div>
    <button onclick="closeFB()">つぎへ ▶</button></div>`;
  requestAnimationFrame(()=>$('#fb').classList.add('show'));
}
function closeFB(){
  $('#fbwrap').innerHTML='';
  S.i++;
  nextQ();
}

/* ---------- catch animation ---------- */
function showCatch(res,then){
  $('#modal').innerHTML=`<div class="mcard">
    <div style="font-weight:800;font-size:19px">🍃 なにか いるぞ…!</div>
    <span class="bush">🌿</span>
    <button class="btn amber" id="netBtn">あみを ふる! 🥅</button></div>`;
  $('#modal').classList.add('show');
  window.__cn=then||null;
  $('#netBtn').onclick=()=>{
    $('#modal').innerHTML=`<div class="mcard">
      <div style="font-weight:800;font-size:19px">つかまえた!</div>
      ${UI.specCard(res)}
      <button class="btn" onclick="closeCatch()">つづける ▶</button></div>`;
  };
}
function closeCatch(){
  const cb=window.__cn;
  closeModal();
  if(typeof cb==='function') cb();
}

/* ---------- end ---------- */
function endSession(){
  let bonus=0;
  if(S.mode==='main'){ bonus=5; if(window.QuestSave){QuestSave.amberAdd(ePid(),5);}else{P.amber+=5;} P.amberTotal+=5; }
  let nushiHtml='';
  if(S.mode==='nushi'){
    if(S.correct>=S.need){
      const res=Reward.catchNushi(P,GFID);
      nushiHtml=`<div style="font-weight:800;font-size:20px;margin-top:8px">👑 ヌシを つかまえた!!</div>${UI.specCard(res)}`;
    } else {
      nushiHtml=`<div class="card"><b>ヌシは にげていった…</b><p class="small">せいかい ${S.correct}/${S.queue.length}．${S.need}もん いじょうで ゲット．また ちょうせんしよう!</p></div>`;
    }
  }
  /* progressSummaryを更新 */
  const newSumm=calcProgressSummary();
  if(P.progressSummary!==newSumm) P.progressSummary=newSumm;
  touchP();
  const pct=S.answered?Math.round(S.correct/S.answered*100):0;
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  $('#app').innerHTML=`<div class="topbar"><span class="ttl">たんけん おわり!</span></div>
  <div class="card center">
    <div style="font-size:36px">${stars}</div>
    <div style="font-weight:800;font-size:22px;margin-top:4px">せいかい ${S.correct} / ${S.answered}</div>
    <div class="small" style="margin-top:6px">🟡 +${S.correct+bonus} (クリアボーナス+${bonus}) ／ 🔥れんぞく ${P.streak.n}日</div>
  </div>
  ${nushiHtml}
  ${S.caught.length?`<div class="h2">きょうの せいか</div><div class="zgrid">${S.caught.map(r=>`
    <div class="zc ${r.shiny?'shiny':''}" style="--rc:var(--rar${r.sp[4]})">
      <span class="ze">${spSVG(r.sp,36,r.shiny)}</span><span class="zn">${r.sp[1]}</span><span class="zs">${r.size}mm${r.isNew?' NEW':''}</span></div>`).join('')}</div>`:''}
  <button class="btn" onclick="renderStart()">もういちど あそぶ</button>
  <button class="btn sub" onclick="screen='zukan';S=null;render();">📖 ずかんを みる</button>
  <button class="btn ghost" onclick="exitToMap()">マップへ もどる</button>`;
  S=null;
}

/* ---------- launch ---------- */
boot();

/* ずかんきりかえ (イラスト/しゃしん) を右上にマウント */
if(window.Q4BRender&&Q4BRender.mountZukanModeToggle) Q4BRender.mountZukanModeToggle();
/* 切替時の画面状態を維持 (location.reload を回避)。
   eitango は SPA で render() が現在 screen 変数を再描画する。 */
window.Q4BZukanRerender=function(){ if(typeof render==='function') render(); };
</script>
