<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quest4Bugs — 入口（案C レトロゲーム）</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Courier New',monospace;
    background:#0b0f1a;color:#d8f5e0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none}
  /* 星空＋スキャンライン */
  .stars{position:fixed;inset:0;background-image:
    radial-gradient(1px 1px at 20% 30%,#fff,transparent),
    radial-gradient(1px 1px at 70% 60%,#9fe,transparent),
    radial-gradient(1px 1px at 40% 80%,#fff,transparent),
    radial-gradient(2px 2px at 85% 20%,#ff9,transparent),
    radial-gradient(1px 1px at 55% 15%,#fff,transparent);background-size:cover}
  .scan{position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.25) 0,rgba(0,0,0,.25) 1px,transparent 2px,transparent 4px)}
  .card{position:relative;z-index:5;text-align:center;width:92%;max-width:460px;
    border:4px solid #3ce07a;border-radius:6px;padding:30px 22px;background:rgba(8,20,14,.85);
    box-shadow:0 0 0 4px #0b0f1a,0 0 40px rgba(60,224,122,.4)}
  .pix{font-size:48px;letter-spacing:6px;margin-bottom:6px;filter:contrast(1.2)}
  .logo{font-size:11vw;font-weight:900;line-height:1.05;color:#3ce07a;letter-spacing:2px;
    text-shadow:3px 3px 0 #0a6b3a,6px 6px 0 #063;animation:flick 4s steps(1) infinite}
  @media(min-width:480px){.logo{font-size:52px}}
  @keyframes flick{96%{opacity:1}97%{opacity:.55}98%{opacity:1}}
  .sub{color:#ffe066;font-size:14px;letter-spacing:4px;margin:12px 0 24px;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:.25}}
  .field{display:flex;flex-direction:column;gap:14px;align-items:center}
  .field label{color:#7fffb0;font-size:12px;letter-spacing:3px}
  .field input{width:100%;background:#06140d;border:3px solid #2fae63;border-radius:4px;
    outline:none;color:#aeffc8;font-size:18px;text-align:center;padding:12px;letter-spacing:6px;font-family:inherit}
  .field input:focus{border-color:#ffe066;box-shadow:0 0 12px rgba(255,224,102,.4)}
  .go{width:100%;background:#3ce07a;border:none;color:#04240f;font-weight:900;font-family:inherit;
    font-size:18px;letter-spacing:3px;padding:13px;border-radius:4px;cursor:pointer;
    box-shadow:0 4px 0 #1c8f4a;transition:transform .08s}
  .go:active{transform:translateY(2px);box-shadow:0 2px 0 #1c8f4a}
  .err{min-height:18px;margin-top:14px;color:#ff7a6b;font-size:13px;letter-spacing:2px}
  .credit{margin-top:16px;color:#3a6b4d;font-size:10px;letter-spacing:3px}
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="card">
    <div class="pix">🪲 ⚔️ 🐛</div>
    <div class="logo">QUEST<br>4BUGS</div>
    <div class="sub">★ INSECT ADVENTURE ★</div>
    <div class="field">
      <label>- ENTER PASSWORD TO PROCEED -</label>
      <input id="pw" type="password" inputmode="text" placeholder="••••••" autocomplete="off">
      <button class="go" onclick="tryEnter()">▶ PRESS START</button>
    </div>
    <div class="err" id="err"></div>
    <div class="credit">© FAMILY EDITION</div>
  </div>
  <div class="scan"></div>
<script>
  function tryEnter(){var v=document.getElementById('pw').value;
    document.getElementById('err').textContent = v==='mushi' ? '✅ ACCESS GRANTED（本番ではポータルへ）' : '✕ ACCESS DENIED';}
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')tryEnter();});
</script>
</body>
</html>
