<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Quest4Bugs map mock A</title>
<style>
:root{--bg:#e7f3d8;--ink:#263829;--panel:#fffdf4;--line:#c9d8a8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic",system-ui,sans-serif}
main{max-width:760px;margin:0 auto;padding:14px}
.card{background:var(--panel);border:2px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}
h1{font-size:22px;margin:0 0 4px}.note{font-size:13px;color:#63725c;margin:0}
svg{width:100%;height:auto;display:block;border-radius:18px;box-shadow:0 4px 0 rgba(50,70,30,.15)}
.label{font-weight:900;fill:#21331f}.small{font-size:12px;font-weight:800;fill:#394d35}.btn text{fill:#fff;font-weight:900}.btn rect{filter:drop-shadow(0 3px 0 rgba(0,0,0,.22))}
a{text-decoration:none}.step{fill:#fff7d6;stroke:#b9831c;stroke-width:3}.step text{fill:#5a3a00;font-weight:900}
</style>
</head>
<body>
<main>
  <div class="card">
    <h1>案A: 王者火山島</h1>
    <p class="note">1つの大きな島を3地形に分け、中央火山へ進む「王者への道」を強く見せる案。</p>
  </div>
  <svg viewBox="0 0 760 560" role="img" aria-label="Quest4Bugs 王者火山島マップ">
    <defs>
      <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#7fd6ff"/><stop offset="1" stop-color="#2d78c7"/></linearGradient>
      <linearGradient id="island" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#d6ef92"/><stop offset=".55" stop-color="#7ec76a"/><stop offset="1" stop-color="#d7a05f"/></linearGradient>
    </defs>
    <rect width="760" height="560" fill="url(#sea)"/>
    <path d="M97 322C47 235 103 118 216 82c88-29 138 13 197 13 58 0 105-44 187-10 108 45 148 164 91 259-50 82-155 107-254 122-143 21-282 14-340-144Z" fill="url(#island)" stroke="#426b36" stroke-width="6"/>
    <path d="M120 335C194 260 240 209 320 218c79 8 112 87 176 98 52 9 107-22 167-57" fill="none" stroke="#f3d480" stroke-width="26" stroke-linecap="round"/>
    <path d="M120 335C194 260 240 209 320 218c79 8 112 87 176 98 52 9 107-22 167-57" fill="none" stroke="#8b5d2d" stroke-width="4" stroke-dasharray="10 12" stroke-linecap="round"/>
    <path d="M357 248l46-88 48 88-24 38h-45Z" fill="#7b5240" stroke="#4e352b" stroke-width="5"/>
    <path d="M380 221l22-43 24 43Z" fill="#f05a3d"/>
    <text x="380" y="145" class="label" font-size="24">王者への道</text>
    <a href="./keisan/index.html" class="btn">
      <rect x="73" y="345" width="180" height="58" rx="16" fill="#2f8a4d"/>
      <text x="163" y="381" text-anchor="middle" font-size="20">🪲 けいさん</text>
    </a>
    <a href="./kanji/index.html" class="btn">
      <rect x="274" y="392" width="180" height="58" rx="16" fill="#b66b2d"/>
      <text x="364" y="428" text-anchor="middle" font-size="20">✏️ かんじ</text>
    </a>
    <a href="./eitango/index.html" class="btn">
      <rect x="510" y="339" width="180" height="58" rx="16" fill="#3279bd"/>
      <text x="600" y="375" text-anchor="middle" font-size="20">🔤 えいご</text>
    </a>
    <a href="./battle.html" class="step"><circle cx="404" cy="314" r="36"/><text x="404" y="321" text-anchor="middle" font-size="15">BOSS</text></a>
    <circle cx="310" cy="251" r="18" class="step"/><text x="310" y="256" text-anchor="middle" font-size="13" fill="#5a3a00" font-weight="900">1</text>
    <circle cx="496" cy="314" r="18" class="step"/><text x="496" y="319" text-anchor="middle" font-size="13" fill="#5a3a00" font-weight="900">2</text>
    <text x="147" y="315" class="small">計算の森</text>
    <text x="318" y="485" class="small">漢字の里</text>
    <text x="550" y="315" class="small">英語の湾</text>
  </svg>
</main>
</body>
</html>
