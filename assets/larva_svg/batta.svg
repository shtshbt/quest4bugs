<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="バッタ型若虫 (親の縮小・無翅)">
  <defs>
    <linearGradient id="battaBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7AAA4A"/>
      <stop offset="100%" stop-color="#3A6A2A"/>
    </linearGradient>
  </defs>
  <!-- 体: 横向き、頭部右 -->
  <ellipse cx="34" cy="34" rx="14" ry="8" fill="url(#battaBody)" stroke="#1A3A12" stroke-width="1.8"/>
  <!-- 頭部 -->
  <ellipse cx="48" cy="32" rx="7" ry="6" fill="url(#battaBody)" stroke="#1A3A12" stroke-width="1.8"/>
  <!-- 目 -->
  <circle cx="50" cy="30" r="1.8" fill="#1A1A1A"/>
  <!-- 触角 -->
  <path d="M 52 28 L 58 22 M 50 28 L 54 20" stroke="#1A3A12" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 翅芽 (短い、若虫の特徴) -->
  <path d="M 28 28 Q 32 24 36 28" stroke="#1A3A12" stroke-width="1.2" fill="#5A8A3A"/>
  <!-- 前脚・中脚 -->
  <g stroke="#1A3A12" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M 38 40 L 36 50"/>
    <path d="M 30 40 L 24 50"/>
  </g>
  <!-- 後脚 (太い・くの字) -->
  <path d="M 22 36 Q 14 32 12 42 L 18 50 L 20 48" stroke="#1A3A12" stroke-width="2" stroke-linejoin="round" fill="#5A8A3A"/>
  <path d="M 18 50 L 8 56" stroke="#1A3A12" stroke-width="1.5" stroke-linecap="round"/>
</svg>
