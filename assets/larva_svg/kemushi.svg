<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="毛虫型幼虫">
  <defs>
    <linearGradient id="kemuBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A4830"/>
      <stop offset="100%" stop-color="#2A1F12"/>
    </linearGradient>
  </defs>
  <!-- 太めの黒褐色イモムシ -->
  <g fill="url(#kemuBody)" stroke="#1A1208" stroke-width="1.8">
    <ellipse cx="12" cy="34" rx="7" ry="9"/>
    <ellipse cx="20" cy="35" rx="7" ry="9.5"/>
    <ellipse cx="28" cy="35" rx="7" ry="9.5"/>
    <ellipse cx="36" cy="35" rx="7" ry="9.5"/>
    <ellipse cx="44" cy="35" rx="7" ry="9"/>
    <ellipse cx="52" cy="34" rx="6" ry="7.5"/>
  </g>
  <!-- 頭部 -->
  <circle cx="56" cy="34" r="6" fill="#3A2818" stroke="#1A1208" stroke-width="1.6"/>
  <circle cx="58" cy="32" r="1.3" fill="#FFFDF4"/>
  <!-- 毛束 (各節から放射状) -->
  <g stroke="#E8D8A0" stroke-width="1" stroke-linecap="round" opacity="0.85">
    <!-- 上向き -->
    <line x1="12" y1="26" x2="10" y2="20"/><line x1="12" y1="26" x2="14" y2="19"/>
    <line x1="20" y1="26" x2="18" y2="19"/><line x1="20" y1="26" x2="22" y2="18"/>
    <line x1="28" y1="26" x2="26" y2="19"/><line x1="28" y1="26" x2="30" y2="18"/>
    <line x1="36" y1="26" x2="34" y2="19"/><line x1="36" y1="26" x2="38" y2="18"/>
    <line x1="44" y1="26" x2="42" y2="19"/><line x1="44" y1="26" x2="46" y2="19"/>
    <!-- 下向き -->
    <line x1="12" y1="43" x2="11" y2="50"/>
    <line x1="20" y1="44" x2="19" y2="51"/>
    <line x1="28" y1="44" x2="27" y2="51"/>
    <line x1="36" y1="44" x2="35" y2="51"/>
    <line x1="44" y1="43" x2="43" y2="50"/>
  </g>
  <!-- 赤紋 (ヒトリガ系のアクセント) -->
  <g fill="#D04040" opacity="0.85">
    <circle cx="20" cy="34" r="1.3"/>
    <circle cx="36" cy="34" r="1.3"/>
  </g>
</svg>
