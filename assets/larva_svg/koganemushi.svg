<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="コガネムシ型幼虫">
  <!-- C字曲のコガネムシ系幼虫: 白〜淡黄色、頭(右下)が小さく赤茶 -->
  <defs>
    <linearGradient id="kgBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF0"/>
      <stop offset="100%" stop-color="#E8DFB8"/>
    </linearGradient>
  </defs>
  <!-- 胴体: C字 -->
  <path d="M 18 14 Q 8 30 18 48 Q 32 56 46 48 Q 50 38 40 32 Q 50 22 42 16 Q 32 8 18 14 Z"
        fill="url(#kgBody)" stroke="#7A6840" stroke-width="2" stroke-linejoin="round"/>
  <!-- 体節 (3 本の縞) -->
  <path d="M 22 20 Q 18 32 22 44" stroke="#9A8650" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M 30 16 Q 26 32 30 48" stroke="#9A8650" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M 38 16 Q 36 30 38 46" stroke="#9A8650" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- 頭部: 右下、小さく赤茶 -->
  <circle cx="44" cy="48" r="6" fill="#8C5A2E" stroke="#4A2E14" stroke-width="1.5"/>
  <!-- 大顎 -->
  <path d="M 47 51 L 50 53 M 47 45 L 50 43" stroke="#3A1F0E" stroke-width="1.3" stroke-linecap="round"/>
  <!-- 脚 (前胸 3 対) -->
  <path d="M 20 36 L 14 38 M 26 38 L 22 42 M 32 39 L 30 44" stroke="#7A6840" stroke-width="1.4" stroke-linecap="round" fill="none"/>
</svg>
