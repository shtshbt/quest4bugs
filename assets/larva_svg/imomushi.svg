<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="イモムシ型 (蝶蛾の典型幼虫)">
  <!-- 緑のセグメント体・頭の点目 -->
  <defs>
    <linearGradient id="imoBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8C870"/>
      <stop offset="100%" stop-color="#5E8C3A"/>
    </linearGradient>
  </defs>
  <!-- 体節: 7 つの円が連なる -->
  <g stroke="#3F6822" stroke-width="1.8" fill="url(#imoBody)">
    <ellipse cx="12" cy="34" rx="7" ry="8"/>
    <ellipse cx="20" cy="35" rx="7" ry="8.5"/>
    <ellipse cx="28" cy="35" rx="7" ry="8.5"/>
    <ellipse cx="36" cy="35" rx="7" ry="8.5"/>
    <ellipse cx="44" cy="35" rx="7" ry="8"/>
    <ellipse cx="52" cy="34" rx="6" ry="7"/>
  </g>
  <!-- 頭部 (右端、丸い) -->
  <circle cx="56" cy="34" r="6" fill="#7AA84A" stroke="#3F6822" stroke-width="1.8"/>
  <!-- 目 -->
  <circle cx="58" cy="32" r="1.4" fill="#1A1A1A"/>
  <!-- 腹脚 (5 対の小さい突起) -->
  <g stroke="#3F6822" stroke-width="1.5" stroke-linecap="round">
    <line x1="12" y1="42" x2="11" y2="46"/>
    <line x1="20" y1="44" x2="19" y2="48"/>
    <line x1="28" y1="44" x2="27" y2="48"/>
    <line x1="36" y1="44" x2="35" y2="48"/>
    <line x1="44" y1="43" x2="43" y2="47"/>
  </g>
  <!-- 背中の白点 (任意のアクセント) -->
  <g fill="#FFFDF4" opacity="0.7">
    <circle cx="20" cy="30" r="1"/>
    <circle cx="36" cy="30" r="1"/>
  </g>
</svg>
