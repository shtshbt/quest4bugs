<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="ゴキブリ若虫 (扁平・無翅)">
  <defs>
    <linearGradient id="gokiBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5028"/>
      <stop offset="100%" stop-color="#3A2410"/>
    </linearGradient>
  </defs>
  <!-- 楕円扁平体 -->
  <ellipse cx="32" cy="34" rx="20" ry="14" fill="url(#gokiBody)" stroke="#1A0F08" stroke-width="1.8"/>
  <!-- 前胸 (頭部を覆う盾形) -->
  <ellipse cx="32" cy="22" rx="13" ry="8" fill="url(#gokiBody)" stroke="#1A0F08" stroke-width="1.8"/>
  <!-- 目 (赤褐) -->
  <circle cx="27" cy="20" r="1.4" fill="#3A0808"/>
  <circle cx="37" cy="20" r="1.4" fill="#3A0808"/>
  <!-- 長い触角 (ゴキブリの特徴) -->
  <path d="M 26 18 Q 18 8 12 4" stroke="#1A0F08" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M 38 18 Q 46 8 52 4" stroke="#1A0F08" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- 体節 (横線) -->
  <g stroke="#1A0F08" stroke-width="0.8" opacity="0.55">
    <path d="M 14 30 Q 32 32 50 30" fill="none"/>
    <path d="M 14 36 Q 32 38 50 36" fill="none"/>
    <path d="M 16 42 Q 32 44 48 42" fill="none"/>
  </g>
  <!-- 脚 6 本 (細い、トゲ多め) -->
  <g stroke="#1A0F08" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M 22 24 L 12 22 L 8 26"/>
    <path d="M 42 24 L 52 22 L 56 26"/>
    <path d="M 16 34 L 6 36 L 4 40"/>
    <path d="M 48 34 L 58 36 L 60 40"/>
    <path d="M 18 44 L 10 50"/>
    <path d="M 46 44 L 54 50"/>
  </g>
  <!-- 尾毛 (cerci) -->
  <path d="M 28 48 L 24 54 M 36 48 L 40 54" stroke="#1A0F08" stroke-width="1.2" stroke-linecap="round"/>
</svg>
