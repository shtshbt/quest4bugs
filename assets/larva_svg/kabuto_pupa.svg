<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="甲虫蛹 (土繭タイプ)">
  <!-- 土繭の中の蛹: 茶色の楕円繭 + 中に薄く透けて見える蛹 -->
  <defs>
    <radialGradient id="cocoonBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8C5E32"/>
      <stop offset="70%" stop-color="#6B4624"/>
      <stop offset="100%" stop-color="#4A2E14"/>
    </radialGradient>
    <radialGradient id="pupaInner" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#D9A85A"/>
      <stop offset="100%" stop-color="#A06E2E"/>
    </radialGradient>
  </defs>
  <!-- 繭: 外殻 -->
  <ellipse cx="32" cy="34" rx="22" ry="26" fill="url(#cocoonBg)" stroke="#3A2010" stroke-width="2"/>
  <!-- 土の質感 (小さな粒) -->
  <g fill="#3A2010" opacity="0.4">
    <circle cx="14" cy="22" r="1"/>
    <circle cx="20" cy="50" r="1.3"/>
    <circle cx="48" cy="48" r="1"/>
    <circle cx="50" cy="20" r="0.9"/>
    <circle cx="38" cy="14" r="0.7"/>
  </g>
  <!-- 内部の蛹 (薄く透けて見える) -->
  <g opacity="0.55">
    <ellipse cx="32" cy="32" rx="10" ry="16" fill="url(#pupaInner)" stroke="#5A3A1A" stroke-width="1"/>
    <!-- 蛹の体節 -->
    <line x1="22" y1="30" x2="42" y2="30" stroke="#5A3A1A" stroke-width="0.8" opacity="0.7"/>
    <line x1="22" y1="36" x2="42" y2="36" stroke="#5A3A1A" stroke-width="0.8" opacity="0.7"/>
    <!-- 角の芽 (カブトムシなら) -->
    <path d="M 32 18 L 32 14" stroke="#5A3A1A" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</svg>
