<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="セミ幼虫 (地中型・前脚が太い)">
  <defs>
    <linearGradient id="semiBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A88458"/>
      <stop offset="100%" stop-color="#5A3E22"/>
    </linearGradient>
  </defs>
  <!-- 土の地面ライン -->
  <line x1="2" y1="60" x2="62" y2="60" stroke="#5A3E22" stroke-width="0.9" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- ずんぐり体 (地中で穴を掘る形) -->
  <ellipse cx="32" cy="36" rx="13" ry="16" fill="url(#semiBody)" stroke="#2A1F12" stroke-width="1.8"/>
  <!-- 頭部 (上部、平たい) -->
  <ellipse cx="32" cy="22" rx="10" ry="7" fill="url(#semiBody)" stroke="#2A1F12" stroke-width="1.8"/>
  <!-- 目 -->
  <circle cx="27" cy="20" r="1.5" fill="#1A1A1A"/>
  <circle cx="37" cy="20" r="1.5" fill="#1A1A1A"/>
  <!-- 強い前脚 (土を掘る、内側に曲がる) -->
  <g stroke="#2A1F12" stroke-width="2" stroke-linejoin="round" fill="#7A5836">
    <path d="M 22 28 L 12 26 L 8 32 L 14 34 L 22 32 Z"/>
    <path d="M 42 28 L 52 26 L 56 32 L 50 34 L 42 32 Z"/>
  </g>
  <!-- 前脚の爪 -->
  <path d="M 8 32 L 4 34 M 56 32 L 60 34" stroke="#1A0F08" stroke-width="1.4" stroke-linecap="round"/>
  <!-- 中脚・後脚 (細い) -->
  <g stroke="#2A1F12" stroke-width="1.3" stroke-linecap="round" fill="none">
    <path d="M 24 40 L 18 46"/>
    <path d="M 40 40 L 46 46"/>
    <path d="M 26 46 L 22 54"/>
    <path d="M 38 46 L 42 54"/>
  </g>
  <!-- 体節 -->
  <g stroke="#2A1F12" stroke-width="0.7" opacity="0.5">
    <path d="M 22 42 Q 32 44 42 42" fill="none"/>
    <path d="M 22 48 Q 32 50 42 48" fill="none"/>
  </g>
</svg>
