<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="カミキリ型幼虫 (テッポウムシ)">
  <defs>
    <linearGradient id="kamiBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF0"/>
      <stop offset="100%" stop-color="#E8DCB4"/>
    </linearGradient>
  </defs>
  <!-- 細長く真っ直ぐ (木質食の典型・elongate) -->
  <path d="M 6 30 Q 6 22 14 22 L 50 24 Q 58 24 58 32 Q 58 40 50 40 L 14 38 Q 6 38 6 30 Z"
        fill="url(#kamiBody)" stroke="#7A6840" stroke-width="2" stroke-linejoin="round"/>
  <!-- 体節 (細かい) -->
  <g stroke="#A89060" stroke-width="0.9" opacity="0.6">
    <line x1="18" y1="24" x2="18" y2="38"/>
    <line x1="26" y1="24" x2="26" y2="38"/>
    <line x1="34" y1="24" x2="34" y2="38"/>
    <line x1="42" y1="24" x2="42" y2="38"/>
    <line x1="50" y1="24" x2="50" y2="38"/>
  </g>
  <!-- 頭部 (左端、平たく強い顎) -->
  <ellipse cx="11" cy="30" rx="6" ry="6" fill="#7A4A22" stroke="#3A1F0E" stroke-width="1.5"/>
  <path d="M 6 28 L 2 26 M 6 32 L 2 34" stroke="#2A1408" stroke-width="1.4" stroke-linecap="round"/>
  <!-- 短い胸脚 -->
  <path d="M 18 40 L 18 44 M 24 40 L 24 44 M 30 40 L 30 44" stroke="#7A6840" stroke-width="1.2" stroke-linecap="round"/>
</svg>
