<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>かんじ こんちゅう ずかん</title>
<style>
/* ============ 基本トークン：夏の雑木林 ============ */
:root{
  --leaf:#5a9e3e; --forest:#2e5d28; --deep:#1d3d19;
  --soil:#7a4a23; --gold:#f2b53a; --tombo:#e0593a;
  --sky:#eef7e0; --grass:#d7edc2; --card:#ffffff;
  --egg:#e3ddcb; --larva:#a8d97c; --pupa:#c79a6b; --adult:#f2b53a;
  --r:18px;
}
/* 夜テーマ: 夜空配色（よるは よるの虫が出やすい） */
body.night{ --sky:#16213c; --grass:#243352; --card:#243352; --leaf:#7fb069; --forest:#dbe6f0; --deep:#eef3f8; --soil:#cda781; background:#16213c; color:#e9edf6; }
body.night .btn.sub{ background:#2b3a5a; color:#e9edf6; border-color:#3a4a6a; box-shadow:0 4px 0 #16213c; }
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","BIZ UDGothic",system-ui,sans-serif;
  background:linear-gradient(180deg,var(--sky) 0%,var(--grass) 100%);
  color:var(--deep); min-height:100vh; user-select:none; -webkit-user-select:none;
}
.glyph{font-family:"Hiragino Mincho ProN","BIZ UDMincho","Yu Mincho",serif}
#app{max-width:760px;margin:0 auto;padding:14px 14px calc(20px + env(safe-area-inset-bottom))}
header.bar{display:flex;align-items:center;gap:10px;padding:6px 2px 12px}
header.bar h1{font-size:18px;color:var(--forest);flex:1}
.chip{background:var(--card);border:2px solid var(--forest);border-radius:999px;padding:4px 12px;font-size:13px;font-weight:bold;color:var(--forest)}
.screen{display:none;animation:fade .25s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.card{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:0 3px 0 rgba(46,93,40,.18);margin-bottom:14px}
.btn{display:block;width:100%;border:none;border-radius:var(--r);padding:16px;font-size:18px;font-weight:bold;
  font-family:inherit;color:#fff;background:var(--leaf);box-shadow:0 4px 0 var(--forest);cursor:pointer;margin-bottom:12px}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--forest)}
.btn.sub{background:#fff;color:var(--forest);box-shadow:0 4px 0 #b9cfa6;border:2px solid var(--forest)}
.btn.soil{background:var(--soil);box-shadow:0 4px 0 #4d2c13}
.btn.gold{background:var(--gold);color:#5a3d00;box-shadow:0 4px 0 #b9821a}
.btn.mini{width:auto;display:inline-block;padding:10px 16px;font-size:15px;margin:4px 6px 4px 0}
.btn:disabled{opacity:.45;box-shadow:none;transform:none}
.row{display:flex;gap:10px}.row>*{flex:1}
.small{font-size:13px;color:#56714e}
.center{text-align:center}

/* ---- プロフィール ---- */
.prof{display:flex;flex-direction:column;align-items:center;gap:8px;padding:26px 10px;font-size:20px}
.prof .face{font-size:54px;background:var(--grass);border:3px solid var(--forest);border-radius:50%;width:96px;height:96px;display:flex;align-items:center;justify-content:center}

/* ---- ホーム ---- */
.mission{display:flex;align-items:center;gap:14px}
.mission .num{font-size:44px;font-weight:bold;color:var(--forest)}
.partner{font-size:44px;animation:bob 2.4s ease-in-out infinite;display:inline-block}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.banner{background:#fff4df;border:2px dashed var(--gold);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:15px;color:#7a5a14}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--card);border-radius:var(--r);padding:16px 10px;text-align:center;border:none;font-family:inherit;
  box-shadow:0 3px 0 rgba(46,93,40,.18);cursor:pointer}
.tile .ic{font-size:34px}.tile .lb{font-size:15px;font-weight:bold;color:var(--forest);margin-top:4px}
.tile:active{transform:translateY(2px)}

/* ---- 出題 ---- */
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.dot{width:12px;height:12px;border-radius:50%;background:#cfe2bb}
.dot.ok{background:var(--leaf)}.dot.ng{background:var(--tombo)}.dot.now{background:var(--gold)}
.qword{font-size:17px;line-height:1.9;margin-bottom:14px}
.qbig{font-size:96px;text-align:center;line-height:1.2;margin:6px 0 14px;color:var(--deep)}
.qmid{font-size:30px;text-align:center;margin:6px 0 14px;line-height:1.7}
.blank{display:inline-block;min-width:1.2em;border-bottom:4px solid var(--soil);color:var(--soil);text-align:center}
.choices .btn{font-size:26px;padding:18px}
.speak{font-size:42px;background:var(--card);border:3px solid var(--leaf);border-radius:50%;width:84px;height:84px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.fb{position:fixed;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:50}
.fb.on{display:flex}
.fb span{font-size:130px;text-shadow:0 4px 0 rgba(0,0,0,.12);animation:pop .35s ease}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.slots{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.slot{width:54px;height:54px;border:3px dashed var(--soil);border-radius:12px;font-size:30px;display:flex;align-items:center;justify-content:center;background:#fffdf6}
.bank{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.bank button{width:58px;height:58px;font-size:30px;border-radius:12px;border:none;background:var(--grass);border:2px solid var(--forest);font-family:inherit;cursor:pointer}
.bank button:disabled{opacity:.25}
.pic{font-size:64px;text-align:center;margin-bottom:8px}
#hwbox{width:280px;height:280px;margin:0 auto 12px;background:#fffdf6;border:3px solid var(--forest);border-radius:14px;position:relative}
#hwbox .grid-l{position:absolute;inset:0;pointer-events:none}
canvas.trace{touch-action:none;border-radius:11px}

/* ---- ずかん ---- */
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tabs button{flex:1;padding:10px;border-radius:12px;border:2px solid var(--forest);background:#fff;font-family:inherit;font-weight:bold;color:var(--forest);font-size:15px}
.tabs button.on{background:var(--forest);color:#fff}
.zgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:8px}
.zcell{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:26px;border:2px solid rgba(46,93,40,.25);background:var(--egg);cursor:pointer;position:relative}
.zcell .st{font-size:11px;position:absolute;bottom:2px;right:4px}
.zcell.s12{background:var(--larva)}.zcell.s34{background:var(--pupa);color:#fff}.zcell.s5{background:var(--adult)}
.zcell.lock{opacity:.35}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;margin:10px 0;color:#56714e}
.legend i{display:inline-block;width:14px;height:14px;border-radius:4px;vertical-align:-2px;margin-right:3px}

/* ---- むしかご ---- */
.bugs{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
.bug{background:#fffdf6;border:2px solid var(--forest);border-radius:14px;padding:8px;text-align:center}
.bug svg{width:64px;height:64px}
.bug .nm{font-size:11px;font-weight:bold;color:var(--forest);margin-top:2px;min-height:2.4em}
.bug.no{opacity:.45;filter:grayscale(1)}
.rar{font-size:10px;color:var(--soil)}

/* ---- モーダル ---- */
.modal{position:fixed;inset:0;background:rgba(29,61,25,.45);display:none;align-items:center;justify-content:center;z-index:40;padding:16px}
.modal.on{display:flex}
.modal .inner{background:#fff;border-radius:20px;padding:20px;max-width:420px;width:100%;max-height:86vh;overflow:auto}
.skillrow{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.skillrow span{font-size:12px;padding:4px 8px;border-radius:8px;background:var(--egg)}
.skillrow span.s12{background:var(--larva)}.skillrow span.s34{background:var(--pupa);color:#fff}.skillrow span.s5{background:var(--adult)}

/* ---- 進捗 ---- */
.pgbar-wrap{background:#e0edcc;border-radius:10px;height:18px;overflow:hidden;margin:4px 0 2px}
.pgbar-fill{height:100%;border-radius:10px;background:var(--leaf);transition:width .4s ease}
.pgbar-row{margin-bottom:12px}
.pgbar-label{display:flex;justify-content:space-between;font-size:14px;font-weight:bold;color:var(--forest);margin-bottom:2px}
.pgbar-sub{font-size:12px;color:#56714e;margin-top:2px}
.review-banner{background:#e8f5e9;border:2px solid var(--leaf);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:14px;color:#2e5d28}

/* ---- 親 ---- */
table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
td,th{border-bottom:1px solid #dde8d0;padding:6px 4px;text-align:left}
textarea{width:100%;min-height:90px;border-radius:10px;border:2px solid #b9cfa6;padding:8px;font-size:12px;font-family:monospace}
input[type=number]{width:70px;font-size:16px;padding:6px;border-radius:8px;border:2px solid #b9cfa6}
input[type=range]{width:100%}
.setline{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid #e7efdc;font-size:15px}
.result-big{font-size:54px;text-align:center;margin:8px 0}
.grow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0}
.grow span{background:var(--grass);border-radius:10px;padding:6px 10px;font-size:15px}
</style>
</head>

/* ================= ユーティリティ ================= */
function $(id){return document.getElementById(id)}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function pickOne(a){return a[Math.floor(Math.random()*a.length)]}
function pad2(n){return (n<10?'0':'')+n}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}
function addDays(ds,n){var p=ds.split('-');var d=new Date(+p[0],+p[1]-1,+p[2]+n);return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}

/* ================= SRS ================= */
var INT=[0,1,3,7,21,60];
function rec(key,sk){ var a=ST.srs[key]||(ST.srs[key]={}); return a[sk]||(a[sk]={s:0,due:todayStr(),la:''}) }
function skillsOf(key){ if(key[0]==='h') return ['y','w']; var x=KMAP[key.slice(2)]; var a=['y','r','w','j']; if(x.oku)a.push('o'); return a }
function stageOfItem(key){ var m=99; skillsOf(key).forEach(function(s){ m=Math.min(m,rec(key,s).s) }); return m===99?0:m }
function gatedSkills(key){ var ry=rec(key,'y'); var out=['y'];
 if(key[0]==='h'){ if(ry.s>=1) out.push('w'); return out }
 var sks=skillsOf(key);
 /* よみを1回 正解したら 他の形式(えらぶ・かき・じゅくご・おくりがな)を解放し、
    おまかせが よみ偏重にならず バランス良く混ざるようにする */
 if(ry.s>=1){ sks.forEach(function(s){ if(s!=='y') out.push(s) }) }
 return out }
function introduced(key){ return skillsOf(key).some(function(s){ return rec(key,s).s>0 }) }
function applyAnswer(key,sk,ok,mode){
 var r=rec(key,sk), t=todayStr();
 /* れんしゅう/ふくしゅうでも 正解で すすむ(1日1回まで)。テストは進級なし(関門のため)。
    まちがいは 1段階だけ もどる(以前は2段階で きつすぎた)。 */
 if(ok){ if(mode!=='test' && r.la!==t){ r.s=Math.min(5,r.s+1); r.la=t; r.due=addDays(t,INT[r.s]); } }
 else { if(r.s>0){ r.s=Math.max(1,r.s-1); } r.due=t; r.la='';
   ST.wrong.unshift({k:key,sk:sk,d:t}); if(ST.wrong.length>60)ST.wrong.length=60; }
 var lg=ST.log[t]||(ST.log[t]={a:0,n:0}); lg.a++;
}
function itemPool(){ var out=[];
 if(unOK('hira')) HIRA.forEach(function(c){out.push('h:'+c)});
 Object.keys(UNITS).map(Number).sort(function(a,b){return a-b}).forEach(function(g){
  if(unOK('u'+g)) UNITS[g].forEach(function(c){out.push('k:'+c)});
 });
 return out }
function buildDaily(){
 var t=todayStr(), dues=[], news2=[], newsChar=[];
 itemPool().forEach(function(key){
  gatedSkills(key).forEach(function(sk){
   var r=rec(key,sk);
   if(r.s>0){ if(r.due<=t) dues.push({key:key,sk:sk,due:r.due}) }
   else { if(introduced(key)) news2.push({key:key,sk:sk}); else if(sk==='y') newsChar.push({key:key,sk:sk,nw:1}) }
  });
 });
 dues.sort(function(a,b){return a.due<b.due?-1:1});
 var lg=ST.log[t]||{a:0,n:0};
 var cap=(CUR.mode==='small'?CFG.newS:CFG.newB);
 var allow=Math.max(0,cap-(lg.n||0));
 var q=dues.slice(0,10), i;
 for(i=0;i<news2.length&&q.length<10;i++) q.push(news2[i]);
 for(i=0;i<newsChar.length&&q.length<10&&allow>0;i++){ q.push(newsChar[i]); allow--; }
 return shuffle(q);
}
function dueCounts(){ var t=todayStr(), due=0, hun=0;
 itemPool().forEach(function(key){ gatedSkills(key).forEach(function(sk){
  var r=rec(key,sk); if(r.s>0&&r.due<=t){ due++; if(r.due<t)hun++ } }) });
 return {due:due,hun:hun} }
function streak(){ var n=0,d=todayStr(); if(!(ST.log[d]&&ST.log[d].a))d=addDays(d,-1);
 while(ST.log[d]&&ST.log[d].a>0){n++;d=addDays(d,-1)} return n }

  T.pick(); try{ speechSynthesis.onvoiceschanged=T.pick; }catch(e2){} },

 function judgeInk(){

   var a=id[o+3], lum=(id[o]+id[o+1]+id[o+2])/3;

function calcMastered(keys){
 // しゅうとく = その字の 全スキルが 成虫(box>=3)。pct は 単純な習得率(全体数のうち)。
 var total=keys.length, mastered=0;
 keys.forEach(function(key){
  var sks=skillsOf(key);  // 解放ゲートとは独立に、全スキルで判定
  if(sks.every(function(sk){ return rec(key,sk).s>=3 }))mastered++;
 });
 return {mastered:mastered,total:total,pct: total?Math.round(100*mastered/total):0}
}
/* 学年内訳: その学年の文字を stageOfItem で 4段に分類して 🥚n 🐛n 🟤n 🦋n を返す。
   既存ロジック非依存・追加のみ。box0=卵🥚 / box1=幼虫🐛 / box2=蛹🟤 / box>=3=成虫🦋(習得)。 */
function stageBreakdown(keys){
 var c=[0,0,0,0];
 keys.forEach(function(key){
  var st=stageOfItem(key);
  var i = st>=3 ? 3 : (st<=0 ? 0 : st);  // 0/1/2/3+ の4区分
  c[i]++;
 });
 return c;
}
function breakdownHTML(keys){
 var c=stageBreakdown(keys), em=['🥚','🐛','🟤','🦋'];
 var parts=[];
 for(var i=0;i<4;i++){ if(c[i]>0) parts.push(em[i]+c[i]); }
 if(!parts.length) return '';
 return '<div style="font-size:12px;opacity:.9;margin-top:3px;letter-spacing:1px">'+parts.join(' ')+'</div>';
}

function masterMet(sp){
 var key=sp.master.key, keys;
 if(key==='hira') keys=HIRA.map(function(c){return 'h:'+c});
 else { var g=parseInt(key.slice(1),10); if(!UNITS[g]||!UNITS[g].length)return false; keys=UNITS[g].map(function(c){return 'k:'+c}); }
 var r=calcMastered(keys); return r.total>0 && r.mastered>=r.total;
}
function checkMasters(){
 if(!window.Q4BReward||!ST||!ST.coll)return;
 var awarded=[];
 Q4BReward.masterBugsFor('kanji').forEach(function(sp){
  if(Q4BReward.masterObtained(ST.coll,sp.id))return;
  if(masterMet(sp)){ if(Q4BReward.awardMaster(ST.coll,sp))awarded.push(sp); }
 });
 if(awarded.length){ saveST(); showMasterCelebration(awarded); }
}
function kanjiMasterSection(){
 if(!window.Q4BReward||!Q4BReward.masterBugsFor)return '';
 var ms=Q4BReward.masterBugsFor('kanji'); if(!ms.length)return '';
 var GLAB={hira:'ひらがな',g1:'1年',g2:'2年',g3:'3年',g4:'4年',g5:'5年',g6:'6年'};
 ms.sort(function(a,b){ var o=['hira','g1','g2','g3','g4','g5','g6']; return o.indexOf(a.master.key)-o.indexOf(b.master.key); });
 var got=ms.filter(function(sp){return Q4BReward.masterObtained(ST.coll,sp.id);}).length;
 var cells=ms.map(function(sp){ var ok=Q4BReward.masterObtained(ST.coll,sp.id);
  return '<div class="bug"'+(ok?'':' style="opacity:.55"')+'>'+(ok?(window.Q4BRender&&Q4BRender.deco?Q4BRender.deco(sp,0):Q4BReward.svg(sp)):'<div style="font-size:40px;line-height:64px">🎓</div>')
   +'<div class="nm">'+(ok?(sp.jaName+' 🎓'):(GLAB[sp.master.key]||'')+' ？')+'</div>'
   +'<div class="rar" style="color:var(--gold)">'+(ok?'マスター':'ぜんぶ習得で')+'</div></div>';
 }).join('');
 return '<div class="card"><div style="font-weight:bold;margin-bottom:4px">🎓 マスター虫 <span style="color:var(--gold)">'+got+' / '+ms.length+'</span></div>'
  +'<div style="font-size:12px;color:#56714e;margin-bottom:8px">そのはんいを <b>ぜんぶ習得</b>すると もらえる特別な虫だよ</div>'
  +'<div class="bugs">'+cells+'</div></div>';
}
function showMasterCelebration(list){ var sp=list[0];
 modal('<div class="center"><div style="font-size:14px;color:var(--gold);font-weight:800">🎓 ぜんぶ習得！</div>'
  +'<div style="width:120px;height:120px;margin:8px auto">'+Q4BReward.svg(sp)+'</div>'
  +'<div style="font-weight:bold;font-size:18px">マスター虫「'+(sp.jaName||sp.id)+'」をゲット！</div>'
  +'<div class="small" style="margin-top:4px">'+(sp.note||'')+'</div>'
  +(list.length>1?'<div class="small">ほかにも '+(list.length-1)+'匹！</div>':'')
  +'<button class="btn" style="margin-top:12px" onclick="closeModal()">やったー！</button></div>');
}

function updateProgressSummary(){
 if(!ST)return;
 // 最も進んでいる学年 = 習得率50%以上の最大学年
 var bestGrade=0;
 var grades=Object.keys(UNITS).map(Number).sort(function(a,b){return a-b});
 grades.forEach(function(g){
  var keys=UNITS[g].map(function(c){return 'k:'+c});
  var r=calcMastered(keys);
  if(r.total>0&&(r.mastered/r.total)>=0.5) bestGrade=g;
 });
 var hiraKeys=HIRA.map(function(c){return 'h:'+c});
 var hr=calcMastered(hiraKeys);
 var hiraPct=hr.total>0?Math.round(100*hr.mastered/hr.total):0;
 var summary='';
 if(bestGrade>0){
  summary='かんじ '+bestGrade+'ねんせいまで がんばってるね！ひらがな '+hiraPct+'%';
 } else if(hr.mastered>0){
  summary='ひらがな '+hiraPct+'% マスター中！';
 } else {
  summary='がくしゅう スタート！';
 }
 ST.progressSummary=summary;
 saveST();
}

 +'</div>';

   var shinyBadge=entry2.shiny?'✨':' ';

   var forms2;

     +'<div><div style="width:72px;height:72px;margin:0 auto">'+Q4BReward.svg(sp2,1)+'</div><div style="font-size:11px;color:#888">✨いろちがい</div></div></div>';

   var mh='<div class="center">'
    +forms2

    +(sp2.note?'<div style="font-size:12px;color:#56714e;margin-top:4px">'+sp2.note+'</div>':'')

   modal(mh);
  });
 });
 var ab=$('kanji-amber-btn');
 if(ab) ab.addEventListener('click',function(){
  var got=Q4BReward.spendForCatch(ST.coll,'kanji');
  if(!got){ modal('<div class="center"><div style="font-size:32px">🍯</div><div style="font-weight:bold;margin:8px 0">こはくが たりないよ</div><div class="small">30こ いるよ</div><button class="btn" style="margin-top:10px" onclick="closeModal()">とじる</button></div>'); return; }
  saveST();
  renderBugs();

 });
 $('bBk4').addEventListener('click',renderHome); showScr('bugs');
}
function _renderBugsFallback(){ var s=$('scr-bugs');
 s.innerHTML='<button class="btn sub mini" id="bBk4">← ホーム</button><div class="card center"><div class="small">むしかご（shared/reward.js が よみこまれていません）</div></div>';
 $('bBk4').addEventListener('click',renderHome); showScr('bugs');

/* ================= 親画面 ================= */
function parentGate(){ var a=2+Math.floor(Math.random()*8), b=2+Math.floor(Math.random()*8);
 modal('<div class="center"><div style="font-weight:bold">おやの がめん</div><div class="qmid">'+a+' × '+b+' = ?</div><input type="number" id="pgIn" style="font-size:22px;width:120px;padding:8px;border-radius:10px;border:2px solid #b9cfa6"> <button class="btn mini" id="pgGo" style="display:inline-block">OK</button></div>');
 $('pgGo').addEventListener('click',function(){ if(+($('pgIn').value)===a*b){ closeModal(); renderParent() } else { $('pgIn').value='' } }) }
function totalAns(){ var n=0,d; for(d in ST.log)n+=(ST.log[d].a||0); return n }
function testRows(){ var h='';
 ST.tests.slice(0,10).forEach(function(x){ var lbl=(TESTS[x.t]&&TESTS[x.t].label)||x.t; h+='<tr><td>'+x.d+'</td><td>'+lbl+'</td><td>'+x.sc+(x.sc>=95?' 🥇':(x.sc>=80?' ⭕':''))+'</td></tr>' });
 return h||'<tr><td colspan="3">まだなし</td></tr>' }
function weakTop(){ var m={}; ST.wrong.forEach(function(w){ var c=w.k.slice(2); m[c]=(m[c]||0)+1 });
 var a=Object.keys(m).map(function(k){return [k,m[k]]}).sort(function(p,q){return q[1]-p[1]}).slice(0,5);
 if(!a.length)return 'なし';
 return a.map(function(p){return p[0]+'×'+p[1]}).join('　') }
function renameProf(id){ var p=null,i;
 for(i=0;i<PROFILES.length;i++)if(PROFILES[i].id===id)p=PROFILES[i];
 if(!p)return; var nm=prompt('新しい名前',p.name);
 if(nm){ p.name=nm.trim()||p.name; QuestSave.saveProfiles(PROFILES); head(); renderParent() } }
function renderParent(){ var s=$('scr-parent');
 var ist='width:100%;margin:6px 0;padding:10px;border-radius:10px;border:2px solid #b9cfa6;font-size:14px;box-sizing:border-box';
 var h='<button class="btn sub mini" id="bBk5">← ホーム</button>'
 +'<div class="card"><div style="font-weight:bold;margin-bottom:6px">設定</div>'
 +'<div class="setline"><span>音声読み上げ</span><input type="checkbox" id="cTts" '+(CFG.tts?'checked':'')+' style="width:24px;height:24px"></div>'
 +'<div class="setline"><span>読み上げ速度</span><span>'+CFG.rate+'</span></div><input type="range" id="cRate" min="0.6" max="1.2" step="0.05" value="'+CFG.rate+'">'
 +'<div class="setline"><span>新規導入／日（ひらがな）</span><input type="number" id="cNewS" value="'+CFG.newS+'" min="0" max="20"></div>'
 +'<div class="setline"><span>新規導入／日（かんじ）</span><input type="number" id="cNewB" value="'+CFG.newB+'" min="0" max="30"></div>'
 +'<div class="setline"><span>全ユニット解放（動作確認用）</span><input type="checkbox" id="cAll" '+(CFG.all?'checked':'')+' style="width:24px;height:24px"></div>'
 +'<div class="row" style="margin-top:8px"><button class="btn sub" id="cN1">名前変更：'+esc(nameOf('p1'))+'</button><button class="btn sub" id="cN2">名前変更：'+esc(nameOf('p2'))+'</button></div></div>'
 +'<div class="card"><div style="font-weight:bold;margin-bottom:6px">クラウド同期（GitHub方式）</div>'
 +'<div class="small" style="margin-bottom:6px">状態：<b id="syTx">'+QuestSave.getStatus()+'</b>　トークンはこの端末内にのみ保存されます（コードやrepoには書かないこと）</div>'
 +'<input id="ghO" value="shtshbt" placeholder="owner" style="'+ist+'">'
 +'<input id="ghR" value="quest4bugs-data" placeholder="データ用の非公開repo名" style="'+ist+'">'
 +'<input id="ghT" type="password" placeholder="fine-grained token（Contents: Read and write）" style="'+ist+'">'
 +'<div class="row"><button class="btn" id="ghGo">接続</button><button class="btn sub" id="ghOff">切断</button></div></div>'
 +'<div class="card"><div style="font-weight:bold;margin-bottom:6px">記録（'+esc(CUR.name)+'）</div>'
 +'<div class="small">連続学習：'+streak()+'日　合計回答：'+totalAns()+'回</div>'
 +'<table><tr><th>日付</th><th>テスト</th><th>点</th></tr>'+testRows()+'</table>'
 +'<div class="small" style="margin-top:6px">弱点（誤答が多い字）：'+weakTop()+'</div></div>'
 +'<div class="card"><div style="font-weight:bold;margin-bottom:6px">データ</div>'
 +'<textarea id="taX" placeholder="エクスポート結果がここに出ます／インポート時はJSONを貼り付け"></textarea>'
 +'<div class="row" style="margin-top:8px"><button class="btn sub" id="dEx">エクスポート</button><button class="btn sub" id="dIm">インポート</button></div>'
 +'<button class="btn soil" id="dRs" style="margin-top:8px">このプロフィールをリセット</button></div>';
 s.innerHTML=h;
 $('bBk5').addEventListener('click',renderHome);
 $('cTts').addEventListener('change',function(){ CFG.tts=this.checked?1:0; saveCFG() });
 $('cRate').addEventListener('change',function(){ CFG.rate=+this.value; saveCFG(); T.say('こんにちは',true) });
 $('cNewS').addEventListener('change',function(){ CFG.newS=Math.max(0,+this.value||0); saveCFG() });
 $('cNewB').addEventListener('change',function(){ CFG.newB=Math.max(0,+this.value||0); saveCFG() });
 $('cAll').addEventListener('change',function(){ CFG.all=this.checked?1:0; saveCFG() });
 $('cN1').addEventListener('click',function(){ renameProf('p1') });
 $('cN2').addEventListener('click',function(){ renameProf('p2') });
 $('ghGo').addEventListener('click',function(){
  var cfg={owner:$('ghO').value.trim(),repo:$('ghR').value.trim(),token:$('ghT').value.trim()};
  if(!cfg.owner||!cfg.repo||!cfg.token){ alert('3項目すべて入力してください'); return }
  QuestSave.connectGitHub(cfg).then(function(){ alert('接続しました．以後この端末は自動同期します') })
  .catch(function(e){ alert('接続失敗：'+(e&&e.message?e.message:e)) }) });
 $('ghOff').addEventListener('click',function(){ QuestSave.disconnect(); $('syTx').textContent=QuestSave.getStatus(); alert('切断しました（ローカル保存は継続）') });
 $('dEx').addEventListener('click',function(){ var j=QuestSave.exportAll(); $('taX').value=j;
  try{ var bl=new Blob([j],{type:'application/json'}); var a=document.createElement('a');
   a.href=URL.createObjectURL(bl); a.download='quest4bugs_backup_'+todayStr()+'.json';
   document.body.appendChild(a); a.click(); a.remove(); }catch(e){} });
 $('dIm').addEventListener('click',function(){ QuestSave.importAll($('taX').value)
  .then(function(n){ alert(n+'件 取り込みました'); selectProfile(CUR) })
  .catch(function(e){ alert('失敗：'+(e&&e.message?e.message:e)) }) });
 $('dRs').addEventListener('click',function(){ if(confirm(CUR.name+' の記録を全消去します．よいですか？')){
  ST=newState(); initUn(); saveST(); alert('リセットしました'); renderHome() } });
 showScr('parent') }

/* ================= 起動 ================= */
QuestSave.onStatus(function(st){ var c=$('hSync');
 /* クラウド同期インジケータ。未接続(local)時は表示しない（自動保存は常時行われるため紛れない） */
 if(st==='local'){ c.style.display='none'; }
 else { c.style.display=''; c.textContent=(st==='synced')?'☁✓':((st==='syncing')?'☁…':'☁!'); }
 var sy=document.getElementById('syTx'); if(sy)sy.textContent=st });
(function boot(){
 QuestSave.autoConnect().catch(function(){return null})
 .then(function(){ return QuestSave.syncDown?QuestSave.syncDown().catch(function(){}):null; })  /* 起動時に他端末の更新を自動取り込み */
 .then(function(){
  return QuestSave.load('kanji','_settings');
 }).then(function(cf){
  CFG=Object.assign({},DEF_CFG,cf||{});
  return QuestSave.profiles();
 }).then(function(ps){
  PROFILES=(ps&&ps.length)?ps:[];
  /* ポータルで選んだ子のホームへ直行（再選択はヘッダのプロフィールから） */
  var cur=QuestSave.currentProfile(), p=null, i;
  for(i=0;i<PROFILES.length;i++)if(PROFILES[i].id===cur)p=PROFILES[i];
  if(p)selectProfile(p); else renderProfileSel();
 });
})();
