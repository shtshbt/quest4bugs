<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quest4Bugs 羽化プレビュー</title>
<style>
*{box-sizing:border-box}body{margin:0;background:linear-gradient(#eef6e3,#dcebc8);color:#2a3d2c;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic",system-ui,sans-serif}main{max-width:760px;margin:auto;padding:24px 16px 64px}.panel{background:#fffdf4;border:2px solid #cfddb2;border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 3px 0 rgba(46,93,40,.15)}h1{font-size:24px;margin:0 0 8px}.lead,.note{font-size:13px;color:#6b7a5e;line-height:1.7}.flow{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;font-size:17px;font-weight:800;margin:14px 0}.stage{display:inline-flex;align-items:center;gap:7px;background:#f4f8e8;border:2px solid #cfddb2;border-radius:12px;padding:8px 12px}.stage svg{width:38px;height:38px}.arrow{color:#cf7f14}button{display:block;width:100%;border:0;border-radius:14px;padding:14px;margin:10px 0;background:#3fa86b;color:#fff;font:inherit;font-size:17px;font-weight:900;box-shadow:0 4px 0 #267743;cursor:pointer}button.shiny{background:#a06bd8;box-shadow:0 4px 0 #6b43a1}.overlay{position:fixed;inset:0;background:rgba(42,61,44,.74);display:flex;align-items:center;justify-content:center;padding:14px;z-index:20}.card{position:relative;overflow:hidden;background:#fffdf4;border-radius:24px;max-width:390px;width:96%;padding:24px 20px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.42)}.title{font-size:19px;font-weight:900;color:#8a5c2c;margin-bottom:8px;min-height:30px}.visual{height:185px;display:flex;align-items:center;justify-content:center;position:relative}.visual svg{width:165px;height:165px;overflow:visible}.name{font-size:21px;font-weight:900;margin-top:8px}.meta{font-size:13px;color:#6b7a5e;margin-top:3px}.buttons{margin-top:16px}.buttons button{display:inline-block;width:auto;margin:0 4px;padding:10px 18px;font-size:14px;box-shadow:none}.shiny-frame{position:relative;border-radius:20px;outline:3px solid #ffc426;box-shadow:0 0 0 6px rgba(91,202,255,.24),0 0 24px rgba(255,170,43,.72),0 0 40px rgba(160,107,216,.5)}.spark{position:absolute;z-index:3;color:#fffbd0;text-shadow:0 0 7px #fff,0 0 14px #ffb52e,0 0 24px #6fd8ff,0 0 34px #b86cff;pointer-events:none}.s1{font-size:34px;left:5%;top:7%;animation:twinkle 1.2s ease-in-out infinite}.s2{font-size:25px;right:4%;bottom:9%;animation:twinkle 1.2s .35s ease-in-out infinite}.burst{position:absolute;z-index:5;inset:0;padding-top:14px;font-size:31px;letter-spacing:8px;color:#fffbd0;text-shadow:0 0 7px #fff,0 0 14px #ffb52e,0 0 24px #6fd8ff,0 0 34px #b86cff;animation:burst 1.55s ease-out both;pointer-events:none}.flash{position:fixed;inset:0;z-index:19;pointer-events:none;background:radial-gradient(circle,#fffbd0 0%,rgba(255,221,90,.78) 24%,rgba(118,211,255,.34) 48%,transparent 72%);animation:flash .9s ease-out forwards}.conf{position:absolute;top:-16px;width:9px;height:13px;border-radius:2px;animation:conf 2.2s ease-out forwards;pointer-events:none}.pre{animation:pulse 1s ease-in-out infinite}.adult{animation:pop .78s ease-out both}.shiny-pop{animation:shinyPop 1.55s ease-out both}@keyframes pulse{0%,100%{transform:scale(.96);opacity:.82}50%{transform:scale(1.04);opacity:1}}@keyframes pop{0%{opacity:0;transform:scale(.45) rotate(-5deg)}55%{opacity:1;transform:scale(1.15) rotate(2deg)}100%{transform:scale(1)}}@keyframes shinyPop{0%{opacity:.08;transform:scale(.62) rotate(-5deg);filter:brightness(2.5) saturate(1.8)}28%{opacity:1;transform:scale(1.18) rotate(2deg);filter:brightness(1.8) saturate(1.5)}55%{transform:scale(.96) rotate(-1deg);filter:brightness(1.25)}75%{transform:scale(1.05)}100%{transform:scale(1);filter:none}}@keyframes twinkle{0%,100%{opacity:.25;transform:scale(.55) rotate(-18deg)}45%{opacity:1;transform:scale(1.55) rotate(28deg)}}@keyframes burst{0%{opacity:0;transform:translateY(32px) scale(.35)}24%{opacity:1;transform:scale(1.18)}100%{opacity:0;transform:translateY(-38px) scale(1.45)}}@keyframes flash{0%{opacity:0}28%{opacity:.92}100%{opacity:0}}@keyframes conf{0%{transform:translateY(-25px) rotate(0);opacity:1}100%{transform:translateY(360px) rotate(620deg);opacity:0}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<main>
<h1>羽化ライフサイクル確認</h1>
<p class="lead">保存・同期・プロフィール作成・外部データ読込は行いません。この1ページだけで動作します。</p>
<section class="panel"><h2>完全変態</h2><div class="flow"><span class="stage">🥚 卵</span><span class="arrow">→</span><span class="stage">🐛 幼虫</span><span class="arrow">→</span><span class="stage"><svg viewBox="0 0 100 100"><ellipse cx="50" cy="54" rx="24" ry="35" fill="#b87938" stroke="#68421f" stroke-width="4"/><path d="M31 39Q50 28 69 39M29 51Q50 42 71 51M30 64Q50 57 70 64M34 76Q50 71 66 76" fill="none" stroke="#8b572a" stroke-width="3"/></svg>蛹</span><span class="arrow">→ 羽化</span><span class="stage">🪲 成虫</span></div><button data-kind="complete" data-shiny="0">通常個体の羽化を再生</button><button class="shiny" data-kind="complete" data-shiny="1">色違い個体の羽化を再生</button></section>
<section class="panel"><h2>不完全変態</h2><div class="flow"><span class="stage">🥚 卵</span><span class="arrow">→</span><span class="stage"><svg viewBox="0 0 100 100"><ellipse cx="53" cy="56" rx="20" ry="10" fill="#75a94e" stroke="#355d29" stroke-width="4"/><circle cx="29" cy="50" r="10" fill="#86ba59" stroke="#355d29" stroke-width="4"/><path d="M42 63L25 82M60 63L77 85M41 52L22 40M63 52L84 39" stroke="#355d29" stroke-width="5"/></svg>若虫</span><span class="arrow">→ 成虫化</span><span class="stage">🦗 成虫</span></div><button data-kind="incomplete" data-shiny="0">通常個体の成虫化を再生</button><button class="shiny" data-kind="incomplete" data-shiny="1">色違い個体の成虫化を再生</button></section>
<p class="note">育成カード内に「画像のない成虫段階」は置かず、蛹または若虫から実際の成虫へ一度だけ切り替わります。</p>
</main>
<script>
(function(){
function pupa(){return '<svg viewBox="0 0 100 100" class="pre"><ellipse cx="50" cy="54" rx="24" ry="35" fill="#b87938" stroke="#68421f" stroke-width="4"/><path d="M31 39Q50 28 69 39M29 51Q50 42 71 51M30 64Q50 57 70 64M34 76Q50 71 66 76" fill="none" stroke="#8b572a" stroke-width="3"/></svg>'}
function nymph(){return '<svg viewBox="0 0 100 100" class="pre"><ellipse cx="53" cy="56" rx="20" ry="10" fill="#75a94e" stroke="#355d29" stroke-width="4"/><circle cx="29" cy="50" r="10" fill="#86ba59" stroke="#355d29" stroke-width="4"/><path d="M42 63L25 82M60 63L77 85M41 52L22 40M63 52L84 39" stroke="#355d29" stroke-width="5"/></svg>'}
function beetle(s){var a=s?'#5b4bd8':'#6b4226',b=s?'#42c6e8':'#4a2e1a';return '<svg viewBox="0 0 100 100"><ellipse cx="51" cy="62" rx="25" ry="24" fill="'+a+'" stroke="#26190f" stroke-width="4"/><ellipse cx="50" cy="36" rx="17" ry="14" fill="'+b+'" stroke="#26190f" stroke-width="4"/><path d="M50 26C45 13 52 7 61 10C55 15 56 21 59 27" fill="none" stroke="#26190f" stroke-width="6"/><path d="M34 55L15 43M68 55L87 43M31 66L12 72M70 66L89 72M36 76L21 89M65 76L80 89" stroke="#26190f" stroke-width="5"/>'+(s?'<path d="M79 13l3 7 7 3-7 3-3 7-3-7-7-3 7-3z" fill="#fff"/>':'')+'</svg>'}
function grass(s){var a=s?'#d84fa7':'#78a849',b=s?'#58cbea':'#3f6b2d';return '<svg viewBox="0 0 100 100"><ellipse cx="57" cy="54" rx="27" ry="12" fill="'+a+'" stroke="#24431d" stroke-width="4"/><circle cx="26" cy="47" r="12" fill="'+b+'" stroke="#24431d" stroke-width="4"/><path d="M48 62L27 88M68 61L88 88M44 50L20 34M70 50L91 34" stroke="#24431d" stroke-width="6"/><path d="M20 40L8 25M27 38L21 21" stroke="#24431d" stroke-width="3"/>'+(s?'<path d="M80 14l3 7 7 3-7 3-3 7-3-7-7-3 7-3z" fill="#fff"/>':'')+'</svg>'}
function conf(card){var c=['#f2a33c','#3fa86b','#5b8de0','#e84a6b','#a06bd8'];for(var i=0;i<28;i++){var x=document.createElement('i');x.className='conf';x.style.left=Math.random()*100+'%';x.style.background=c[i%5];x.style.animationDelay=Math.random()*.35+'s';card.appendChild(x)}}
function play(kind,shiny){var o=document.createElement('div');o.className='overlay';o.innerHTML='<div class="card"><div class="title">'+(kind==='complete'?'さなぎが うごきだした…！':'わかむしが ひかりだした…！')+'</div><div class="visual">'+(kind==='complete'?pupa():nymph())+'</div><div class="name" hidden></div><div class="meta" hidden></div><div class="buttons" hidden><button class="close">とじる</button></div></div>';document.body.appendChild(o);var card=o.querySelector('.card'),v=o.querySelector('.visual');setTimeout(function(){var f=document.createElement('div');f.className='flash';document.body.appendChild(f);setTimeout(function(){f.remove()},950);var art=kind==='complete'?beetle(shiny):grass(shiny);v.innerHTML='<div class="'+(shiny?'shiny-frame shiny-pop':'adult')+'" style="position:relative;width:165px;height:165px">'+art+(shiny?'<span class="spark s1">✦</span><span class="spark s2">✦</span><span class="burst">✦ ✧ ✨ ✧ ✦</span>':'')+'</div>';o.querySelector('.title').textContent=shiny?'✨ 色ちがいが うまれた！ ✨':'🎉 せいちゅうに なったよ！';var n=o.querySelector('.name');n.hidden=false;n.textContent=(kind==='complete'?'カブトムシ':'トノサマバッタ')+' ♂';var m=o.querySelector('.meta');m.hidden=false;m.textContent='きみが そだてた 特別な子だよ';o.querySelector('.buttons').hidden=false;conf(card)},650);o.querySelector('.close').onclick=function(){o.remove()};o.onclick=function(e){if(e.target===o)o.remove()}}
document.querySelectorAll('button[data-kind]').forEach(function(b){b.onclick=function(){play(b.dataset.kind,b.dataset.shiny==='1')}})
})();
</script>
</body>
</html>
