<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Quest4Bugs 色違いプレビュー</title>
<link rel="stylesheet" href="shared/shiny_bonus.css?v=0.1.0">
<style>
:root{--bg:#E9F2D9;--panel:#FFFDF4;--ink:#2A3D2C;--sub:#6B7A5E;--line:#CFDDB2;--green:#3E7C3F;--amber:#F2A33C}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(#edf6df,#dcebc8);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic",system-ui,sans-serif}
main{max-width:760px;margin:0 auto;padding:20px 14px 70px}
h1{font-size:24px;margin:0 0 6px}.lead{font-size:13px;color:var(--sub);margin-bottom:18px}
.panel{background:var(--panel);border:2px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 3px 0 rgba(46,93,40,.12)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{position:relative;background:#fff;border:2px solid var(--line);border-radius:16px;padding:14px;text-align:center;min-height:220px;overflow:hidden}
.card h2{font-size:16px;margin:8px 0 2px}.card small{color:var(--sub)}
.bugbox{height:140px;display:flex;align-items:center;justify-content:center}.bug{position:relative;width:120px;height:120px}
.bug svg{width:100%;height:100%}
button{border:0;border-radius:14px;padding:12px 16px;font:inherit;font-weight:800;background:var(--green);color:white;cursor:pointer;box-shadow:0 3px 0 #2C5F2D;margin:4px}
button.secondary{background:#fff;color:var(--ink);border:2px solid var(--line);box-shadow:0 3px 0 var(--line)}
.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}.note{font-size:12px;color:var(--sub);margin-top:10px}
#q4b-morning-shiny-banner{position:static;margin-bottom:16px;display:flex!important;width:max-content;max-width:100%}
.preview-capture{position:relative;max-width:360px;margin:0 auto;background:#fff;border-radius:22px;padding:18px;text-align:center;overflow:hidden}
.preview-capture .title{font-size:20px;font-weight:900;margin-bottom:8px}
.preview-capture .q4b-shiny-art{width:180px;height:180px;margin:0 auto}
@media(max-width:560px){.grid{grid-template-columns:1fr}.card{min-height:205px}}
</style>
</head>
<body>
<main>
  <h1>Quest4Bugs 色違いプレビュー</h1>
  <p class="lead">保存・同期・プロフィール作成は行いません。見た目だけを確認する独立ページです。</p>

  <div id="q4b-morning-shiny-banner" role="status">
    <span class="q4b-morning-sun">🌅</span><span><b>朝露ボーナス</b><small>朝8時まで 色ちがい3倍</small></span>
  </div>

  <section class="panel">
    <h2>通常個体との比較</h2>
    <div class="grid">
      <div class="card">
        <div class="bugbox"><div class="bug">
          <svg viewBox="0 0 100 100" aria-label="通常のナナホシテントウ">
            <circle cx="50" cy="56" r="27" fill="#d9422f" stroke="#222" stroke-width="3"/>
            <path d="M50 30 A27 27 0 0 1 50 83" fill="none" stroke="#222" stroke-width="2.5"/>
            <path d="M28 36 A26 16 0 0 1 72 36 L50 44 Z" fill="#222"/>
            <circle cx="38" cy="50" r="4.5" fill="#222"/><circle cx="62" cy="50" r="4.5" fill="#222"/>
            <circle cx="34" cy="66" r="4.5" fill="#222"/><circle cx="66" cy="66" r="4.5" fill="#222"/>
            <circle cx="50" cy="74" r="4.5" fill="#222"/>
          </svg>
        </div></div>
        <h2>ナナホシテントウ</h2><small>通常個体</small>
      </div>

      <div class="card q4b-shiny-card">
        <div class="bugbox"><div class="bug q4b-shiny-art q4b-shiny-static q4b-shiny-detail">
          <svg viewBox="0 0 100 100" aria-label="色違いのナナホシテントウ">
            <circle cx="50" cy="56" r="27" fill="#4b85d9" stroke="#1a2740" stroke-width="3"/>
            <path d="M50 30 A27 27 0 0 1 50 83" fill="none" stroke="#1a2740" stroke-width="2.5"/>
            <path d="M28 36 A26 16 0 0 1 72 36 L50 44 Z" fill="#1a2740"/>
            <circle cx="38" cy="50" r="4.5" fill="#fff4a8"/><circle cx="62" cy="50" r="4.5" fill="#fff4a8"/>
            <circle cx="34" cy="66" r="4.5" fill="#fff4a8"/><circle cx="66" cy="66" r="4.5" fill="#fff4a8"/>
            <circle cx="50" cy="74" r="4.5" fill="#fff4a8"/>
          </svg>
          <span class="q4b-shiny-badge" aria-hidden="true">✨</span>
        </div></div>
        <h2>ナナホシテントウ</h2><small>色違い・詳細表示</small>
      </div>
    </div>
  </section>


  <section class="panel">
    <h2>捕獲時の一回演出</h2>
    <div class="preview-capture" id="captureCard">
      <div class="title">つかまえた！</div>
      <div class="q4b-shiny-art q4b-shiny-static q4b-shiny-detail">
        <svg viewBox="0 0 100 100" aria-label="色違いのカブトムシ">
          <ellipse cx="50" cy="63" rx="24" ry="29" fill="#5c3bb4" stroke="#24154a" stroke-width="3"/>
          <circle cx="50" cy="34" r="17" fill="#7253c7" stroke="#24154a" stroke-width="3"/>
          <path d="M50 21 C48 10 55 6 61 9 C57 13 57 18 59 23" fill="none" stroke="#24154a" stroke-width="5" stroke-linecap="round"/>
          <path d="M36 57 L19 45 M64 57 L81 45 M36 69 L18 73 M64 69 L82 73" stroke="#24154a" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <span class="q4b-shiny-badge" aria-hidden="true">✨</span>
      </div>
      <div class="q4b-morning-catch-note">🌅 朝露ボーナスで見つけた！</div>
      <h2>色違いのカブトムシ</h2>
    </div>
    <div class="controls">
      <button id="replay">演出を再生</button>
      <button class="secondary" id="toggleMotion">動きを止める</button>
    </div>
    <p class="note">「動きを止める」は reduced-motion 相当の見え方を簡易確認します。</p>
  </section>
</main>
<script>
(function(){
  var card=document.getElementById('captureCard');
  function replay(){card.classList.remove('q4b-shiny-reveal');void card.offsetWidth;card.classList.add('q4b-shiny-reveal');setTimeout(function(){card.classList.remove('q4b-shiny-reveal');},1800)}
  document.getElementById('replay').onclick=replay;
  var stopped=false;
  document.getElementById('toggleMotion').onclick=function(){
    stopped=!stopped;
    document.documentElement.style.setProperty('--preview-motion',stopped?'paused':'running');
    var style=document.getElementById('previewMotionStyle');
    if(!style){style=document.createElement('style');style.id='previewMotionStyle';document.head.appendChild(style)}
    style.textContent=stopped?'*{animation:none!important;transition:none!important}':'';
    this.textContent=stopped?'動きを戻す':'動きを止める';
  };
  replay();
})();
</script>
</body>
</html>
