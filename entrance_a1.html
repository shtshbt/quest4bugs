<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quest4Bugs — 入口 A1 エメラルド・グラス</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
    background:
      radial-gradient(140% 100% at 50% -10%,rgba(60,140,90,.20),transparent 55%),
      radial-gradient(120% 90% at 50% 8%,#103021 0%,#0a2117 42%,#040d09 100%);
    color:#eef7ee;overflow:hidden;display:flex;align-items:center;justify-content:center;
    -webkit-user-select:none;user-select:none}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;
    box-shadow:inset 0 0 180px 40px rgba(0,0,0,.65)} /* vignette */
  .firefly{position:fixed;width:5px;height:5px;border-radius:50%;background:#f4f0a0;
    box-shadow:0 0 8px 2px #d8e85a,0 0 18px 6px rgba(216,232,90,.4);opacity:0;animation:fly 11s ease-in-out infinite}
  @keyframes fly{0%{opacity:0;transform:translate(0,0)}25%{opacity:.9}60%{transform:translate(var(--dx),var(--dy))}100%{opacity:0;transform:translate(calc(var(--dx)*1.5),calc(var(--dy)*1.3))}}
  .card{position:relative;z-index:5;text-align:center;width:91%;max-width:430px;
    padding:38px 30px 32px;border-radius:24px;
    background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
    border:1px solid rgba(190,230,200,.28);backdrop-filter:blur(10px);
    box-shadow:0 24px 60px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.18)}
  .crest{font-size:46px;display:block;margin-bottom:4px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
  .logo{font-family:'Hiragino Mincho ProN',serif;font-weight:900;font-size:46px;line-height:1.04;letter-spacing:.5px;
    background:linear-gradient(180deg,#fbfff4 0%,#cfeecf 42%,#7fc98c 78%,#d9b25e 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 18px rgba(150,230,170,.25))}
  @media(min-width:480px){.logo{font-size:54px}}
  .rule{width:120px;height:1px;margin:14px auto 12px;
    background:linear-gradient(90deg,transparent,#cBd9a8,transparent);position:relative}
  .rule::before{content:"❧";position:absolute;left:50%;top:-11px;transform:translateX(-50%);color:#d9b25e;font-size:14px}
  .sub{color:#cfe6cf;font-size:14px;letter-spacing:4px;margin-bottom:26px;opacity:.92}
  .lbl{font-size:11px;letter-spacing:3px;color:#9fc4a6;text-transform:uppercase;margin-bottom:8px}
  input{width:100%;background:rgba(0,0,0,.28);border:1px solid rgba(180,220,190,.35);border-radius:12px;
    outline:none;color:#fff;font-size:17px;text-align:center;letter-spacing:3px;padding:14px;
    font-family:'Hiragino Maru Gothic ProN',sans-serif;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:#d9b25e;box-shadow:0 0 0 3px rgba(217,178,94,.18)}
  input::placeholder{color:#8fb097;letter-spacing:1px;font-size:14px}
  .go{width:100%;margin-top:14px;padding:15px;border:none;border-radius:12px;cursor:pointer;
    font-family:'Hiragino Maru Gothic ProN',sans-serif;font-weight:800;font-size:17px;letter-spacing:2px;color:#23310f;
    background:linear-gradient(180deg,#f6e6a8 0%,#e3c06a 50%,#c79a3e 100%);
    box-shadow:0 8px 22px rgba(150,110,30,.45),inset 0 1px 0 rgba(255,255,255,.6);transition:transform .08s,box-shadow .15s}
  .go:hover{box-shadow:0 10px 26px rgba(170,125,35,.55),inset 0 1px 0 rgba(255,255,255,.7)}
  .go:active{transform:translateY(2px)}
  .err{min-height:18px;margin-top:14px;font-size:13px;color:#ffc9b8;letter-spacing:1px;font-family:'Hiragino Maru Gothic ProN',sans-serif}
</style>
</head>
<body>
  <div class="card">
    <span class="crest">🪲</span>
    <div class="logo">Quest4Bugs</div>
    <div class="rule"></div>
    <div class="sub">むしの せかいへ</div>
    <div class="lbl">enter password to proceed</div>
    <input id="pw" type="password" inputmode="text" placeholder="あいことば" autocomplete="off">
    <button class="go" onclick="go()">ぼうけんに でる</button>
    <div class="err" id="err"></div>
  </div>
<script>
  function go(){var v=document.getElementById('pw').value;
    document.getElementById('err').textContent = v==='mushi' ? '✓ ようこそ（本番ではポータルへ）' : '✕ あいことばが ちがいます';}
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')go();});
  var b=document.body;
  for(var i=0;i<20;i++){var f=document.createElement('div');f.className='firefly';
    f.style.left=(Math.random()*100)+'vw';f.style.top=(Math.random()*100)+'vh';
    f.style.setProperty('--dx',(Math.random()*100-50)+'px');f.style.setProperty('--dy',(Math.random()*-100-20)+'px');
    f.style.animationDelay=(Math.random()*11)+'s';var s=.5+Math.random();f.style.width=f.style.height=(5*s)+'px';b.appendChild(f);}
</script>
</body>
</html>
