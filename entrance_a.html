<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quest4Bugs — 入口（案A 夜のジャングル）</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Hiragino Maru Gothic ProN','Yu Gothic',system-ui,sans-serif;
    background:radial-gradient(120% 90% at 50% 10%,#13361f 0%,#0a2016 45%,#04100b 100%);
    color:#eaf5e8;overflow:hidden;display:flex;align-items:center;justify-content:center;
    -webkit-user-select:none;user-select:none;
  }
  /* ホタル（軽量CSSパーティクル） */
  .firefly{position:fixed;width:6px;height:6px;border-radius:50%;
    background:#f6f39a;box-shadow:0 0 10px 3px #d8e85a,0 0 22px 8px rgba(216,232,90,.5);
    opacity:0;animation:fly 9s ease-in-out infinite}
  @keyframes fly{
    0%{opacity:0;transform:translate(0,0) scale(.6)}
    20%{opacity:.95}
    50%{transform:translate(var(--dx),var(--dy)) scale(1.1)}
    80%{opacity:.7}
    100%{opacity:0;transform:translate(calc(var(--dx)*1.6),calc(var(--dy)*1.4)) scale(.6)}}
  /* 葉のシルエット（上下） */
  .leaf{position:fixed;font-size:120px;opacity:.10;filter:blur(1px)}
  .card{position:relative;z-index:5;text-align:center;padding:24px;max-width:420px;width:92%}
  .logo{font-size:13vw;max-font-size:64px;font-weight:900;letter-spacing:1px;line-height:1.0;
    background:linear-gradient(180deg,#eafff0,#9fe6a8 60%,#4fae6a);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 28px rgba(120,230,150,.35);animation:breathe 3.6s ease-in-out infinite}
  @media(min-width:480px){.logo{font-size:62px}}
  @keyframes breathe{50%{filter:drop-shadow(0 0 14px rgba(150,255,180,.5))}}
  .beetle{font-size:54px;display:block;margin-bottom:6px;animation:bob 2.8s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-8px) rotate(-3deg)}}
  .sub{margin:10px 0 26px;color:#bfe6c4;font-size:15px;letter-spacing:2px;font-weight:700}
  .field{display:flex;gap:8px;background:rgba(255,255,255,.07);border:1.5px solid rgba(150,230,170,.4);
    border-radius:14px;padding:8px;backdrop-filter:blur(4px);box-shadow:0 6px 24px rgba(0,0,0,.4)}
  .field input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:17px;padding:8px 10px;letter-spacing:3px}
  .field input::placeholder{color:#8fbf99;letter-spacing:1px}
  .go{background:linear-gradient(180deg,#7ee08a,#3e9e57);border:none;color:#06240f;font-weight:900;
    font-size:16px;padding:10px 16px;border-radius:10px;cursor:pointer;white-space:nowrap;
    box-shadow:0 3px 0 #2c6f3d;transition:transform .08s}
  .go:active{transform:translateY(2px);box-shadow:0 1px 0 #2c6f3d}
  .hint{margin-top:14px;font-size:12px;color:#7fae89;letter-spacing:1px}
  .err{color:#ffb3a0;min-height:16px;font-size:13px;margin-top:10px;font-weight:700}
</style>
</head>
<body>
  <div class="leaf" style="top:-30px;left:-20px;transform:rotate(20deg)">🌿</div>
  <div class="leaf" style="bottom:-40px;right:-10px;transform:rotate(-160deg)">🌿</div>
  <div class="leaf" style="top:40%;right:-30px;font-size:90px;transform:rotate(80deg)">🍃</div>
  <div class="card">
    <span class="beetle">🪲</span>
    <div class="logo">Quest4Bugs</div>
    <div class="sub">〜 むしの せかいへ ようこそ 〜</div>
    <div class="field">
      <input id="pw" type="password" inputmode="text" placeholder="enter password to proceed" autocomplete="off">
      <button class="go" onclick="tryEnter()">▶ ぼうけんに でる</button>
    </div>
    <div class="err" id="err"></div>
    <div class="hint">あいことばを いれて とびらを ひらこう</div>
  </div>
<script>
  /* デモ: 本番は SHA-256 ハッシュ比較に差し替え。ここでは見た目確認用に "mushi" を仮設定 */
  function tryEnter(){
    var v=document.getElementById('pw').value;
    if(v==='mushi'){ document.getElementById('err').textContent='✅ ようこそ！（本番ではポータルへ移動）'; }
    else { document.getElementById('err').textContent='❌ あいことばが ちがうみたい'; }
  }
  document.getElementById('pw').addEventListener('keydown',function(e){ if(e.key==='Enter')tryEnter(); });
  /* ホタル生成 */
  var b=document.body;
  for(var i=0;i<22;i++){
    var f=document.createElement('div'); f.className='firefly';
    f.style.left=(Math.random()*100)+'vw'; f.style.top=(Math.random()*100)+'vh';
    f.style.setProperty('--dx',(Math.random()*120-60)+'px');
    f.style.setProperty('--dy',(Math.random()*-120-20)+'px');
    f.style.animationDelay=(Math.random()*9)+'s';
    f.style.animationDuration=(7+Math.random()*6)+'s';
    var s=0.5+Math.random()*1.1; f.style.width=f.style.height=(6*s)+'px';
    b.appendChild(f);
  }
</script>
</body>
</html>
